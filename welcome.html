<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- 老用户入口闸门：填过问卷的人，再进来不再走问卷，按「有无 idea」直接进各自主页。
     放在 <head> 最顶（早于字体/样式加载），跳得最快、不会先闪一下问卷。 -->
<script>
window.dsHomeUrl = function () {
  // 统一的「主页去向」规则：已审核·看过指南 → 学习地图（不再按 ds_has_idea 分流到 roadmap）
  return 'calendar.html';
};
(function () { try {
  var p = new URLSearchParams(location.search);
  if (p.get('fresh') === '1' || p.has('step') || p.get('from') === 'home') return;   // 重置 / 诊断回跳 / 显式看开场片头 → 放行
  // 入口闸：按「报名审核」状态分流（与 index.html 同一条规则）
  var approved = localStorage.getItem('ds_approved') === '1'
              || localStorage.getItem('ds_onboarded') === 'true'
              || !!localStorage.getItem('ds_enrolled_at');
  if (!approved) { location.replace('enrolled.html'); return; }                                   // 无权限 → 报名落地页
  if (localStorage.getItem('ds_guide_seen') !== '1') { location.replace('guide.html'); return; }  // 有权限·第一次 → 学习指南
  location.replace(dsHomeUrl());                                                                  // 有权限·之后 → 学习地图
} catch (e) {}   /* localStorage 异常（隐私模式等）→ 安全降级：停在开场页，不跳转 */ })();
</script>
<title>欢迎来到深海圈</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700;900&family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* Typography — Editorial serif display + refined sans body */
  --font-display: 'Noto Serif SC', 'Songti SC', 'STSong', serif;
  --font-sans: 'Sora', 'PingFang SC', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace;

  /* Surfaces — soft porcelain teal */
  --bg: #f5fafa;
  --bg-gradient: linear-gradient(180deg, #e8f4f5 0%, #f5fafa 40%, #ffffff 100%);
  --surface: #ffffff;
  --surface-soft: #f0f8f8;

  /* Deep blue — the gravitational anchor */
  --deep-blue: #1e3a52;
  --deep-blue-strong: #162c3f;

  /* Teal — the single accent */
  --teal: #0d9488;
  --teal-hover: #0b7c71;
  --teal-light: #7dd3cc;
  --teal-bg: #e8f6f5;
  --teal-tint: rgba(13, 148, 136, 0.08);

  /* Warm gold — scarcely used, only for credentials */
  --gold: #c89854;
  --gold-soft: rgba(200, 152, 84, 0.18);

  /* Text — tinted neutrals */
  --text-1: #1a2942;
  --text-2: #5c7a8a;
  --text-3: #94a3b8;
  --text-4: #b8c5cc;

  /* Lines */
  --border: #dde7ea;
  --border-soft: #e8eef0;
  --hairline: rgba(13, 148, 136, 0.08);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body { background: var(--bg); }

body {
  font-family: var(--font-sans);
  background: var(--bg-gradient);
  color: var(--text-1);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "ss01", "cv11";
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  overflow-x: hidden;
}

/* ============================================= */
/*  AMBIENT — soft teal glow + micro grid         */
/* ============================================= */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(ellipse 72% 48% at 82% 18%, rgba(125, 211, 204, 0.22) 0%, transparent 60%),
    radial-gradient(ellipse 56% 46% at 8% 92%, rgba(13, 148, 136, 0.06) 0%, transparent 55%);
}
/* Micro grid — barely there editorial structure */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image:
    linear-gradient(rgba(13, 148, 136, 0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(13, 148, 136, 0.04) 1px, transparent 1px);
  background-size: 72px 72px;
  mask-image: radial-gradient(ellipse at center, black 0%, transparent 78%);
  -webkit-mask-image: radial-gradient(ellipse at center, black 0%, transparent 78%);
}

/* ============================================= */
/*  TOP BAR — thin brand rail                      */
/* ============================================= */
.top-rail {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 20;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  pointer-events: none;
}
.top-rail > * { pointer-events: auto; }
.brand-mark {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.01em;
  color: var(--deep-blue);
}
.brand-mark .brand-dot {
  width: 8px;
  height: 8px;
  border-radius: 2px;
  background: var(--teal);
  position: relative;
}
.brand-mark .brand-dot::after {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 3px;
  border: 1px solid var(--teal-light);
  opacity: 0.6;
}
.brand-mark .sep {
  color: var(--text-3);
  font-family: var(--font-sans);
  font-weight: 300;
  margin: 0 2px;
}
.brand-mark .sub {
  font-family: var(--font-sans);
  font-size: 12.5px;
  font-weight: 500;
  color: var(--text-2);
  letter-spacing: 0.04em;
}
.top-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--deep-blue);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  border: 2px solid var(--surface);
  box-shadow: 0 2px 10px rgba(30, 58, 82, 0.18);
  letter-spacing: 0;
}

.welcome-container {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 1280px;
  padding: 72px 56px 56px;
}

#step1 {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0;
}

/* Steps */
.step { display: none; }
.step.active {
  display: block;
  animation: pageRise 0.7s cubic-bezier(0.22, 1, 0.36, 1);
}
#step1.active { display: grid; }

@keyframes pageRise {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes staggerRise {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes breathe {
  0%, 100% { opacity: 0.5; transform: scale(1); }
  50% { opacity: 0.9; transform: scale(1.06); }
}
@keyframes shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(200%); }
}

/* ============================================= */
/*  HERO — TWO-COLUMN LIGHT                        */
/* ============================================= */
#step1.active {
  grid-template-columns: 1.12fr 0.88fr;
  column-gap: 72px;
  align-items: center;
  min-height: calc(100vh - 120px);
  padding-top: 4px;
  padding-bottom: 48px;
}

.hero-left, .hero-right { position: relative; }

#step1.active .hero-left > *,
#step1.active .hero-right > * {
  animation: staggerRise 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
}
#step1.active .hero-title          { animation-delay: 0.14s; }
#step1.active .instructor-card     { animation-delay: 0.38s; }
#step1.active .hero-cta-wrap       { animation-delay: 0.50s; }
#step1.active .hero-right .video-plate { animation-delay: 0.22s; animation-duration: 0.9s; }

/* ============================================= */
/*  TITLE — serif editorial display                */
/* ============================================= */
.hero-title {
  font-family: var(--font-display);
  font-size: clamp(52px, 5.4vw, 76px);
  font-weight: 700;
  line-height: 1.08;
  letter-spacing: -0.015em;
  color: var(--deep-blue);
  margin-bottom: 22px;
  text-wrap: balance;
}
.hero-title .line-2 {
  display: block;
  position: relative;
}
.hero-title .hl {
  position: relative;
  display: inline-block;
  color: var(--deep-blue);
  padding: 0 2px;
  z-index: 1;
}
.hero-title .hl::before {
  content: '';
  position: absolute;
  left: -2px;
  right: -2px;
  bottom: 0.05em;
  height: 0.34em;
  background: var(--teal-bg);
  border-bottom: 2px solid var(--teal);
  z-index: -1;
  border-radius: 2px;
}
.hero-title .serif-acc {
  color: var(--teal);
  font-style: italic;
  font-weight: 600;
}

/* ============================================= */
/*  INSTRUCTOR CARD — deep blue anchor             */
/* ============================================= */
.instructor-card {
  position: relative;
  background: var(--deep-blue);
  color: #fff;
  border-radius: 18px;
  padding: 24px 26px;
  margin-bottom: 32px;
  display: grid;
  grid-template-columns: auto 1fr;
  grid-column-gap: 18px;
  align-items: center;
  overflow: hidden;
  box-shadow:
    0 1px 0 rgba(255, 255, 255, 0.08) inset,
    0 20px 40px -20px rgba(30, 58, 82, 0.3),
    0 4px 14px -4px rgba(30, 58, 82, 0.15);
}
.instructor-card::before {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  width: 200px;
  height: 200px;
  background: radial-gradient(circle at top right, rgba(125, 211, 204, 0.22) 0%, transparent 60%);
  pointer-events: none;
}
.instructor-card::after {
  content: '';
  position: absolute;
  top: 24px;
  right: 24px;
  width: 48px;
  height: 48px;
  border: 1px solid rgba(200, 152, 84, 0.32);
  border-radius: 50%;
  opacity: 0.8;
  background:
    radial-gradient(circle at center, transparent 46%, rgba(200, 152, 84, 0.18) 47%, transparent 50%);
}
.instructor-avatar {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: linear-gradient(135deg, #c89854 0%, #a47940 100%);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.02em;
  box-shadow:
    0 0 0 3px rgba(255, 255, 255, 0.08),
    0 4px 12px -4px rgba(0, 0, 0, 0.3);
  grid-row: 1 / 3;
  position: relative;
  z-index: 1;
}
.instructor-meta {
  grid-column: 2;
  position: relative;
  z-index: 1;
}
.instructor-name {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 2px;
  letter-spacing: 0.02em;
}
.instructor-role {
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 500;
  color: rgba(255, 255, 255, 0.62);
  letter-spacing: 0.04em;
  margin-bottom: 12px;
}
.instructor-stats {
  display: flex;
  gap: 22px;
  grid-column: 2;
  position: relative;
  z-index: 1;
  padding-top: 12px;
  border-top: 1px solid rgba(255, 255, 255, 0.08);
}
.stat-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.stat-value {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: -0.01em;
  line-height: 1.1;
}
.stat-label {
  font-family: var(--font-sans);
  font-size: 10.5px;
  font-weight: 500;
  color: rgba(255, 255, 255, 0.55);
  letter-spacing: 0.02em;
  line-height: 1.2;
}

/* ============================================= */
/*  CTA                                           */
/* ============================================= */
.hero-cta-wrap {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 14px;
}
.btn-primary-big {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  background: var(--deep-blue);
  color: #fff;
  border: 1px solid var(--deep-blue);
  padding: 15px 22px 15px 26px;
  border-radius: 12px;
  font-family: var(--font-sans);
  font-size: 14.5px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.01em;
  position: relative;
  overflow: hidden;
  transition: background 240ms cubic-bezier(0.2, 0, 0, 1),
              transform 240ms cubic-bezier(0.2, 0, 0, 1),
              box-shadow 240ms cubic-bezier(0.2, 0, 0, 1);
  box-shadow:
    0 1px 0 rgba(255, 255, 255, 0.1) inset,
    0 8px 20px -8px rgba(30, 58, 82, 0.4);
}
.btn-primary-big::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(125, 211, 204, 0.22) 50%, transparent 100%);
  transform: translateX(-100%);
  transition: transform 0ms linear;
  pointer-events: none;
}
.btn-primary-big:hover::before {
  animation: shimmer 900ms cubic-bezier(0.22, 1, 0.36, 1);
}
.btn-primary-big:hover {
  background: var(--deep-blue-strong);
  transform: translateY(-1px);
  box-shadow:
    0 1px 0 rgba(255, 255, 255, 0.1) inset,
    0 14px 30px -10px rgba(30, 58, 82, 0.45),
    0 0 0 3px var(--teal-tint);
}
.btn-primary-big:active { transform: translateY(0); }

.btn-primary-big .arrow-wrap {
  display: inline-flex;
  align-items: center;
  position: relative;
  width: 20px;
  height: 12px;
  overflow: hidden;
}
.btn-primary-big .arrow-line {
  position: absolute;
  top: 50%;
  left: 0;
  width: 100%;
  height: 1.5px;
  background: var(--teal-light);
  transform: translateY(-50%);
  transition: transform 300ms cubic-bezier(0.16, 1, 0.3, 1), background 300ms;
}
.btn-primary-big .arrow-tip {
  position: absolute;
  top: 50%;
  right: 0;
  width: 7px;
  height: 7px;
  border-top: 1.5px solid var(--teal-light);
  border-right: 1.5px solid var(--teal-light);
  transform: translateY(-50%) rotate(45deg);
  transition: transform 300ms cubic-bezier(0.16, 1, 0.3, 1), border-color 300ms;
}
.btn-primary-big:hover .arrow-line { transform: translateY(-50%) translateX(3px); background: #fff; }
.btn-primary-big:hover .arrow-tip  { transform: translateY(-50%) translateX(3px) rotate(45deg); border-top-color: #fff; border-right-color: #fff; }

/* ============================================= */
/*  VIDEO PLATE — clean white with teal edge       */
/* ============================================= */
.video-plate {
  width: 100%;
  aspect-ratio: 16 / 11;
  max-height: min(62vh, 520px);
  background:
    radial-gradient(ellipse at 76% 18%, rgba(125, 211, 204, 0.28) 0%, transparent 55%),
    radial-gradient(ellipse at 16% 94%, rgba(30, 58, 82, 0.08) 0%, transparent 55%),
    linear-gradient(165deg, #ffffff 0%, #f0f8f8 55%, #e8f4f5 100%);
  border-radius: 18px;
  border: 1px solid var(--border);
  display: block;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  box-shadow:
    0 1px 0 rgba(255, 255, 255, 0.8) inset,
    0 32px 64px -24px rgba(30, 58, 82, 0.18),
    0 8px 24px -8px rgba(13, 148, 136, 0.12);
  transition: transform 380ms cubic-bezier(0.16, 1, 0.3, 1),
              box-shadow 380ms cubic-bezier(0.16, 1, 0.3, 1),
              border-color 380ms cubic-bezier(0.16, 1, 0.3, 1);
}
.video-plate::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(13, 148, 136, 0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(13, 148, 136, 0.05) 1px, transparent 1px);
  background-size: 36px 36px;
  mask-image: radial-gradient(ellipse at center, black 10%, transparent 80%);
  -webkit-mask-image: radial-gradient(ellipse at center, black 10%, transparent 80%);
  pointer-events: none;
}
.video-plate:hover {
  transform: translateY(-4px);
  border-color: var(--teal-light);
  box-shadow:
    0 1px 0 rgba(255, 255, 255, 0.8) inset,
    0 40px 80px -20px rgba(30, 58, 82, 0.24),
    0 12px 28px -8px rgba(13, 148, 136, 0.22);
}

/* corner hairline markers (teal) */
.plate-corner {
  position: absolute;
  width: 16px;
  height: 16px;
  z-index: 2;
  pointer-events: none;
}
.plate-corner::before, .plate-corner::after {
  content: '';
  position: absolute;
  background: var(--teal);
  opacity: 0.55;
  transition: opacity 320ms ease;
}
.plate-corner.tl { top: 14px; left: 14px; }
.plate-corner.tl::before { top: 0; left: 0; width: 12px; height: 1.5px; }
.plate-corner.tl::after  { top: 0; left: 0; width: 1.5px; height: 12px; }
.plate-corner.tr { top: 14px; right: 14px; }
.plate-corner.tr::before { top: 0; right: 0; width: 12px; height: 1.5px; }
.plate-corner.tr::after  { top: 0; right: 0; width: 1.5px; height: 12px; }
.plate-corner.bl { bottom: 14px; left: 14px; }
.plate-corner.bl::before { bottom: 0; left: 0; width: 12px; height: 1.5px; }
.plate-corner.bl::after  { bottom: 0; left: 0; width: 1.5px; height: 12px; }
.plate-corner.br { bottom: 14px; right: 14px; }
.plate-corner.br::before { bottom: 0; right: 0; width: 12px; height: 1.5px; }
.plate-corner.br::after  { bottom: 0; right: 0; width: 1.5px; height: 12px; }
.video-plate:hover .plate-corner::before,
.video-plate:hover .plate-corner::after { opacity: 1; }

.plate-header {
  position: absolute;
  top: 26px;
  left: 28px;
  right: 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 3;
  font-family: var(--font-mono);
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-2);
}
.plate-header .chapter {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.plate-header .chapter .num {
  color: var(--deep-blue);
  font-weight: 600;
  letter-spacing: 0;
}
.plate-header .live-tag {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  color: var(--teal);
  letter-spacing: 0.16em;
  font-weight: 600;
}
.plate-header .live-tag .live-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--teal);
  animation: breathe 1.8s ease-in-out infinite;
}

/* play button */
.play-btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 76px;
  height: 76px;
  border-radius: 50%;
  background: #fff;
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: border-color 280ms cubic-bezier(0.16, 1, 0.3, 1),
              background 280ms cubic-bezier(0.16, 1, 0.3, 1),
              transform 280ms cubic-bezier(0.16, 1, 0.3, 1),
              box-shadow 280ms cubic-bezier(0.16, 1, 0.3, 1);
  z-index: 3;
  box-shadow:
    0 0 0 8px rgba(255, 255, 255, 0.5),
    0 0 0 9px var(--hairline),
    0 10px 24px -6px rgba(30, 58, 82, 0.2);
}
.play-btn .play-glyph {
  width: 0;
  height: 0;
  border-left: 14px solid var(--teal);
  border-top: 9px solid transparent;
  border-bottom: 9px solid transparent;
  margin-left: 4px;
  transition: border-left-color 240ms cubic-bezier(0.16, 1, 0.3, 1);
}
.video-plate:hover .play-btn {
  background: var(--teal);
  border-color: var(--teal);
  transform: translate(-50%, -50%) scale(1.06);
  box-shadow:
    0 0 0 8px rgba(13, 148, 136, 0.12),
    0 0 0 9px rgba(13, 148, 136, 0.2),
    0 14px 34px -6px rgba(13, 148, 136, 0.36);
}
.video-plate:hover .play-glyph {
  border-left-color: #fff;
}

/* overlay info */
.plate-overlay {
  position: absolute;
  bottom: 28px;
  left: 28px;
  right: 28px;
  z-index: 3;
}
.plate-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  line-height: 1.3;
  letter-spacing: -0.01em;
  margin-bottom: 10px;
  color: var(--deep-blue);
  max-width: 88%;
}
.plate-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.06em;
  color: var(--text-2);
}
.plate-meta .by { color: var(--deep-blue); font-weight: 600; }
.plate-meta .dot {
  width: 2.5px;
  height: 2.5px;
  border-radius: 50%;
  background: var(--text-3);
}
.plate-meta .duration { color: var(--text-2); }

/* ============================================= */
/*  STEP 2-5 — LIGHT QUESTIONNAIRE                 */
/* ============================================= */
.step:not(#step1) {
  max-width: 680px;
  margin: 0 auto;
  padding: 32px 0 48px;
}
#step2.active, #step3.active, #step4.active, #step5.active, #step6.active {
  display: block;
}
.section-eyebrow {

  history.replaceState(null, '', location.pathname);
}

/* 首页只剩一屏：点「进入学习地图」= 入营完成，打标记后进主页 */
function enterMap() {
  try {
    localStorage.setItem('ds_approved', '1');        // 看完开场即视为入营（演示旁路）
    localStorage.setItem('ds_onboarded', 'true');
    localStorage.setItem('ds_guide_seen', '1');      // 开场屏本身就是引导，标记看过、不再二次导去指南
    if (!localStorage.getItem('ds_enrolled_at')) localStorage.setItem('ds_enrolled_at', '2026-05-04');
  } catch (e) {}
  location.href = dsHomeUrl();   // 直接进学习地图
}
