<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深海圈 | 讨论</title>
<style>
:root {
  --font: -apple-system, 'PingFang SC', BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: 'SF Mono', 'Menlo', 'Monaco', monospace;
  --bg: #f8f9fb;
  --bg-warm: #fafafa;
  --white: #ffffff;
  --teal: #0d9488;
  --teal-hover: #0b7c71;
  --teal-light: #eef8f7;
  --teal-bg: rgba(13, 148, 136, 0.04);
  --teal-subtle: rgba(13, 148, 136, 0.08);
  --text1: #1e293b;
  --text2: #64748b;
  --text3: #94a3b8;
  --text4: #cbd5e1;
  --border: #e2e8f0;
  --border-soft: #f1f5f9;
  --success: #22c55e;
  --orange: #f59e0b;
  --radius: 10px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.03);
  --shadow-md: 0 4px 16px rgba(0,0,0,.05);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--font); background:var(--bg); color:var(--text1); -webkit-font-smoothing:antialiased; height:100vh; overflow:hidden; }
a { color:inherit; text-decoration:none; }

/* ===== Topbar ===== */
.topbar { position:sticky; top:0; z-index:50; background:rgba(255,255,255,.88); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-bottom:1px solid var(--border); height:52px; display:flex; align-items:center; padding:0 24px; }
.tb-inner { max-width:100%; width:100%; display:flex; align-items:center; justify-content:space-between; }
.tb-left { display:flex; align-items:center; gap:24px; }
.logo { font-size:17px; font-weight:700; color:var(--teal); }
.nav { display:flex; gap:4px; }
.nav a { font-size:13px; color:var(--text3); padding:6px 12px; border-radius:6px; transition:all .15s; }
.nav a:hover { color:var(--text1); background:var(--bg); }
.nav a.active { color:var(--teal); background:var(--teal-light); font-weight:500; }
.tb-right { display:flex; align-items:center; gap:12px; }
.online-dot { width:7px; height:7px; border-radius:50%; background:var(--success); display:inline-block; }
.online-text { font-size:12px; color:var(--text3); }
.avatar { width:32px; height:32px; border-radius:50%; background:var(--teal); color:#fff; display:grid; place-items:center; font-size:13px; font-weight:600; cursor:pointer; transition:transform .2s; }
.avatar:hover { transform:scale(1.05); }

/* ===== Layout ===== */
.layout { display:grid; grid-template-columns:210px 1fr 0px; height:calc(100vh - 52px); transition:grid-template-columns .25s ease; }
.layout.panel-open { grid-template-columns:210px 1fr 300px; }

/* ===== Channels sidebar ===== */
.channels { background:var(--white); border-right:1px solid var(--border); padding:16px 0; overflow-y:auto; display:flex; flex-direction:column; }
.ch-group { margin-bottom:8px; }
.ch-label { font-size:10px; font-weight:600; color:var(--text4); letter-spacing:1px; padding:10px 20px 6px; text-transform:uppercase; }
.ch-item { display:flex; align-items:center; gap:9px; padding:7px 16px; margin:1px 8px; cursor:pointer; font-size:14px; color:var(--text2); border-radius:7px; transition:all .12s; user-select:none; }
.ch-item:hover { background:var(--border-soft); color:var(--text1); }
.ch-item.active { background:var(--teal-subtle); color:var(--teal); font-weight:500; }
.ch-icon { font-size:14px; width:18px; text-align:center; flex-shrink:0; opacity:.7; }
.ch-item.active .ch-icon { opacity:1; }
.ch-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.ch-badge { background:var(--teal); color:#fff; font-size:10px; font-weight:600; padding:1px 6px; border-radius:10px; min-width:18px; text-align:center; }
.ch-unread { width:6px; height:6px; border-radius:50%; background:var(--teal); flex-shrink:0; opacity:.7; }

/* Channels bottom */
.ch-bottom { margin-top:auto; padding:14px 20px; border-top:1px solid var(--border-soft); }
.ch-user { display:flex; align-items:center; gap:10px; }
.ch-user-avatar { width:30px; height:30px; border-radius:50%; background:linear-gradient(135deg,#ccfbf1,#99f6e4); color:var(--text1); display:grid; place-items:center; font-size:12px; font-weight:600; }
.ch-user-info { flex:1; }
.ch-user-name { font-size:13px; font-weight:500; color:var(--text1); }
.ch-user-status { font-size:11px; color:var(--success); }

/* ===== Message area ===== */
.msg-area { display:flex; flex-direction:column; min-width:0; background:var(--white); }

/* Channel header */
.ch-header { padding:14px 28px; background:var(--white); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:16px; flex-shrink:0; }
.ch-header-left { display:flex; align-items:center; gap:10px; min-width:0; }
.ch-header-icon { font-size:18px; opacity:.8; }
.ch-header-title { font-size:16px; font-weight:600; color:var(--text1); letter-spacing:-.2px; }
.ch-header-desc { font-size:12px; color:var(--text3); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.ch-header-right { display:flex; align-items:center; gap:8px; flex-shrink:0; }
.icon-btn { width:32px; height:32px; border:1px solid var(--border); background:var(--white); border-radius:6px; display:grid; place-items:center; cursor:pointer; font-size:14px; color:var(--text3); transition:all .15s; }
.icon-btn:hover { background:var(--bg); color:var(--text1); border-color:var(--text4); }
.icon-btn.active { background:var(--teal-light); color:var(--teal); border-color:var(--teal); }

/* Search bar */
.search-bar { display:none; padding:10px 24px; background:var(--white); border-bottom:1px solid var(--border); }
.search-bar.show { display:block; }
.search-input { width:100%; padding:8px 12px; border:1px solid var(--border); border-radius:8px; font-size:13px; font-family:var(--font); outline:none; background:var(--bg); transition:border-color .15s; }
.search-input:focus { border-color:var(--teal); background:var(--white); }
.search-input::placeholder { color:var(--text4); }

/* Message feed */
.msg-feed { flex:1; overflow-y:auto; padding:8px 0; scroll-behavior:smooth; }

/* Date separator */
.date-sep { display:flex; align-items:center; gap:16px; padding:20px 28px 10px; }
.date-sep::before, .date-sep::after { content:''; flex:1; height:1px; background:var(--border); opacity:.5; }
.date-sep span { font-size:11px; color:var(--text3); font-weight:500; white-space:nowrap; letter-spacing:.3px; }

/* Messages */
.msg { display:flex; gap:12px; padding:8px 28px; border-radius:0; transition:background .15s; position:relative; }
.msg:hover { background:rgba(0,0,0,.018); }
.msg:hover .msg-actions { opacity:1; }
.msg-avatar { width:34px; height:34px; border-radius:50%; display:grid; place-items:center; font-size:13px; font-weight:600; color:var(--text1); flex-shrink:0; }
.msg-body { flex:1; min-width:0; padding-top:1px; }
.msg-meta { display:flex; align-items:baseline; gap:8px; margin-bottom:3px; }
.msg-name { font-size:13.5px; font-weight:600; color:var(--text1); }
.msg-role { font-size:10px; font-weight:500; color:var(--teal); background:var(--teal-light); padding:2px 6px; border-radius:4px; letter-spacing:.2px; }
.msg-time { font-size:11px; color:var(--text4); font-variant-numeric:tabular-nums; }
.msg-text { font-size:14px; color:var(--text1); line-height:1.7; word-break:break-word; opacity:.85; }
.msg-text code { font-family:var(--mono); font-size:12.5px; background:var(--border-soft); color:var(--text1); padding:2px 6px; border-radius:4px; }
.msg-text strong { color:var(--text1); font-weight:600; opacity:1; }

/* Message actions (hover) */
.msg-actions { position:absolute; right:28px; top:-10px; background:var(--white); border:1px solid var(--border); border-radius:8px; display:flex; gap:0; opacity:0; transition:opacity .12s; box-shadow:var(--shadow-md); }
.msg-action { padding:5px 9px; cursor:pointer; font-size:14px; border-right:1px solid var(--border-soft); transition:background .1s; }
.msg-action:last-child { border-right:none; }
.msg-action:hover { background:var(--border-soft); }

/* Reactions */
.msg-reactions { display:flex; gap:4px; margin-top:5px; }
.reaction { display:inline-flex; align-items:center; gap:3px; padding:3px 8px; border-radius:20px; border:1px solid var(--border); background:var(--white); font-size:12px; color:var(--text2); cursor:pointer; transition:all .15s; }
.reaction:hover { border-color:var(--text4); background:var(--border-soft); }
.reaction.active { border-color:var(--teal); background:var(--teal-light); color:var(--teal); }

/* Thread indicator */
.thread-indicator { display:inline-flex; align-items:center; gap:6px; margin-top:6px; padding:5px 12px; background:transparent; border:1px solid var(--border); border-radius:8px; font-size:12px; color:var(--teal); cursor:pointer; transition:all .15s; font-weight:500; }
.thread-indicator:hover { background:var(--teal-light); border-color:var(--teal-subtle); }
.thread-avatars { display:flex; margin-left:2px; }
.thread-avatars .mini-avatar { width:18px; height:18px; border-radius:50%; display:grid; place-items:center; font-size:8px; font-weight:600; color:var(--text1); margin-left:-4px; border:2px solid var(--white); }
.thread-avatars .mini-avatar:first-child { margin-left:0; }

/* Pinned message */
.pinned-bar { display:flex; align-items:center; gap:8px; padding:9px 28px; background:var(--white); border-bottom:1px solid var(--border); font-size:12.5px; color:var(--text2); cursor:pointer; transition:background .15s; }
.pinned-bar:hover { background:var(--border-soft); }

/* Input area */
.msg-input { padding:12px 28px 18px; background:var(--white); border-top:1px solid var(--border); flex-shrink:0; }
.input-wrapper { border:1px solid var(--border); border-radius:12px; background:var(--bg); transition:all .2s; overflow:hidden; }
.input-wrapper:focus-within { border-color:var(--teal); background:var(--white); box-shadow:0 0 0 3px rgba(13,148,136,.06); }
.msg-textarea { width:100%; min-height:44px; max-height:120px; padding:10px 14px; border:none; font-family:var(--font); font-size:14px; color:var(--text1); resize:none; outline:none; line-height:1.5; }
.msg-textarea::placeholder { color:var(--text4); }
.input-toolbar { display:flex; align-items:center; justify-content:space-between; padding:4px 8px 6px; }
.input-tools { display:flex; gap:2px; }
.input-tool { padding:4px 6px; border-radius:4px; cursor:pointer; font-size:14px; color:var(--text3); transition:all .1s; border:none; background:none; }
.input-tool:hover { background:var(--bg); color:var(--text1); }
.send-btn { padding:5px 14px; border-radius:6px; font-size:12px; font-weight:500; border:none; cursor:pointer; font-family:var(--font); transition:all .15s; }
.send-btn.ready { background:var(--teal); color:#fff; }
.send-btn.ready:hover { background:var(--teal-hover); }
.send-btn.disabled { background:var(--bg); color:var(--text4); cursor:default; }

/* ===== Right panel ===== */
.panel { background:var(--white); border-left:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
.panel-header { padding:12px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.panel-title { font-size:14px; font-weight:600; color:var(--text1); display:flex; align-items:center; gap:6px; }
.panel-close { border:none; background:none; font-size:18px; color:var(--text3); cursor:pointer; padding:2px 6px; border-radius:4px; }
.panel-close:hover { background:var(--bg); color:var(--text1); }

/* Thread panel */
.thread-content { flex:1; overflow-y:auto; padding:12px; }
.thread-parent { padding:12px; background:var(--teal-bg); border-radius:8px; margin-bottom:12px; border-left:3px solid var(--teal); }
.thread-parent .msg-name { color:var(--teal); }
.thread-replies { display:flex; flex-direction:column; gap:2px; }
.thread-reply { display:flex; gap:8px; padding:8px 10px; border-radius:6px; transition:background .1s; }
.thread-reply:hover { background:var(--bg); }
.thread-reply .msg-avatar { width:28px; height:28px; border-radius:6px; font-size:11px; }
.thread-reply .msg-name { font-size:12px; }
.thread-reply .msg-text { font-size:13px; }
.thread-input { margin-top:8px; padding:12px; border-top:1px solid var(--border-soft); }
.thread-input textarea { width:100%; min-height:48px; border:1px solid var(--border); border-radius:8px; padding:8px 10px; font-family:var(--font); font-size:13px; resize:none; outline:none; }
.thread-input textarea:focus { border-color:var(--teal); }
.thread-input-footer { display:flex; justify-content:flex-end; margin-top:6px; }

/* Channel info panel */
.info-content { flex:1; overflow-y:auto; padding:16px; }
.info-section { margin-bottom:20px; }
.info-label { font-size:11px; font-weight:600; color:var(--text4); letter-spacing:.5px; margin-bottom:8px; }
.info-text { font-size:13px; color:var(--text2); line-height:1.6; }
.pinned-list { display:flex; flex-direction:column; gap:6px; }
.pinned-item { padding:8px 10px; background:var(--bg); border-radius:6px; font-size:12px; color:var(--text2); line-height:1.5; cursor:pointer; transition:background .1s; }
.pinned-item:hover { background:var(--teal-light); }
.member-list { display:flex; flex-direction:column; gap:6px; }
.member-item { display:flex; align-items:center; gap:8px; font-size:13px; }
.member-item .msg-avatar { width:26px; height:26px; border-radius:6px; font-size:10px; }
.member-name { color:var(--text1); font-weight:500; }
.member-role-tag { font-size:10px; color:var(--teal); background:var(--teal-light); padding:1px 5px; border-radius:3px; }

/* ===== Responsive ===== */
@media (max-width:768px) {
  .layout { grid-template-columns:1fr !important; }
  .channels, .panel { display:none; }
  .ch-header-desc { display:none; }
}
</style>
</head>

<!-- Topbar -->
<div class="topbar">
  <div class="tb-inner">
    <div class="tb-left">
      <a href="roadmap.html" class="logo">深海圈</a>
      <nav class="nav">
        <a href="roadmap.html">路线图</a>
        <a href="learn.html">学习</a>

    </div>
  </div>
</div>

<!-- Main layout -->
<div class="layout" id="layout">

  <!-- Left: Channels -->
  <aside class="channels">
    <div class="ch-group">
      <div class="ch-label">交流</div>
      <div class="ch-item active" data-channel="lobby" onclick="switchChannel(this)">
        <span class="ch-icon">☕</span>
        <span class="ch-name">大厅</span>
        <span class="ch-badge">5</span>
      </div>
      <div class="ch-item" data-channel="tools" onclick="switchChannel(this)">
        <span class="ch-icon">#</span>
        <span class="ch-name">工具测评</span>
        <span class="ch-unread"></span>
      </div>
      <div class="ch-item" data-channel="pitfalls" onclick="switchChannel(this)">
        <span class="ch-icon">#</span>
        <span class="ch-name">踩坑经验</span>
      </div>
    </div>

    <div class="ch-bottom">
      <div class="ch-user">
        <div class="ch-user-avatar">瓜</div>
        <div class="ch-user-info">
          <div class="ch-user-name">瓜哥</div>
          <div class="ch-user-status">● 在线</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Center: Messages -->
  <main class="msg-area" id="msgArea">
    <!-- Channel header -->
    <div class="ch-header">
      <div class="ch-header-left">
        <div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="ch-header-icon" id="chIcon">☕</span>
            <span class="ch-header-title" id="chTitle">大厅</span>
          </div>
          <div class="ch-header-desc" id="chDesc">随便聊，什么都可以。这里就是深海圈的客厅。</div>
        </div>
      </div>
      <div class="ch-header-right">
        <button class="icon-btn" id="searchToggle" onclick="toggleSearch()" title="搜索">🔍</button>
        <button class="icon-btn" id="panelToggle" onclick="togglePanel()" title="频道信息">ℹ️</button>
      </div>
    </div>

    <!-- Search bar -->
    <div class="search-bar" id="searchBar">
      <input class="search-input" type="text" placeholder="搜索当前频道的消息..." oninput="searchMessages(this.value)">
    </div>

    <!-- Message feed -->
    <div class="msg-feed" id="msgFeed">
      <!-- Content is rendered by JS -->
    </div>

    <!-- Input -->
    <div class="msg-input">
      <div class="input-wrapper">
        <textarea class="msg-textarea" id="msgInput" placeholder="在 ☕ 大厅 中发消息..." rows="1" oninput="autoResize(this); updateSendBtn();" onkeydown="handleKey(event)"></textarea>
        <div class="input-toolbar">
          <div class="input-tools">
            <button class="input-tool" title="Markdown">𝐌</button>
            <button class="input-tool" title="@提及">@</button>
            <button class="input-tool" title="表情">😊</button>
          </div>
          <button class="send-btn disabled" id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
      </div>
    </div>
  </main>

  <!-- Right: Panel -->
  <aside class="panel" id="panel">
    <div id="panelContent">
      <!-- Rendered by JS: thread view or channel info -->
    </div>
  </aside>

</div>

      { id:'l1', author:'陈小飞', color:'#6987b8', time:'09:12', text:'早啊各位！昨天搞到凌晨三点终于把部署搞定了，Vercel 真是救星。', reactions:[{emoji:'👍',count:6,active:false},{emoji:'💪',count:3,active:false}] },

// ===== State =====
let currentChannel = 'lobby';
let panelOpen = false;
let panelMode = 'info'; // 'info' or 'thread'
let currentThread = null;

// ===== Render =====
function renderMessages(channelId, filter) {
  const ch = channelData[channelId];
  const feed = document.getElementById('msgFeed');
  let html = '';

  // Pinned bar
  if (ch.pinned && ch.pinned.length > 0) {
    html += `<div class="pinned-bar" onclick="togglePanel('info')">📌 ${ch.pinned[0]}</div>`;
  }

  ch.messages.forEach(msg => {
    if (msg.date) {
      html += `<div class="date-sep"><span>${msg.date}</span></div>`;
      return;
    }
    if (filter && !msg.text.toLowerCase().includes(filter.toLowerCase())) return;

    const roleHtml = msg.role ? `<span class="msg-role">${msg.role}</span>` : '';
    const reactionsHtml = msg.reactions ? msg.reactions.map(r =>
      `<span class="reaction${r.active?' active':''}" onclick="toggleReaction(this)">${r.emoji} ${r.count}</span>`
    ).join('') : '';

    let threadHtml = '';
    if (msg.thread && ch.type === 'topic') {
      const avatars = msg.thread.authors.map(a =>
        `<span class="mini-avatar" style="background:${getGradient(a)}">${a}</span>`
      ).join('');
      threadHtml = `<div class="thread-indicator" onclick="openThread('${msg.id}')">
        <span>💬 ${msg.thread.count} 条回复</span>
        <div class="thread-avatars">${avatars}</div>
        <span style="color:var(--text4);font-weight:400;">最后回复 ${msg.thread.lastTime}</span>
      </div>`;
    }

    const textHtml = msg.text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/@(\S+)/g, '<strong style="color:var(--teal)">@$1</strong>')
      .replace(/\n/g, '<br>');

    html += `<div class="msg" data-id="${msg.id}">
      <div class="msg-avatar" style="background:${getGradient(msg.author[0])}">${msg.author[0]}</div>
      <div class="msg-body">
        <div class="msg-meta">
          <span class="msg-name">${msg.author}</span>
          ${roleHtml}
          <span class="msg-time">${msg.time}</span>
        </div>
        <div class="msg-text">${textHtml}</div>
        ${reactionsHtml ? `<div class="msg-reactions">${reactionsHtml}</div>` : ''}
        ${threadHtml}
      </div>
      <div class="msg-actions">
        <span class="msg-action" title="表情">😊</span>
        <span class="msg-action" title="回复" onclick="${ch.type==='topic'?`openThread('${msg.id}')`:''}">💬</span>
        <span class="msg-action" title="置顶">📌</span>
      </div>
    </div>`;
  });

  feed.innerHTML = html;
  feed.scrollTop = feed.scrollHeight;
}

function renderPanel() {
  const panel = document.getElementById('panelContent');
  if (panelMode === 'thread' && currentThread && threadData[currentThread]) {
    const td = threadData[currentThread];
    const parentMsg = td.parent;
    const textHtml = parentMsg.text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/`([^`]+)`/g, '<code>$1</code>').replace(/\n/g, '<br>');

    let repliesHtml = td.replies.map(r => {
      const roleTag = r.role ? `<span class="msg-role">${r.role}</span>` : '';
      const rText = r.text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/`([^`]+)`/g, '<code>$1</code>').replace(/@(\S+)/g, '<strong style="color:var(--teal)">@$1</strong>').replace(/\n/g, '<br>');
      return `<div class="thread-reply">
        <div class="msg-avatar" style="background:${getGradient(r.author[0])}">${r.author[0]}</div>
        <div class="msg-body">
          <div class="msg-meta"><span class="msg-name">${r.author}</span>${roleTag}<span class="msg-time">${r.time}</span></div>
          <div class="msg-text">${rText}</div>
        </div>
      </div>`;
    }).join('');

    panel.innerHTML = `
      <div class="panel-header">
        <div class="panel-title">🧵 线程</div>
        <button class="panel-close" onclick="closePanel()">×</button>
      </div>
      <div class="thread-content">
        <div class="thread-parent">
          <div class="msg-meta"><span class="msg-name" style="color:var(--teal)">${parentMsg.author}</span><span class="msg-time">${parentMsg.time}</span></div>
          <div class="msg-text" style="margin-top:4px;">${textHtml}</div>
        </div>
        <div style="font-size:11px;color:var(--text4);padding:0 4px 8px;">${td.replies.length} 条回复</div>
        <div class="thread-replies">${repliesHtml}</div>
      </div>
      <div class="thread-input">
        <textarea placeholder="回复这个线程..." rows="2"></textarea>
        <div class="thread-input-footer">
          <button class="send-btn ready" style="font-size:12px;">回复</button>
        </div>
      </div>`;
  } else {
    const ch = channelData[currentChannel];
    const membersHtml = [
      {name:'刘小排',role:'讲师',color:'#0d9488'},
      {name:'王大锤',role:'助教',color:'#6987b8'},
      {name:'陈小飞',role:'',color:'#6987b8'},
      {name:'李思思',role:'',color:'#b87a9e'},
      {name:'张明',role:'',color:'#b89e6f'},
      {name:'赵薇薇',role:'',color:'#6aafa0'},
      {name:'周杰',role:'',color:'#8b7aaf'},
      {name:'林小鱼',role:'',color:'#c08a7a'},
    ].map(m => `<div class="member-item">
      <div class="msg-avatar" style="background:${getGradient(m.name[0])};width:26px;height:26px;font-size:10px;">${m.name[0]}</div>
      <span class="member-name">${m.name}</span>
      ${m.role ? `<span class="member-role-tag">${m.role}</span>` : ''}
    </div>`).join('');

    const pinnedHtml = ch.pinned ? ch.pinned.map(p => `<div class="pinned-item">📌 ${p}</div>`).join('') : '';

    panel.innerHTML = `
      <div class="panel-header">
        <div class="panel-title">${ch.icon === '☕' ? '☕' : '#'} ${ch.name}</div>
        <button class="panel-close" onclick="closePanel()">×</button>
      </div>
      <div class="info-content">
        <div class="info-section">
          <div class="info-label">简介</div>
          <div class="info-text">${ch.desc}</div>
        </div>
        ${pinnedHtml ? `<div class="info-section"><div class="info-label">置顶消息</div><div class="pinned-list">${pinnedHtml}</div></div>` : ''}
        <div class="info-section">
          <div class="info-label">成员 · 8 人</div>
          <div class="member-list">${membersHtml}</div>
        </div>
      </div>`;
  }
}

// ===== Actions =====
function switchChannel(el) {
  document.querySelectorAll('.ch-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  currentChannel = el.dataset.channel;
  currentThread = null;
  panelMode = 'info';

  const ch = channelData[currentChannel];
  document.getElementById('chIcon').textContent = ch.icon === '#' ? '#' : ch.icon;
  document.getElementById('chTitle').textContent = ch.name;
  document.getElementById('chDesc').textContent = ch.desc;
  document.getElementById('msgInput').placeholder = `在 ${ch.icon === '#' ? '#' : ch.icon} ${ch.name} 中发消息...`;

  // Clear search
  document.getElementById('searchBar').classList.remove('show');
  document.getElementById('searchToggle').classList.remove('active');
  const searchInput = document.querySelector('.search-input');
  if (searchInput) searchInput.value = '';

  // Remove badge
  const badge = el.querySelector('.ch-badge');
  if (badge) badge.remove();
  const dot = el.querySelector('.ch-unread');
  if (dot) dot.remove();

  if (panelOpen) renderPanel();
  renderMessages(currentChannel);
}

function toggleSearch() {
  const bar = document.getElementById('searchBar');
  const btn = document.getElementById('searchToggle');
  bar.classList.toggle('show');
  btn.classList.toggle('active');
  if (bar.classList.contains('show')) {
    bar.querySelector('input').focus();
  } else {
    bar.querySelector('input').value = '';
    renderMessages(currentChannel);
  }
}

function searchMessages(query) {
  renderMessages(currentChannel, query);
}

function togglePanel(mode) {
  if (mode) panelMode = mode;
  if (panelOpen && panelMode === mode) {
    closePanel();
    return;
  }
  panelOpen = true;
  document.getElementById('layout').classList.add('panel-open');
  document.getElementById('panelToggle').classList.add('active');
  renderPanel();
}

function closePanel() {
  panelOpen = false;
  document.getElementById('layout').classList.remove('panel-open');
  document.getElementById('panelToggle').classList.remove('active');
  currentThread = null;
  panelMode = 'info';
}

function openThread(msgId) {
  currentThread = msgId;
  panelMode = 'thread';
  panelOpen = true;
  document.getElementById('layout').classList.add('panel-open');
  renderPanel();
}

function toggleReaction(el) {
  el.classList.toggle('active');
  const parts = el.textContent.trim().split(' ');
  let count = parseInt(parts[1]);
  if (el.classList.contains('active')) count++; else count--;
  el.textContent = parts[0] + ' ' + count;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function updateSendBtn() {
  const btn = document.getElementById('sendBtn');
  const input = document.getElementById('msgInput');
  if (input.value.trim()) {
    btn.classList.remove('disabled');
    btn.classList.add('ready');
  } else {
    btn.classList.add('disabled');
    btn.classList.remove('ready');
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;

  const ch = channelData[currentChannel];
  ch.messages.push({
    id: 'u' + Date.now(),
    author: '瓜哥',
    color: '#0d9488',
    time: new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'}),
    text: text,
    reactions: []
  });

  input.value = '';
  input.style.height = 'auto';
  updateSendBtn();
  renderMessages(currentChannel);
}

// Gradient palette matching community.html's avatar style
function getGradient(name) {
  const gradients = {
    '陈':'linear-gradient(135deg,#dbeafe,#e0e7ff)',
    '王':'linear-gradient(135deg,#dbeafe,#ddd6fe)',
    '李':'linear-gradient(135deg,#fce7f3,#ede9fe)',
    '张':'linear-gradient(135deg,#fef3c7,#fde68a)',
    '赵':'linear-gradient(135deg,#d1fae5,#a7f3d0)',
    '周':'linear-gradient(135deg,#e0e7ff,#ede9fe)',
    '林':'linear-gradient(135deg,#ffe4e6,#fecdd3)',
    '刘':'linear-gradient(135deg,#ccfbf1,#99f6e4)',
  };
  return gradients[name] || 'linear-gradient(135deg,#e2e8f0,#cbd5e1)';
}

// ===== Init =====
renderMessages('lobby');
