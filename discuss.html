<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深海圈 | 广场</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500;1,9..144,600&family=Inter:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="topbar.css">
<style>
:root{
  --font-serif:'Fraunces','Noto Serif SC','Songti SC',serif;
  --font:'Inter','PingFang SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:'JetBrains Mono','SF Mono','Menlo',monospace;
  --bg:#f4faf9; --surface:#ffffff; --surface-2:#eef7f6;
  --brand:#00A8A9; --brand-2:#008789; --brand-bg:#e3f5f5;
  --teal:#00A8A9; --teal-2:#008789; --teal-bg:#e3f5f5; --gold:#c89854;
  --ink:#1a2942; --t1:#1a2942; --t2:#5c7a8a; --t3:#94a3b8; --t4:#b8c5d0;
  --line:#dde7ea; --line-soft:#e6eef0;
  --sh-sm:0 1px 2px rgba(16,74,74,.05);
  --sh:0 1px 2px rgba(16,74,74,.05),0 10px 30px -14px rgba(16,74,74,.13);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:var(--font);background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;line-height:1.5;display:flex;flex-direction:column;overflow:hidden;font-variant-numeric:tabular-nums;}
a{color:inherit;text-decoration:none;}
svg{display:block;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
:focus-visible{outline:2px solid var(--brand);outline-offset:2px;border-radius:4px;}

/* ============ 两栏聊天布局 ============ */
.chat{flex:1 1 auto;min-height:0;display:flex;max-width:1480px;width:100%;margin:0 auto;}

/* 左:频道侧栏 */
.ch-side{flex:0 0 212px;background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0;}
.cs-head{padding:18px 18px 10px;}
.cs-title{font-family:var(--font-serif);font-weight:700;font-size:22px;color:var(--ink);letter-spacing:-.015em;}
.cs-sub{font-size:12px;color:var(--t3);margin-top:2px;}
.cs-list{flex:1 1 auto;overflow-y:auto;padding:4px 9px;}
.cs-item{display:flex;align-items:center;gap:11px;padding:8px 10px;border-radius:11px;cursor:pointer;transition:background .14s cubic-bezier(.2,0,0,1),transform .1s;position:relative;}
.cs-item:hover{background:var(--surface-2);}
.cs-item:active{transform:scale(.99);}
.cs-item.on{background:var(--teal-bg);}
.cs-item.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;border-radius:0 3px 3px 0;background:var(--brand);}
.cs-item.on .ci-name{color:var(--brand-2);font-weight:600;}
.ci-ic{width:34px;height:34px;border-radius:10px;background:var(--surface-2);display:grid;place-items:center;flex:0 0 auto;color:var(--t2);transition:color .15s,background .15s;}
.ci-ic svg{width:19px;height:19px;}
.cs-item:hover .ci-ic{color:var(--brand-2);}
.cs-item.on .ci-ic{background:#fff;color:var(--brand);box-shadow:var(--sh-sm);}
.ci-body{flex:1 1 auto;min-width:0;}
.ci-name{font-size:14px;font-weight:500;color:var(--ink);display:flex;align-items:center;gap:5px;}
.ci-lock{display:inline-flex;vertical-align:-1px;}
.ci-lock svg{width:12px;height:12px;color:var(--t3);}
.ci-prev{font-size:12px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.ci-meta{flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.ci-dot{min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:#f0584b;color:#fff;font-size:11px;font-weight:600;display:grid;place-items:center;box-shadow:0 2px 6px -1px rgba(240,88,75,.5);}
.cs-foot{flex:0 0 auto;border-top:1px solid var(--line-soft);padding:12px 16px;display:flex;align-items:center;gap:10px;}
.cs-foot .av{width:36px;height:36px;border-radius:11px;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:600;font-size:13px;flex:0 0 auto;}
.csf-nm{font-size:14px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:6px;}
.csf-nm .lv{font-size:10.5px;font-weight:600;color:var(--gold);background:#f6ecd9;border-radius:5px;padding:1px 5px;}
.csf-st{font-size:12px;color:var(--t3);}

/* 右:聊天主区 */
.ch-main{flex:1 1 auto;display:flex;flex-direction:column;min-width:0;min-height:0;background:var(--bg);background-image:radial-gradient(1100px 420px at 72% 8%,rgba(0,168,169,.05),transparent),radial-gradient(820px 360px at 8% 96%,rgba(0,168,169,.04),transparent);}
.cm-head{flex:0 0 auto;height:56px;padding:0 22px;display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.72);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);}
.cmh-l{display:flex;align-items:baseline;gap:10px;min-width:0;}
.cmh-name{font-size:16px;font-weight:600;color:var(--ink);}
.cmh-desc{font-size:12.5px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cmh-r{display:flex;align-items:center;gap:4px;flex:0 0 auto;}
.cmh-btn{display:flex;align-items:center;gap:6px;padding:7px 11px;border-radius:9px;font-size:13px;font-weight:500;color:var(--t2);transition:background .15s,color .15s;}
.cmh-btn:hover{background:var(--surface-2);color:var(--t1);}
.cmh-btn:active{transform:scale(.96);}
.cmh-btn svg{width:17px;height:17px;}

/* 群公告条 = 继续学习(减重:更扁更轻) */
.cm-notice{flex:0 0 auto;display:flex;align-items:center;gap:11px;margin:12px max(22px,calc((100% - 860px)/2)) 0;padding:9px 14px;background:var(--teal-bg);border:1px solid #cfeae9;border-radius:12px;}
.cmn-ic{width:30px;height:30px;border-radius:9px;background:#fff;color:var(--brand);display:grid;place-items:center;flex:0 0 auto;box-shadow:var(--sh-sm);}
.cmn-ic svg{width:16px;height:16px;}
.cmn-body{flex:1 1 auto;min-width:0;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;}
.cmn-t{font-size:13px;font-weight:600;color:var(--brand-2);}
.cmn-p{font-size:12px;color:var(--t2);}
.cmn-bar{flex:1 1 120px;height:4px;border-radius:3px;background:#cfeae5;overflow:hidden;max-width:200px;align-self:center;}
.cmn-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--brand),#2cc4b3);border-radius:3px;}
.cmn-go{flex:0 0 auto;font-size:12.5px;font-weight:600;color:var(--brand-2);padding:6px 10px;border-radius:8px;transition:background .15s;}
.cmn-go:hover{background:#d4efee;}

/* 消息流(深海氛围:极淡青光 + 收紧密度) */
.cm-msgs{flex:1 1 auto;overflow-y:auto;padding:14px max(22px,calc((100% - 860px)/2)) 10px;display:flex;flex-direction:column;gap:1px;}
.msg-sys{align-self:center;margin:9px 0;font-size:12px;color:var(--t3);background:rgba(255,255,255,.66);border:1px solid var(--line-soft);border-radius:11px;padding:3px 12px;max-width:80%;text-align:center;}
.msg-sys b{color:var(--t2);font-weight:600;}
.msg-date{align-self:center;margin:13px 0 7px;font-size:11.5px;color:var(--t4);letter-spacing:.03em;}

.msg{display:flex;gap:9px;padding:7px 0 2px;max-width:74%;animation:msgIn .22s cubic-bezier(.16,1,.3,1);}
.msg.cont{padding-top:1px;}
.m-av-sp{width:38px;flex:0 0 auto;}
.msg.cont .m-bubble::before{display:none;}
@keyframes msgIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
.msg .m-av{width:38px;height:38px;border-radius:11px;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:600;font-size:14px;flex:0 0 auto;box-shadow:var(--sh-sm);}
.m-col{display:flex;flex-direction:column;min-width:0;}
.m-top{display:flex;align-items:center;gap:7px;margin-bottom:4px;padding-left:2px;}
.m-name{font-size:12.5px;font-weight:600;color:var(--t2);}
.m-lv{font-size:10px;font-weight:600;color:var(--gold);background:#f6ecd9;border-radius:5px;padding:1px 5px;}
.m-role{font-size:11.5px;color:var(--t4);}
.m-badge{font-size:11px;font-weight:600;border-radius:6px;padding:1px 7px;}
.m-badge.报喜{color:var(--gold);background:#f6ecd9;}
.m-badge.求助{color:#c2742a;background:#f8ecdd;}
.m-badge.助教{color:var(--brand-2);background:var(--teal-bg);}
.m-bubble{position:relative;background:#fff;border-radius:5px 14px 14px 14px;padding:9px 13px;font-size:14.5px;color:var(--ink);line-height:1.58;word-break:break-word;text-wrap:pretty;box-shadow:0 1px 2px rgba(16,74,74,.05),0 5px 14px -10px rgba(16,74,74,.16);}
.m-bubble::before{content:'';position:absolute;top:8px;left:-5px;border:6px solid transparent;border-right-color:#fff;border-left-width:0;}
.m-bubble img{max-width:240px;border-radius:10px;margin-top:7px;display:block;}
.m-course{display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:5px 10px;border-radius:9px;background:var(--teal-bg);color:var(--brand-2);font-size:12px;font-weight:500;cursor:pointer;transition:background .15s;}
.m-course svg{width:13px;height:13px;}
.m-course:hover{background:#d4efee;}
.m-time{font-size:11px;color:var(--t4);margin-top:5px;padding-left:2px;}
.m-react{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
.m-rx{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:11px;background:#fff;border:1px solid var(--line);font-size:12px;color:var(--t2);cursor:pointer;transition:all .14s;box-shadow:var(--sh-sm);}
.m-rx:hover{border-color:#bfe0d9;}
.m-rx.on{background:var(--teal-bg);border-color:#bfe0d9;color:var(--brand-2);}

/* 自己的消息靠右 */
.msg.me{margin-left:auto;flex-direction:row-reverse;}
.msg.me .m-col{align-items:flex-end;}
.msg.me .m-top{flex-direction:row-reverse;padding:0 2px 0 0;}
.msg.me .m-bubble{background:linear-gradient(135deg,#12b1b1,var(--brand));color:#fff;border-radius:14px 5px 14px 14px;box-shadow:0 2px 10px -3px rgba(0,168,169,.4);}
.msg.me .m-bubble::before{left:auto;right:-5px;border-right-width:0;border-left-color:#08a2a3;}
.msg.me .m-course{background:rgba(255,255,255,.18);color:#eafaf7;}
.msg.me .m-time{padding:0 2px 0 0;}
.msg.me .m-react{flex-direction:row-reverse;}

/* hover 浮出回应条 */
.m-bubble-wrap{position:relative;}
.m-quick{position:absolute;top:-15px;right:8px;display:none;gap:1px;background:#fff;border:1px solid var(--line);border-radius:13px;padding:2px 4px;box-shadow:var(--sh);}
.msg:hover .m-quick{display:flex;}
.msg.me .m-quick{right:auto;left:8px;}
.m-quick button{font-size:14px;padding:3px 5px;border-radius:8px;line-height:1;display:grid;place-items:center;transition:background .14s;}
.m-quick button:hover{background:var(--surface-2);}
.m-quick .mq-reply svg{width:14px;height:14px;color:var(--t2);}

/* 输入区 */
.cm-input{flex:0 0 auto;border-top:1px solid var(--line);background:var(--surface);padding:10px max(22px,calc((100% - 860px)/2)) 15px;}
.cmi-tools{display:flex;align-items:center;gap:2px;margin-bottom:6px;}
.cmi-tool{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:var(--t2);transition:background .15s,color .15s;}
.cmi-tool svg{width:20px;height:20px;}
.cmi-tool:hover{background:var(--surface-2);color:var(--brand-2);}
.cmi-tool:active{transform:scale(.94);}
.cmi-row{display:flex;align-items:flex-end;gap:10px;}
.cmi-box{flex:1 1 auto;}
.cmi-box textarea{width:100%;resize:none;border:1px solid var(--line);border-radius:13px;padding:11px 15px;font-family:inherit;font-size:14.5px;color:var(--ink);background:var(--bg);max-height:120px;line-height:1.5;transition:border-color .15s,background .15s;}
.cmi-box textarea:focus{outline:none;border-color:#aadedd;background:#fff;box-shadow:0 0 0 3px rgba(0,168,169,.08);}
.cmi-send{flex:0 0 auto;display:flex;align-items:center;gap:6px;padding:11px 22px;border-radius:12px;background:var(--brand);color:#fff;font-size:14px;font-weight:600;transition:background .15s,transform .1s;box-shadow:0 4px 12px -4px rgba(0,168,169,.5);}
.cmi-send:hover{background:var(--brand-2);}
.cmi-send:active{transform:scale(.97);}

/* emoji 弹层 */
.emoji-pop{position:absolute;bottom:92px;left:22px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:8px;box-shadow:var(--sh);display:none;grid-template-columns:repeat(8,1fr);gap:2px;z-index:30;}
.emoji-pop.show{display:grid;}
.emoji-pop button{font-size:19px;padding:5px;border-radius:9px;transition:background .12s;}
.emoji-pop button:hover{background:var(--surface-2);}

/* 成员面板 */
.ch-members{position:fixed;top:0;right:-330px;width:316px;height:100%;background:var(--surface);border-left:1px solid var(--line);box-shadow:-16px 0 48px -22px rgba(16,74,74,.28);transition:right .26s cubic-bezier(.4,0,.2,1);z-index:60;display:flex;flex-direction:column;}
.ch-members.show{right:0;}
.mb-head{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:18px 20px 12px;border-bottom:1px solid var(--line-soft);}
.mb-title{font-size:15px;font-weight:600;color:var(--ink);}
.mb-x{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;color:var(--t3);transition:background .15s;}
.mb-x svg{width:17px;height:17px;}
.mb-x:hover{background:var(--surface-2);color:var(--t1);}
.mb-sub{padding:12px 20px 6px;font-size:12.5px;color:var(--t3);}
.mb-sub b{color:var(--brand-2);}
.mb-list{flex:1 1 auto;overflow-y:auto;padding:4px 12px 16px;}
.mb-row{display:flex;align-items:center;gap:11px;padding:8px;border-radius:11px;transition:background .14s;}
.mb-row:hover{background:var(--surface-2);}
.mb-row .ua{width:38px;height:38px;border-radius:12px;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:600;font-size:13px;flex:0 0 auto;position:relative;}
.mb-row .ua .on-d{position:absolute;right:-1px;bottom:-1px;width:11px;height:11px;border-radius:50%;background:#22c55e;border:2px solid #fff;}
.mb-nm{font-size:13.5px;font-weight:500;color:var(--ink);display:flex;align-items:center;gap:6px;}
.mb-nm .tag{font-size:10px;font-weight:600;color:var(--brand-2);background:var(--teal-bg);border-radius:5px;padding:1px 6px;}
.mb-de{font-size:12px;color:var(--t3);}
.mb-mask{position:fixed;inset:0;background:rgba(16,40,50,.2);opacity:0;pointer-events:none;transition:opacity .26s;z-index:55;}
.mb-mask.show{opacity:1;pointer-events:auto;}

/* toast */
.toast{position:fixed;left:50%;bottom:40px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:12px;font-size:13.5px;opacity:0;pointer-events:none;transition:all .25s;z-index:200;box-shadow:0 14px 36px -10px rgba(0,0,0,.45);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:#cfdbde;border-radius:9px;border:2px solid var(--surface);}
::-webkit-scrollbar-thumb:hover{background:#b6c7cb;}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}

/* ============ 私聊(DM) ============ */
.cs-sep{margin:9px 16px 5px;text-align:center;color:var(--line);font-size:11px;letter-spacing:.34em;user-select:none;}
.ci-av{width:34px;height:34px;border-radius:11px;background:var(--surface-2);background-size:cover;background-position:center;flex:0 0 auto;box-shadow:var(--sh-sm);}
.ci-name .tag{font-size:10px;font-weight:600;color:var(--brand-2);background:var(--teal-bg);border-radius:5px;padding:1px 6px;}
.ci-time{font-size:11px;color:var(--t4);}
.cs-item.dm.on .ci-av{box-shadow:0 0 0 2px #fff,0 0 0 4px rgba(0,168,169,.35);}
/* 消息头像可点 = 私戳 */
.m-av.clk{cursor:pointer;transition:transform .12s,box-shadow .15s;}
.m-av.clk:hover{transform:translateY(-1px);box-shadow:0 4px 12px -3px rgba(0,168,169,.5);}
/* 成员行 = 私聊入口 */
.mb-row{cursor:pointer;}
.mb-go{margin-left:auto;flex:0 0 auto;display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;color:var(--brand-2);background:var(--teal-bg);border-radius:8px;padding:4px 9px;opacity:0;transform:translateX(4px);transition:opacity .15s,transform .15s;}
.mb-go svg{width:13px;height:13px;}
.mb-row:hover .mb-go{opacity:1;transform:none;}
/* 对方正在输入 */
.msg-typing{display:flex;gap:9px;padding:7px 0 6px;max-width:74%;animation:msgIn .22s cubic-bezier(.16,1,.3,1);}
.msg-typing .m-av{width:38px;height:38px;border-radius:11px;background:var(--brand);background-size:cover;background-position:center;flex:0 0 auto;box-shadow:var(--sh-sm);color:transparent;}
.msg-typing .tb{display:flex;align-items:center;gap:5px;background:#fff;border-radius:5px 14px 14px 14px;padding:13px 15px;box-shadow:0 1px 2px rgba(16,74,74,.05),0 5px 14px -10px rgba(16,74,74,.16);}
.msg-typing .tb i{width:6px;height:6px;border-radius:50%;background:var(--t3);animation:tdot 1.1s infinite ease-in-out;}
.msg-typing .tb i:nth-child(2){animation-delay:.16s;}
.msg-typing .tb i:nth-child(3){animation-delay:.32s;}
@keyframes tdot{0%,70%,100%{opacity:.28;transform:translateY(0);}35%{opacity:1;transform:translateY(-4px);}}

@media(max-width:880px){
  .ch-side{flex-basis:74px;}
  .cs-title,.cs-sub,.ci-body,.ci-meta,.csf-nm,.csf-st{display:none;}
  .cs-item{justify-content:center;padding:8px;}
  .cs-foot{justify-content:center;}
}
</style>
</head>
<body>

<!-- 全站统一顶栏(topbar.js 自动挂载，topbar.css 样式) -->
<header id="ds-topbar"></header>

<!-- ============ 两栏群聊 ============ -->
<div class="chat">

  <!-- 左:频道列表 -->
  <aside class="ch-side">
    <div class="cs-head">
      <div class="cs-title">广场</div>
      <div class="cs-sub">深海圈的群聊 · 随时来唠</div>
    </div>
    <div class="cs-list" id="csList"></div>
    <div class="cs-foot">
      <div class="av" data-nm="瓜哥">瓜</div>
      <div>
        <div class="csf-nm">瓜哥 <span class="lv">Lv.2</span></div>
        <div class="csf-st">零基础 · 在线</div>
      </div>
    </div>
  </aside>

  <!-- 右:聊天窗 -->
  <main class="ch-main">
    <div class="cm-head">
      <div class="cmh-l">
        <span class="cmh-name" id="cmName">大厅</span>
        <span class="cmh-desc" id="cmDesc">随便聊，灌水唠嗑都在这</span>
      </div>
      <div class="cmh-r">
        <button class="cmh-btn" id="memBtn" onclick="toggleMembers()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M15.5 19v-1.4a3.4 3.4 0 0 0-3.4-3.4H7.4A3.4 3.4 0 0 0 4 17.6V19"/><circle cx="9.7" cy="8" r="3.1"/><path d="M20 19v-1.4a3.4 3.4 0 0 0-2.5-3.3M14.8 5a3.1 3.1 0 0 1 0 6"/></svg> <b id="cmCount">35</b></button>
        <button class="cmh-btn" title="更多"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5.5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="18.5" cy="12" r="1.6"/></svg></button>
      </div>
    </div>

    <div class="cm-notice">

/* ===== 私聊 状态(localStorage) ===== */
function isDM(id){return typeof id==='string'&&id.indexOf('dm:')===0;}
function dmName(id){return id.slice(3);}
function dmOpen(){try{const v=JSON.parse(localStorage.getItem('ds_dm_open'));if(Array.isArray(v))return v;}catch(e){}return DM_DEFAULT.slice();}
function setDmOpen(a){localStorage.setItem('ds_dm_open',JSON.stringify(a));}
function dmUnread(){try{const v=JSON.parse(localStorage.getItem('ds_dm_unread'));if(v&&typeof v==='object')return v;}catch(e){}return Object.assign({},DM_UNREAD_DEFAULT);}
function setDmUnread(o){localStorage.setItem('ds_dm_unread',JSON.stringify(o));}
function dmBump(name){const a=dmOpen();const i=a.indexOf(name);if(i>0){a.splice(i,1);a.unshift(name);}else if(i<0){a.unshift(name);}setDmOpen(a);}
function nowHHMM(){const n=new Date();return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
function peerInfo(name){const m=MEMBERS.find(x=>x.nm===name);return m?{de:m.de||'',tag:m.tag||''}:{de:'',tag:''};}
function dmReply(name){const pool=DM_REPLY[name]||DM_REPLY._default;return pool[Math.floor(Math.random()*pool.length)];}

function escapeHtml(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

}

/* ===== 消息存取(localStorage 让自己发的留得住) ===== */
function msgsOf(id){
  const seed=isDM(id)?(DM_SEED[dmName(id)]||[]):(SEED[id]||[]);
  let mine=[];
  try{mine=JSON.parse(localStorage.getItem('ds_chat_'+id)||'[]');}catch(e){}
  return seed.concat(mine);
}
/* 列表行右上角时间戳：今天显示时分，更早显示日期(昨天/...) */
function lastStamp(id){
  const a=msgsOf(id);
  for(let i=a.length-1;i>=0;i--){const m=a[i];if(m.sys)continue;return (m.day&&m.day!=='今天')?m.day:(m.time||'');}
  return '';
}
function pushMine(id,m){
  let mine=[];
  try{mine=JSON.parse(localStorage.getItem('ds_chat_'+id)||'[]');}catch(e){}
  mine.push(m);
  localStorage.setItem('ds_chat_'+id,JSON.stringify(mine));
}

  const img=m.img?`<img src="${m.img}" alt="">`:'';
  let rx='';
  if(m.reacts){rx='<div class="m-react">'+Object.keys(m.reacts).map(k=>`<span class="m-rx" onclick="react(this)">${k} ${m.reacts[k]}</span>`).join('')+'</div>';}
  const time=showTime?`<div class="m-time">${escapeHtml(m.time||'')}</div>`:'';
  return `<div class="msg${me?' me':''}${cont?' cont':''}">
    ${av}
    <div class="m-col">
      ${top}
      <div class="m-bubble-wrap">
        <div class="m-bubble">${escapeHtml(m.text).replace(/\n/g,'<br>')}${course}${img}</div>
        <div class="m-quick"><button onclick="quickReact(this,'👍')">👍</button><button onclick="quickReact(this,'🎉')">🎉</button><button onclick="quickReact(this,'❤️')">❤️</button><button class="mq-reply" onclick="toast('引用回复:原型示意')" title="回复">${REPLY_SVG}</button></div>
      </div>
      ${rx}
      ${time}
    </div>
  </div>`;
}

/* ===== 切换频道 ===== */
function pickChannel(id){
  const c=CHANNELS.find(x=>x.id===id);
  if(!c) return;
  if(c.locked){ toast('「千刀专属」群 · 千刀以上学员审核通过后可进'); return; }
  curCh=id;
  renderChannels();
  renderChat();
}
/* 打开某人的私聊(已在列表里) */
function pickDM(name){
  curCh='dm:'+name;
  const u=dmUnread();
  if(u[name]){delete u[name];setDmUnread(u);}
  renderChannels();
  renderChat();
}
/* 发起私戳(右侧成员 / 群里点头像)：没聊过就新建，落到左边列表 */
function openDM(name){
  if(name===ME) return;
  dmBump(name);
  pickDM(name);
  document.getElementById('members').classList.remove('show');
  document.getElementById('mbMask').classList.remove('show');
}
function renderChat(){
  const dm=isDM(curCh);
  const notice=document.querySelector('.cm-notice');
  const memBtn=document.getElementById('memBtn');
  if(dm){
    const nm=dmName(curCh);
    const info=peerInfo(nm);
    document.getElementById('cmName').textContent=nm;
    document.getElementById('cmDesc').textContent='私聊'+(info.tag?' · '+info.tag:'')+(info.de?' · '+info.de:'');
    if(notice)notice.style.display='none';
    if(memBtn)memBtn.style.display='none';
  }else{
    const c=CHANNELS.find(x=>x.id===curCh);
    document.getElementById('cmName').textContent=c.name;
    document.getElementById('cmDesc').textContent=c.desc;
    document.getElementById('cmCount').textContent=c.count;
    document.getElementById('mbTitle').textContent=c.name+' · 群成员';
    document.getElementById('mbOnline').textContent=c.count;
    document.getElementById('mbNoob').textContent=c.noob;
    if(notice)notice.style.display='';
    if(memBtn)memBtn.style.display='';
  }
  const arr=msgsOf(curCh);
  const box=document.getElementById('msgs');
  if(!arr.length){box.innerHTML='<div class="msg-sys">'+(dm?'还没聊过，打个招呼吧 👋':'这个群还很安静，来发第一条吧')+'</div>';}
  else{let html='',lastDay=null,prevWho=null;arr.forEach((m,i)=>{const d=m.day||'今天';if(d!==lastDay){html+=`<div class="msg-date">${d}</div>`;lastDay=d;prevWho=null;}if(m.sys){html+=msgHTML(m);prevWho=null;return;}const cont=prevWho===m.who;const nx=arr[i+1];const nextCont=nx&&!nx.sys&&nx.who===m.who&&(nx.day||'今天')===d;html+=msgHTML(m,cont,!nextCont,dm);prevWho=m.who;});box.innerHTML=html;}
  paintAvatars(box);
  box.scrollTop=box.scrollHeight;
}

/* ===== 发消息 ===== */
function autoGrow(t){t.style.height='auto';t.style.height=Math.min(t.scrollHeight,120)+'px';}
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
function send(){
  const inp=document.getElementById('inp');
  const txt=inp.value.trim();
  if(!txt) return;
  const m={who:ME,lv:2,role:'',text:txt,time:nowHHMM(),day:'今天'};
  pushMine(curCh,m);
  inp.value='';autoGrow(inp);
  if(isDM(curCh)){
    const peer=dmName(curCh);
    dmBump(peer);
    renderChat();renderChannels();
    showTyping(peer);
    setTimeout(()=>{
      hideTyping();
      pushMine('dm:'+peer,{who:peer,text:dmReply(peer),time:nowHHMM(),day:'今天'});
      dmBump(peer);
      if(curCh==='dm:'+peer){renderChat();}
      else{const u=dmUnread();u[peer]=(u[peer]||0)+1;setDmUnread(u);}
      renderChannels();
    },850+Math.floor(Math.random()*550));
    return;
  }
  renderChat();
  renderChannels();
}
/* 对方"正在输入…" */
function showTyping(peer){
  const box=document.getElementById('msgs');
  hideTyping();
  const el=document.createElement('div');
  el.className='msg-typing';el.id='typingRow';
  el.innerHTML='<div class="m-av" data-nm="'+escapeHtml(peer)+'">'+escapeHtml(peer[0])+'</div><div class="tb"><i></i><i></i><i></i></div>';
  box.appendChild(el);
  paintAvatars(box);
  box.scrollTop=box.scrollHeight;
}
function hideTyping(){const t=document.getElementById('typingRow');if(t)t.remove();}

/* ===== 表情回应 ===== */
function react(el){
  el.classList.toggle('on');
  const m=el.textContent.trim().match(/^(\S+)\s*(\d*)$/);
  if(!m) return;
  let n=parseInt(m[2]||'0',10);
  n=el.classList.contains('on')?n+1:Math.max(0,n-1);
  el.textContent=m[1]+' '+n;
}
function quickReact(btn,emo){
  const col=btn.closest('.m-col');
  let row=col.querySelector('.m-react');
  if(!row){row=document.createElement('div');row.className='m-react';col.insertBefore(row,col.querySelector('.m-time'));}
  let chip=[...row.children].find(c=>c.textContent.trim().startsWith(emo));
  if(chip){react(chip);}
  else{chip=document.createElement('span');chip.className='m-rx on';chip.textContent=emo+' 1';chip.onclick=function(){react(chip);};row.appendChild(chip);}
  toast('已回应 '+emo);
}

/* ===== emoji 弹层 ===== */
const EMOJIS=['😀','😄','😂','🥹','😭','🤔','👍','🙏','🎉','❤️','🔥','💪','👀','✨','🚀','💡','☕','🌊','😅','🙌','🤝','👏','💰','🌍'];
function toggleEmoji(e){
  e.stopPropagation();
  const pop=document.getElementById('emojiPop');
  if(!pop.innerHTML){pop.innerHTML=EMOJIS.map(x=>`<button onclick="insEmoji('${x}')">${x}</button>`).join('');}
  pop.classList.toggle('show');
}
function insEmoji(x){const inp=document.getElementById('inp');inp.value+=x;inp.focus();autoGrow(inp);document.getElementById('emojiPop').classList.remove('show');}
document.addEventListener('click',()=>document.getElementById('emojiPop').classList.remove('show'));
function atMember(){const inp=document.getElementById('inp');inp.value+=' @王大锤 ';inp.focus();toast('@ 某人:原型示意');}

/* ===== 成员面板 ===== */
function renderMembers(){
  const goIc='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 6.5A2 2 0 0 1 6.5 4.5h11a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H9.5l-4 3v-3a2 2 0 0 1-1-1.7z"/></svg>';
  document.getElementById('mbList').innerHTML=MEMBERS.map(m=>{
    const tag=m.tag?`<span class="tag">${m.tag}</span>`:'';
    return `<div class="mb-row" onclick="openDM('${m.nm}')" title="私聊 ${escapeHtml(m.nm)}"><div class="ua" data-nm="${m.nm}">${m.nm[0]}<span class="on-d"></span></div><div><div class="mb-nm">${m.nm}${tag}</div><div class="mb-de">${m.de}</div></div><span class="mb-go">${goIc}私聊</span></div>`;
  }).join('');
  paintAvatars(document.getElementById('mbList'));
}
function toggleMembers(){
  document.getElementById('members').classList.toggle('show');
  document.getElementById('mbMask').classList.toggle('show');
}

/* ===== toast ===== */
let _tt;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2400);}

/* ===== init ===== */
renderChannels();
renderChat();
renderMembers();
paintAvatars();
</script>
<script src="topbar.js"></script>
</body>
