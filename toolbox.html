<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深海圈 | AI 工具箱</title>
<style>
:root {
  --font: 'PingFang SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', monospace;
  --serif: 'Songti SC', 'STSong', Georgia, serif;
  --bg: #f7f8fa;
  --white: #ffffff;
  --teal: #14b8a6;
  --teal-light: #e6f7f5;
  --teal-dark: #0d9488;
  --deep-blue: #1a2942;
  --gold: #c89854;
  --gold-soft: rgba(200, 152, 84, 0.15);
  --text1: #1a1a2e;
  --text2: #666666;
  --text3: #999999;
  --text4: #b8c5cc;
  --border: #e8eaed;
  --border-soft: #f0f2f4;
  --success: #22c55e;
  --gradient: linear-gradient(180deg, #e8f4f2 0%, #f7f8fa 100%);
  --radius: 12px;
  --shadow: 0 1px 2px rgba(30,58,82,.04), 0 8px 28px -12px rgba(30,58,82,.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--font); background:var(--bg); color:var(--text1); -webkit-font-smoothing:antialiased; min-height:100vh; }
a { color:inherit; text-decoration:none; }
button { font-family:inherit; border:none; background:none; cursor:pointer; color:inherit; }

/* ============ TOPBAR ============ */
.topbar { position:sticky; top:0; z-index:50; background:rgba(247,248,250,.92); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); height:56px; display:flex; align-items:center; padding:0 40px; }
.tb-inner { max-width:1280px; width:100%; margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:24px; }
.tb-left { display:flex; align-items:center; gap:28px; }
.logo { font-size:17px; font-weight:700; color:var(--teal); }
.nav { display:flex; gap:18px; }
.nav a { font-size:13.5px; color:var(--text2); transition:color .15s; padding:4px 0; border-bottom:2px solid transparent; }
.nav a:hover { color:var(--text1); }
.nav a.active { color:var(--text1); font-weight:600; border-bottom-color:var(--teal); }
.avatar { width:32px; height:32px; border-radius:50%; background:var(--teal); color:#fff; display:grid; place-items:center; font-size:13px; font-weight:600; cursor:pointer; transition:transform .2s; }
.avatar:hover { transform:scale(1.05); }

/* ============ HERO ============ */
.hero { background:var(--gradient); padding:40px 32px 28px; border-bottom:1px solid var(--border); }
.hero-inner { max-width:1280px; margin:0 auto; }
.hero-eyebrow { font-family:var(--mono); font-size:11px; color:var(--teal-dark); letter-spacing:.1em; text-transform:uppercase; margin-bottom:6px; }
.hero h1 { font-size:30px; font-weight:700; letter-spacing:-.5px; margin-bottom:6px; }
.hero h1 .accent { color:var(--teal-dark); font-family:var(--serif); font-style:italic; font-weight:600; }
.hero p { font-size:14.5px; color:var(--text2); max-width:680px; line-height:1.65; }

/* ============ LAYOUT ============ */
.page { max-width:1280px; margin:0 auto; padding:32px; display:grid; grid-template-columns:240px 1fr; gap:32px; align-items:start; }

.sidebar { position:sticky; top:88px; }
.sb-title { font-size:11px; font-weight:600; color:var(--text3); letter-spacing:.1em; text-transform:uppercase; margin-bottom:10px; padding:0 4px; }
.sb-list { display:flex; flex-direction:column; gap:2px; }
.sb-item { display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:8px; font-size:13.5px; color:var(--text2); cursor:pointer; transition:all .15s; }
.sb-item:hover { background:var(--white); color:var(--text1); }
.sb-item.active { background:var(--teal-light); color:var(--teal-dark); font-weight:600; }
.sb-item-icon { width:26px; height:26px; border-radius:6px; background:var(--white); border:1px solid var(--border); display:grid; place-items:center; font-size:13px; font-weight:600; color:var(--teal-dark); flex-shrink:0; }
.sb-item.active .sb-item-icon { background:var(--teal); color:#fff; border-color:var(--teal); }
.sb-item-meta { font-family:var(--mono); font-size:10.5px; color:var(--text3); margin-left:auto; }

/* ============ MAIN PANEL ============ */
.panel { background:var(--white); border:1px solid var(--border); border-radius:var(--radius); padding:32px; box-shadow:var(--shadow); min-height:600px; }
.panel-header { padding-bottom:20px; margin-bottom:24px; border-bottom:1px solid var(--border-soft); }
.panel-stage { font-family:var(--mono); font-size:11px; color:var(--teal-dark); letter-spacing:.1em; text-transform:uppercase; margin-bottom:6px; }
.panel-title { font-size:22px; font-weight:700; letter-spacing:-.3px; margin-bottom:6px; }
.panel-desc { font-size:14px; color:var(--text2); line-height:1.65; }

/* Form */
.form { display:flex; flex-direction:column; gap:20px; max-width:680px; }
.field-group { display:flex; flex-direction:column; gap:8px; }
.field-label { font-size:12px; font-weight:600; color:var(--text2); letter-spacing:.06em; text-transform:uppercase; }
.field-hint { font-size:12px; color:var(--text3); margin-top:-2px; }
.field-input, .field-textarea {
  width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:6px;
  font-family:inherit; font-size:14px; color:var(--text1); background:var(--white);
  resize:vertical; outline:none; transition:border-color .15s;
}
.field-textarea { min-height:80px; line-height:1.6; }
.field-input:focus, .field-textarea:focus { border-color:var(--teal); }

.radio-group { display:flex; gap:8px; flex-wrap:wrap; }
.radio-chip {
  padding:7px 14px; border:1px solid var(--border); border-radius:6px;
  background:var(--white); color:var(--text2); font-size:13px;
  cursor:pointer; transition:all .15s;
}
.radio-chip:hover { border-color:var(--teal); color:var(--teal-dark); }
.radio-chip.selected { background:var(--teal); border-color:var(--teal); color:#fff; font-weight:500; }

.btn-run {
  display:inline-flex; align-items:center; gap:8px;
  padding:11px 22px; border-radius:6px;
  background:var(--deep-blue); color:#fff;
  font-family:inherit; font-size:14px; font-weight:600;
  cursor:pointer; transition:opacity .15s;
  align-self:flex-start;
}
.btn-run:hover { opacity:.88; }
.btn-run:disabled { opacity:.4; cursor:not-allowed; }
.btn-run svg { width:14px; height:14px; }

/* Output */
.output { margin-top:32px; padding-top:28px; border-top:1px solid var(--border-soft); display:none; }
.output.show { display:block; animation:fadeIn .3s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

.output-header { display:flex; align-items:center; gap:10px; margin-bottom:18px; }
.output-avatar { width:30px; height:30px; border-radius:50%; background:#fff url('assets/liuxiaopai-avatar.png') center / cover no-repeat; box-shadow:0 0 0 1px rgba(13,148,136,.35); display:grid; }
.output-by { font-size:13px; font-weight:600; color:var(--deep-blue); }
.output-by-role { font-size:11.5px; color:var(--text3); font-family:var(--mono); margin-left:auto; }

.out-section { margin-top:18px; }
.out-section:first-of-type { margin-top:0; }
.out-label { font-size:11px; font-weight:600; color:var(--text2); letter-spacing:.08em; text-transform:uppercase; margin-bottom:8px; }

.verdict-card {
  padding:14px 16px; background:var(--teal-light); border:1px solid var(--teal);
  border-radius:8px; font-size:14.5px; line-height:1.65; color:var(--text1);
}
.verdict-card strong { color:var(--teal-dark); font-weight:700; }

.list-card { display:flex; flex-direction:column; gap:6px; }
.list-card-item {
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  padding:10px 14px; background:var(--bg); border:1px solid var(--border);
  border-radius:6px; font-size:13.5px;
}
.list-card-item .left { color:var(--text1); font-weight:500; }
.list-card-item .right { font-family:var(--mono); font-size:12px; color:var(--teal-dark); }

.idea-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:14px; }
.idea-card {
  padding:16px 18px; background:var(--bg); border:1px solid var(--border);
  border-radius:10px; transition:all .15s;
}
.idea-card:hover { border-color:var(--teal); }
.idea-card-name { font-size:15px; font-weight:700; color:var(--text1); margin-bottom:6px; }
.idea-card-desc { font-size:13px; color:var(--text2); line-height:1.55; margin-bottom:10px; }
.idea-card-meta { display:flex; flex-wrap:wrap; gap:6px; }
.idea-tag { font-size:11px; padding:2px 7px; border-radius:4px; background:var(--white); border:1px solid var(--border); color:var(--text2); }
.idea-tag.diff-easy { background:#e6f7f5; color:var(--teal-dark); border-color:var(--teal-light); }
.idea-tag.diff-med  { background:var(--gold-soft); color:#9c7028; border-color:rgba(200,152,84,.4); }
.idea-tag.diff-hard { background:#fde6e6; color:#c0392b; border-color:#f5c8c8; }

.landing-preview {
  padding:28px 24px; background:linear-gradient(135deg, #1a2942 0%, #2d4561 100%);
  border-radius:10px; color:#fff;
}
.landing-title { font-size:26px; font-weight:800; letter-spacing:-.3px; line-height:1.25; margin-bottom:10px; }
.landing-sub { font-size:15px; color:#c2cad6; line-height:1.55; margin-bottom:20px; }
.landing-cta { display:inline-block; padding:10px 22px; border-radius:6px; background:var(--teal); color:#fff; font-size:14px; font-weight:600; }
.landing-points { display:grid; grid-template-columns:repeat(2, 1fr); gap:10px 18px; margin-top:24px; padding-top:20px; border-top:1px solid rgba(255,255,255,.12); }
.landing-point { font-size:13px; color:#c2cad6; }
.landing-point::before { content:'✓'; color:var(--teal); font-weight:700; margin-right:6px; }

.action-list { display:flex; flex-direction:column; gap:8px; }
.action-item {
  display:flex; gap:14px; padding:12px 14px; background:var(--bg);
  border:1px solid var(--border); border-radius:8px;
}
.action-num {
  width:24px; height:24px; border-radius:50%; background:var(--teal); color:#fff;
  display:grid; place-items:center; font-size:12px; font-weight:700; flex-shrink:0;
}
.action-body { flex:1; }
.action-platform { font-size:11.5px; font-weight:700; color:var(--teal-dark); letter-spacing:.04em; text-transform:uppercase; margin-bottom:3px; }
.action-text { font-size:13.5px; color:var(--text1); line-height:1.55; }
.action-effort { font-family:var(--mono); font-size:11px; color:var(--text3); margin-top:4px; }

.empty-state {
  padding:48px 20px; text-align:center; color:var(--text3); font-size:14px;
}
.empty-state .empty-icon { font-size:32px; margin-bottom:10px; opacity:.5; }

.coming-soon {
  display:inline-block; margin-left:8px; padding:2px 7px; border-radius:4px;
  background:var(--gold-soft); color:var(--gold);
  font-size:10.5px; font-weight:600; letter-spacing:.04em;
}

@media (max-width: 900px) {
  .page { grid-template-columns:1fr; padding:20px; }
  .sidebar { position:static; }
  .sb-list { flex-direction:row; overflow-x:auto; padding-bottom:6px; }
  .sb-item { flex-shrink:0; }
  .panel { padding:24px 20px; min-height:auto; }
  .landing-points { grid-template-columns:1fr; }
}
.snav{display:flex;gap:2px;font-family:'Sora','PingFang SC',-apple-system,sans-serif;}
.snav .l1-item{position:relative;}
.snav-a{font-family:'Sora','PingFang SC',-apple-system,sans-serif;font-size:14px;color:#5e7280;padding:6px 12px;border-radius:7px;background:none;border:none;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
.snav-a::after{content:'▾';font-size:10px;color:#aab6c1;transition:transform .2s;}
.snav-a:hover{color:#1d2b3a;background:#f4f7f8;}
.snav-a.active{color:#22384e;font-weight:600;}
.snav-a.open{color:#0b7c71;background:#e8f3f2;}
.snav-a.open::after{transform:rotate(180deg);color:#0b7c71;}
.snav-pop{position:absolute;top:calc(100% + 10px);left:0;min-width:184px;background:#fff;border:1px solid #eef3f4;border-radius:12px;box-shadow:0 12px 34px -8px rgba(34,56,78,.18),0 2px 8px rgba(34,56,78,.06);padding:7px;z-index:90;opacity:0;transform:translateY(-8px);pointer-events:none;transition:opacity .18s ease,transform .18s cubic-bezier(.22,1,.36,1);}
.snav-pop.open{opacity:1;transform:translateY(0);pointer-events:auto;}
.snav-pop a{display:flex;align-items:center;justify-content:space-between;gap:16px;font-size:13.5px;color:#1d2b3a;padding:9px 12px;border-radius:8px;transition:background .12s;text-decoration:none;white-space:nowrap;}
.snav-pop a:hover{background:#e8f3f2;color:#0b7c71;}
.snav-pop a .ext{font-size:11px;color:#aab6c1;}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-inner">
    <div class="tb-left">
      <a href="roadmap.html" class="logo">深海圈</a>
      <nav class="snav" id="snav"></nav>
    </div>
    <a href="profile.html" class="avatar">瓜</a>
  </div>
</div>

<section class="hero">
  <div class="hero-inner">
    <div class="hero-eyebrow">AI · TOOLBOX</div>
    <h1>AI 工具箱 · <span class="accent">让 AI 接手卡点</span></h1>
    <p>不是聊天，是单次产出。每个工具都对应你做产品路上一个高频卡点——选 idea、选技术栈、写落地页、冷启动……表单进、结果出，5 分钟省你 3 小时。</p>
  </div>
</section>

<div class="page">

  <aside class="sidebar">
    <div class="sb-title">工具列表</div>
    <div class="sb-list" id="toolList">
      <div class="sb-item" data-tool="idea-explore" onclick="switchTool('idea-explore')">
        <span class="sb-item-icon">💡</span>
        <span class="sb-item-name">Idea 探索器</span>
        <span class="sb-item-meta">商业化</span>
      </div>
      <div class="sb-item" data-tool="idea-validate" onclick="switchTool('idea-validate')">
        <span class="sb-item-icon">✓</span>
        <span class="sb-item-name">Idea 验证器</span>
        <span class="sb-item-meta">商业化</span>
      </div>
      <div class="sb-item" data-tool="stack" onclick="switchTool('stack')">
        <span class="sb-item-icon">⚙</span>
        <span class="sb-item-name">技术栈推荐</span>
        <span class="sb-item-meta">实战进阶</span>
      </div>
      <div class="sb-item" data-tool="landing" onclick="switchTool('landing')">
        <span class="sb-item-icon">★</span>
        <span class="sb-item-name">落地页文案</span>
        <span class="sb-item-meta">商业化</span>
      </div>
      <div class="sb-item" data-tool="cold-start" onclick="switchTool('cold-start')">
        <span class="sb-item-icon">↗</span>
        <span class="sb-item-name">冷启动剧本</span>
        <span class="sb-item-meta">增长</span>
      </div>
    </div>
  </aside>

  <main class="panel" id="panel">
    <!-- populated by switchTool() -->
  </main>
</div>

<script>
/* =====================================================
   TOOLBOX · 5 个 mock AI 工具
   单次输入 → 结构化输出。
   真正接入 AI 刘小排 API 时，替换每个 tool 的 evaluate() 即可。
   ===================================================== */

const TOOLS = {
  'idea-explore': {
    icon: '💡',
    stage: '商业化 / 找方向',
    title: 'Idea 探索器',
    desc: '没想法不要紧。把你的兴趣、能力、目标说清楚，刘小排帮你找 5 个潜在 idea。',
    render: renderIdeaExploreForm,
    evaluate: evalIdeaExplore
  },
  'idea-validate': {
    icon: '✓',
    stage: '商业化 / 验证',
    title: 'Idea 验证器',
    desc: '已有 idea，但不确定能不能做。让刘小排看看可行性、市场、风险点、切入点。',
    render: renderIdeaValidateForm,
    evaluate: evalIdeaValidate
  },
  'stack': {
    icon: '⚙',
    stage: '实战进阶 / 技术选型',
    title: '技术栈推荐',
    desc: '不知道用什么框架、数据库、AI API？把产品类型告诉刘小排，给你一套上手就能开干的栈。',
    render: renderStackForm,
    evaluate: evalStack
  },
  'landing': {
    icon: '★',
    stage: '商业化 / Landing',
    title: '落地页文案生成器',
    desc: '"8 秒打动用户" 是落地页的铁律。给刘小排产品信息，得到 8 秒能 hook 住人的标题、副标题、CTA 和 5 个卖点。',
    render: renderLandingForm,
    evaluate: evalLanding
  },
  'cold-start': {
    icon: '↗',
    stage: '增长 / 冷启动',
    title: '冷启动剧本',
    desc: '上线了没人用？刘小排给你 5–10 个具体动作：去哪个平台、发什么内容、多大成本、预期效果。',
    render: renderColdStartForm,
    evaluate: evalColdStart
  }
};

/* ============= ROUTER ============= */
function switchTool(key) {
  if (!TOOLS[key]) key = 'idea-explore';
  document.querySelectorAll('.sb-item').forEach(el => {
    el.classList.toggle('active', el.dataset.tool === key);
  });
  const tool = TOOLS[key];
  const panel = document.getElementById('panel');
  panel.innerHTML =
    '<div class="panel-header">' +
      '<div class="panel-stage">' + tool.stage + '</div>' +
      '<h2 class="panel-title">' + tool.title + '</h2>' +
      '<p class="panel-desc">' + tool.desc + '</p>' +
    '</div>' +
    '<div id="toolForm"></div>' +
    '<div class="output" id="toolOutput"></div>';
  tool.render();
  if (location.search.indexOf('t=' + key) < 0) {
    history.replaceState(null, '', 'toolbox.html?t=' + key);
  }
}

/* ============= FORM RENDERERS ============= */
function renderIdeaExploreForm() {
  document.getElementById('toolForm').innerHTML =
    '<div class="form">' +
      field('interests', '你感兴趣的领域', 'textarea', '例如：教育、AI 写作、设计、健身、独立游戏…') +
      field('strengths', '你的能力 / 资源', 'textarea', '例如：会写代码、做过设计师、有医学背景、在大厂做过运营…') +
      radioField('goal', '目标', [
        { v:'side',     label:'副业型 · 月入几千美金' },
        { v:'startup',  label:'创业型 · 想做更大的事' },
        { v:'learn',    label:'学习型 · 先练手' }
      ]) +
      runBtn('生成 5 个 idea') +
    '</div>';
}

function renderIdeaValidateForm() {
  document.getElementById('toolForm').innerHTML =
    '<div class="form">' +
      field('idea', '一句话描述你的 idea', 'textarea', '例如：一个帮医学生根据错题智能推荐练习的小程序') +
      field('audience', '目标用户（一句话）', 'input', '例如：备考执医的医学生，全国约 60 万人') +
      runBtn('开始验证') +
    '</div>';
}

function renderStackForm() {
  document.getElementById('toolForm').innerHTML =
    '<div class="form">' +
      radioField('type', '产品类型', [
        { v:'web',       label:'网站 / SaaS' },
        { v:'miniprog',  label:'微信小程序' },
        { v:'app',       label:'手机 App' },
        { v:'desktop',   label:'桌面应用' },
        { v:'agent',     label:'自动化 / Agent' }
      ]) +
      radioField('level', '你的水平', [
        { v:'zero',      label:'零基础' },
        { v:'some',      label:'有点经验' },
        { v:'tech',      label:'技术背景' }
      ]) +
      radioField('market', '面向市场', [
        { v:'overseas',  label:'海外（收美金）' },
        { v:'cn',        label:'国内（收人民币）' },
        { v:'both',      label:'都要' }
      ]) +
      runBtn('生成推荐栈') +
    '</div>';
}

function renderLandingForm() {
  document.getElementById('toolForm').innerHTML =
    '<div class="form">' +
      field('name', '产品名', 'input', '例如：MedQuiz') +
      field('desc', '产品一句话描述', 'input', '例如：AI 帮你根据错题推荐题目的医考小程序') +
      field('audience', '目标用户', 'input', '例如：备考执医的医学生') +
      field('benefit', '最大卖点（一句话）', 'input', '例如：练题效率比传统题库高 3 倍') +
      runBtn('生成落地页文案') +
    '</div>';
}

function renderColdStartForm() {
  document.getElementById('toolForm').innerHTML =
    '<div class="form">' +
      field('name', '产品名', 'input', '例如：MedQuiz') +
      field('audience', '目标用户', 'input', '例如：备考执医的医学生') +
      radioField('type', '产品类型', [
        { v:'web',      label:'网站 / SaaS' },
        { v:'miniprog', label:'小程序' },
        { v:'app',      label:'App' },
        { v:'tool',     label:'工具 / Chrome 扩展' }
      ]) +

/* ============= UTILITIES ============= */
function field(name, label, kind, placeholder) {
  if (kind === 'textarea') {
    return '<div class="field-group">' +
      '<label class="field-label">' + label + '</label>' +
      '<textarea class="field-textarea" data-name="' + name + '" placeholder="' + esc(placeholder || '') + '"></textarea>' +
    '</div>';
  }
  return '<div class="field-group">' +
    '<label class="field-label">' + label + '</label>' +
    '<input class="field-input" data-name="' + name + '" placeholder="' + esc(placeholder || '') + '" />' +
  '</div>';
}

function radioField(name, label, options) {
  const chips = options.map(opt =>
    '<div class="radio-chip" data-name="' + name + '" data-value="' + esc(opt.v) + '" onclick="selectRadio(this)">' + esc(opt.label) + '</div>'
  ).join('');
  return '<div class="field-group">' +
    '<label class="field-label">' + label + '</label>' +
    '<div class="radio-group">' + chips + '</div>' +
  '</div>';
}

function selectRadio(el) {
  const name = el.dataset.name;
  el.parentNode.querySelectorAll('[data-name="' + name + '"]').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}

function runBtn(label) {
  return '<button class="btn-run" onclick="runCurrentTool()">' +
    '<span>' + label + '</span>' +
    '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3l5 5-5 5"/></svg>' +
  '</button>';
}

function runCurrentTool() {
  const activeKey = (document.querySelector('.sb-item.active') || {}).dataset?.tool;
  if (!activeKey || !TOOLS[activeKey]) return;

  // 收集所有 input / textarea / 选中 radio
  const inputs = {};
  document.querySelectorAll('#toolForm .field-input, #toolForm .field-textarea').forEach(el => {
    inputs[el.dataset.name] = (el.value || '').trim();
  });
  document.querySelectorAll('#toolForm .radio-chip.selected').forEach(el => {
    inputs[el.dataset.name] = el.dataset.value;
  });

  const out = document.getElementById('toolOutput');
  out.innerHTML =
    '<div class="output-header">' +
      '<span class="output-avatar" role="img" aria-label="刘小排头像"></span>' +
      '<span class="output-by">AI 刘小排</span>' +
      '<span class="output-by-role">/ ' + TOOLS[activeKey].title + '</span>' +
    '</div>' +
    TOOLS[activeKey].evaluate(inputs);
  out.classList.add('show');
  out.scrollIntoView({ behavior:'smooth', block:'start' });
}

/* ============= HTML BUILDERS ============= */
function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g,
    c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

function section(label, html) {
  return '<div class="out-section">' +
    '<div class="out-label">' + label + '</div>' +
    html +
  '</div>';
}

function verdict(html) {
  return '<div class="verdict-card">' + html + '</div>';
}

function listCard(items) {
  return '<div class="list-card">' +
    items.map(it =>
      '<div class="list-card-item">' +
        '<span class="left">' + (it.l) + '</span>' +
        '<span class="right">' + (it.r) + '</span>' +
      '</div>'
    ).join('') +
  '</div>';
}

/* ============= INIT ============= */
(function init() {
  const params = new URLSearchParams(location.search);
  const t = params.get('t') || 'idea-explore';
  switchTool(t);
})();
