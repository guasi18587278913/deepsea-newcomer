<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>个人中心 · 作业 · 深海圈</title>
<link rel="stylesheet" href="shared.css">
<style>
  .edit-btn { margin-left:auto; align-self:flex-start; }
  @media (max-width:520px){ .profile{ gap:14px } .profile__name{ font-size:19px } .av--xl{ width:72px;height:72px } }
  .hw-item { display:flex; align-items:center; gap:12px; padding:15px 4px; border-bottom:1px solid var(--divider); transition:background .12s; border-radius:8px; }
  .hw-item:hover { background:var(--slate-50); }
  .hw-item:last-child { border-bottom:none; }
  .hw-item__main { flex:1; min-width:0; }
  .hw-item__top { display:flex; align-items:center; gap:9px; margin-bottom:6px; }
  .island { font-size:12px; color:var(--slate-400); display:inline-flex; align-items:center; gap:4px; }
  .hw-item__title { font-size:15px; font-weight:600; color:var(--slate-900); line-height:1.45; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .hw-item__meta { display:flex; align-items:center; gap:8px; margin-top:6px; font-size:12px; color:var(--slate-400); flex-wrap:wrap; }
  .hw-item__meta .ok { color:var(--brand-deep); display:inline-flex; align-items:center; gap:4px; font-weight:600; }
  .hw-item__meta .doing { color:var(--blue); display:inline-flex; align-items:center; gap:4px; font-weight:600; }
  .chev { color:var(--slate-300); flex:none; }
  .entry-wrap { margin-top:14px; }
</style>
</head>
<body>
<div class="page has-tabbar">
  <header class="topnav">
    <div class="topnav__inner">
      <a class="brand"><span class="brand__logo"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 14c2 0 2-2 4-2s2 2 4 2 2-2 4-2 2 2 4 2"/><path d="M12 3v6"/><circle cx="12" cy="11" r="1.4" fill="currentColor" stroke="none"/></svg></span><span class="brand__name">深海圈</span></a>
      <span class="brand__divider"></span>
      <a class="circle-switch"><img class="av" src="https://i.pravatar.cc/40?img=15" alt="">AI 编程<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></a>
      <nav class="nav-tabs">
        <a class="nav-tab" href="discuss.html">交流区</a><a class="nav-tab" href="roadmap.html">课程专区</a><a class="nav-tab" href="showcase.html">作品墙</a><a class="nav-tab" href="members.html">成员</a>
      </nav>
      <div class="nav-right">
        <a class="ai-pill"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 4l2.5 6.5L22 13l-6.5 2.5L13 22l-2.5-6.5L4 13l6.5-2.5z"/></svg>AI 问答</a>
        <button class="icon-btn"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg></button>
        <button class="icon-btn"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg></button>
        <img class="av av--sm" src="https://i.pravatar.cc/64?img=15" alt="">
      </div>
    </div>
  </header>
  <header class="mnav">
    <a class="mnav__back" href="roadmap.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 18l-6-6 6-6"/></svg>返回</a>
  </header>

  <main class="container" style="padding-top:18px">
    <!-- 资料头 -->
    <section class="card card--pad rise">
      <div class="profile">
        <span class="av-ring"><img class="av av--xl" src="https://i.pravatar.cc/160?img=15" alt=""></span>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:flex-start;gap:12px">
            <div class="profile__name">石石石</div>
            <button class="btn btn--outline btn--sm edit-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>编辑资料</button>
          </div>
          <div class="stats">
            <span class="stat"><svg class="ic-edit" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>发帖 <span class="v">12</span></span>
            <span class="stat"><svg class="ic-like" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 10v11M2 13v6a2 2 0 0 0 2 2h13.5a2 2 0 0 0 2-1.6l1.3-7A2 2 0 0 0 18 10h-5l1-4.5A2.5 2.5 0 0 0 11.5 3L7 10"/></svg>获赞 <span class="v">48</span></span>
            <span class="stat"><svg class="ic-anchor" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="2"/><path d="M12 7v14M5 12a7 7 0 0 0 14 0M5 12H3m16 0h2"/></svg>锚点 <span class="v">6</span></span>
          </div>
        </div>
      </div>
      <!-- 助教工作台入口（仅助教可见，沿用「续费卡」位） -->
      <div class="entry-wrap" id="entryWrap"></div>
    </section>

    <div class="section-gap"></div>

    <!-- Tab -->
    <div class="utabs rise" style="margin-bottom:6px">
      <a class="utab">帖子 <span class="n">12</span></a>
      <a class="utab">收藏 <span class="n">3</span></a>
      <a class="utab is-active">作业 <span class="n" id="hwCount">0</span></a>
    </div>

    <div class="card" id="listCard" style="padding:6px 16px"></div>
  </main>

  <nav class="tabbar">
    <a class="tabbar__item" href="roadmap.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M3 11l9-8 9 8M5 10v10h14V10"/></svg>首页</a>
    <a class="tabbar__item" href="roadmap.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M4 19.5V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v13.5M4 19.5h16"/><path d="M8 8h8M8 12h6"/></svg>学习</a>
    <a class="tabbar__item is-active"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>我的</a>
  </nav>
</div>

<script src="homework-data.js"></script>
<script>
HW.maybeReset();
HW.seedOnce();
var E = HW.esc;

var islandSvg = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 21V7l8-4v18M19 21V11l-6-4"/></svg>';

function metaHint(status) {
  if (status === 'done') return '<span class="ok"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>助教已评语</span>';
  if (status === 'doing') return '<span class="doing"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>教练评阅中</span>';
  if (status === 'review') return '<span>排队批改中</span>';
  return '<span>未提交，不影响解锁</span>';
}

function itemHTML(it) {
  var st = HW.STATUS[it.status];
  if (it.kind === 'sub') {
    var s = it.sub;
    var vis = s.public ? '公开' : '仅自己可见';
    return '<a class="hw-item" href="homework-detail.html?id=' + encodeURIComponent(HW.subId(s)) + '">'
      + '<div class="hw-item__main"><div class="hw-item__top"><span class="st ' + st.cls + '">' + st.label + '</span>'
      + '<span class="island">' + islandSvg + E(HW.STAGES[s.stage] || '') + '</span></div>'
      + '<h3 class="hw-item__title">' + E(s.title) + '</h3>'
      + '<div class="hw-item__meta"><span>' + vis + '</span><span class="dot"></span><span>提交于 ' + E((s.submittedAt || '').slice(0, 10)) + '</span><span class="dot"></span>' + metaHint(it.status) + '</div></div>'
      + '<svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></a>';
  }
  /* 待提交 */
  var a = it.assignment;
  return '<a class="hw-item" href="homework-submit.html?stage=' + it.stage + '">'
    + '<div class="hw-item__main"><div class="hw-item__top"><span class="st ' + st.cls + '">' + st.label + '</span>'
    + '<span class="island">' + islandSvg + E(HW.STAGES[it.stage] || '') + '</span></div>'
    + '<h3 class="hw-item__title">' + E(a.title) + '</h3>'
    + '<div class="hw-item__meta"><span>' + (a.optional ? '可选作业' : '阶段作业') + '</span><span class="dot"></span>' + metaHint('todo') + '</div></div>'
    + '<svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></a>';
}

function render() {
  var items = HW.profileList();
  var subCount = items.filter(function (x) { return x.kind === 'sub'; }).length;
  document.getElementById('hwCount').textContent = subCount;

  var listCard = document.getElementById('listCard');
  if (!items.length) {
    listCard.style.padding = '0';
    listCard.innerHTML = '<div class="empty"><div class="empty__art"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4z"/></svg></div>'
      + '<div class="empty__title">这片海域还很安静，你还没有作业</div><div class="empty__desc">完成岛上的任务，投下你的第一份作品，让助教看见你的深度</div>'
      + '<div class="empty__cta"><a class="btn btn--outline btn--pill" href="roadmap.html">去学习地图</a></div></div>';
    return;
  }
  listCard.innerHTML = items.map(itemHTML).join('');

  /* 助教工作台入口卡（待批改 = 真实提交里 review 态的数量）*/
  var pending = HW.loadSubs().filter(function (s) { return HW.statusKey(s) === 'review'; }).length;
  document.getElementById('entryWrap').innerHTML =
    '<a class="entry-card" href="workbench.html">'
    + '<span class="entry-card__ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span>'
    + '<div style="flex:1"><div class="entry-card__t">助教工作台</div><div class="entry-card__d">仅助教可见 · 批改作业 / 处理提问</div></div>'
    + (pending ? '<span class="entry-card__redot">' + pending + '</span>' : '')
    + '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--slate-300)"><path d="M9 18l6-6-6-6"/></svg></a>';
}
render();
</script>
</body>
</html>
