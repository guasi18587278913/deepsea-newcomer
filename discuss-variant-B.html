<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深海圈 | 编辑室</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --font-serif: 'Noto Serif SC', 'Songti SC', serif;
  --font: -apple-system, 'PingFang SC', BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
  --mono: 'SF Mono', 'Menlo', 'Monaco', monospace;

  --bg: #ffffff;
  --bg-warm: #faf9f7;
  --bg-hover: #f8f8f6;
  --white: #ffffff;

  --teal: #0d9488;
  --teal-hover: #0b7c71;

  --text1: #1e293b;
  --text2: #64748b;
  --text3: #94a3b8;
  --text4: #cbd5e1;

  --border: #e8e6e1;
  --border-soft: #f1f0ed;

  --monogram-bg: #f1f5f9;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font);
  background: var(--bg-warm);
  color: var(--text1);
  -webkit-font-smoothing: antialiased;
  height: 100vh;
  overflow: hidden;
}
a { color: inherit; text-decoration: none; }

/* ===== Topbar ===== */
.topbar {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(255, 255, 255, 0.82);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  border-bottom: 1px solid rgba(0, 0, 0, 0.06);
  height: 52px;
  display: flex;
  align-items: center;
  padding: 0 32px;
}
.tb-inner {
  max-width: 100%;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.tb-left {
  display: flex;
  align-items: center;
  gap: 28px;
}
.logo {
  font-family: var(--font-serif);
  font-size: 17px;
  font-weight: 700;
  color: var(--teal);
  letter-spacing: 0.02em;
}
.nav {
  display: flex;
  gap: 4px;
}
.nav a {
  font-size: 13px;
  color: var(--text3);
  padding: 6px 12px;
  border-radius: 6px;
  transition: all 0.15s;
}
.nav a:hover { color: var(--text1); }
.nav a.active {
  color: var(--text1);
  font-weight: 500;
}
.tb-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
.online-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #22c55e;
  display: inline-block;
}
.online-text { font-size: 12px; color: var(--text3); }
.avatar-tb {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: var(--text1);
  color: #fff;
  display: grid;
  place-items: center;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
}

/* ===== Layout ===== */
.layout {
  display: grid;
  grid-template-columns: 180px 1fr;
  height: calc(100vh - 52px);
  transition: grid-template-columns 0.3s ease;
}
.layout.panel-open {
  grid-template-columns: 180px 1fr 320px;
}

/* ===== Sidebar ===== */
.sidebar {
  background: var(--bg-warm);
  padding: 28px 0;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border-soft);
}
.sb-section { margin-bottom: 24px; }
.sb-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text4);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  padding: 0 24px 10px;
}
.sb-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 24px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text3);
  transition: color 0.15s;
  user-select: none;
  line-height: 1.4;
  position: relative;
}
.sb-item:hover { color: var(--text1); }
.sb-item.active { color: var(--text1); font-weight: 500; }
.sb-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: transparent;
  flex-shrink: 0;
  transition: background 0.15s;
}
.sb-item.active .sb-dot { background: var(--teal); }
.sb-item-name { flex: 1; }
.sb-unread {
  font-size: 11px;
  color: var(--text3);
  font-variant-numeric: tabular-nums;
}

/* Sidebar bottom */
.sb-bottom {
  margin-top: auto;
  padding: 16px 24px;
  border-top: 1px solid var(--border-soft);
}
.sb-user {
  display: flex;
  align-items: center;
  gap: 10px;
}
.sb-user-mono {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--monogram-bg);
  color: var(--text1);
  display: grid;
  place-items: center;
  font-size: 11px;
  font-weight: 600;
}
.sb-user-name { font-size: 13px; font-weight: 500; color: var(--text1); }
.sb-user-status { font-size: 11px; color: #22c55e; }

/* ===== Message Area ===== */
.msg-area {
  display: flex;
  flex-direction: column;
  min-width: 0;
  min-height: 0;
  overflow: hidden;
  background: var(--white);
}

/* Channel header */
.ch-header {
  padding: 20px 40px 16px;
  background: var(--white);
  border-bottom: 1px solid var(--border-soft);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  flex-shrink: 0;
}
.ch-header-left { min-width: 0; }
.ch-title {
  font-family: var(--font-serif);
  font-size: 20px;
  font-weight: 600;
  color: var(--text1);
  letter-spacing: 0.01em;
  line-height: 1.3;
}
.ch-desc {
  font-size: 13px;
  color: var(--text3);
  margin-top: 4px;
  line-height: 1.5;
}
.ch-header-actions {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
  margin-top: 2px;
}
.ch-action-btn {
  width: 30px;
  height: 30px;
  border: none;
  background: transparent;
  border-radius: 6px;
  display: grid;
  place-items: center;
  cursor: pointer;
  font-size: 14px;
  color: var(--text4);
  transition: all 0.15s;
}
.ch-action-btn:hover { color: var(--text2); background: var(--bg-warm); }

/* Message feed */
.msg-feed {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0 20px;
  scroll-behavior: smooth;
}

/* Date separator */
.date-sep {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 28px 40px 12px;
}
.date-sep::before,
.date-sep::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border-soft);
}
.date-sep span {
  font-size: 11px;
  color: var(--text4);
  font-weight: 500;
  white-space: nowrap;
  letter-spacing: 0.4px;
}

/* Messages */
.msg {
  display: flex;
  gap: 14px;
  padding: 10px 40px;
  transition: background 0.12s;
  margin-bottom: 6px;
  border-radius: 6px;
}
.msg:hover { background: #f7f7f5; }
.msg:hover .msg-hover-actions { opacity: 1; }

.msg-monogram {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--monogram-bg);
  color: var(--text2);
  display: grid;
  place-items: center;
  font-size: 13px;
  font-weight: 600;
  flex-shrink: 0;
  letter-spacing: -0.02em;
}

.msg-body {
  flex: 1;
  min-width: 0;
  padding-top: 1px;
}
.msg-header {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 4px;
}
.msg-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text1);
}
.msg-role {
  font-size: 10px;
  font-weight: 500;
  color: var(--teal);
  letter-spacing: 0.3px;
}
.msg-time {
  font-size: 11px;
  color: var(--text4);
  margin-left: auto;
  font-variant-numeric: tabular-nums;
}
.msg-text {
  font-size: 15px;
  color: #334155;
  line-height: 1.75;
  word-break: break-word;
}
.msg-text code {
  font-family: var(--mono);
  font-size: 13px;
  background: var(--monogram-bg);
  color: #334155;
  padding: 2px 6px;
  border-radius: 4px;
}
.msg-text strong { color: var(--text1); font-weight: 600; }

/* Hover actions — inline with message header */
.msg-hover-actions {
  display: flex;
  gap: 2px;
  margin-left: 8px;
  opacity: 0;
  transition: opacity .12s;
}
.msg-hover-action {
  padding: 3px 6px;
  cursor: pointer;
  font-size: 12px;
  border-radius: 4px;
  transition: background .1s;
  line-height: 1;
}
.msg-hover-action:hover { background: var(--border-soft); }

/* Reactions */
.msg-reactions {
  display: flex;
  gap: 4px;
  margin-top: 6px;
}
.reaction {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 3px 8px;
  border-radius: 12px;
  border: 1px solid var(--border-soft);
  background: var(--bg-warm);
  font-size: 13px;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
}
.reaction:hover {
  color: var(--text1);
  background: var(--border-soft);
  border-color: var(--border);
}
.reaction.active {
  color: var(--teal);
  background: rgba(13, 148, 136, 0.04);
  border-color: rgba(13, 148, 136, 0.15);
}

/* Thread indicator */
.thread-link {
  display: inline-block;
  margin-top: 6px;
  font-size: 13px;
  color: var(--teal);
  cursor: pointer;
  transition: opacity 0.15s;
  font-weight: 500;
}
.thread-link:hover { opacity: 0.75; }

/* ===== Top-level message emphasis ===== */
.msg.is-root {
  margin-top: 16px;
}
.msg.is-root:first-child { margin-top: 0; }
.msg.is-root .msg-monogram {
  width: 36px;
  height: 36px;
  font-size: 13px;
}

/* ===== Reply Indent (code-style nesting) ===== */
.msg.is-reply {
  margin-left: 50px;
  padding: 6px 24px;
  margin-top: 0;
  margin-bottom: 2px;
}
.msg.is-reply .msg-monogram {
  width: 26px;
  height: 26px;
  font-size: 10px;
}
.msg.is-reply .msg-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text1);
}
.msg.is-reply .msg-time {
  color: var(--text4);
}
.msg.is-reply .msg-text {
  font-size: 14px;
  line-height: 1.7;
  color: #475569;
}

/* ===== Inline Reply ===== */
.inline-reply {
  margin: 4px 0 8px 50px;
  padding: 12px 14px;
  background: var(--bg-warm);
  border: 1px solid var(--border);
  border-radius: 6px;
  animation: fadeSlideIn .15s ease;
}
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}
.inline-reply-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
  font-size: 12px;
  color: var(--text3);
}
.inline-reply-header .reply-to {
  color: var(--teal);
  font-weight: 500;
}
.inline-reply-close {
  border: none; background: none; font-size: 14px; color: var(--text4);
  cursor: pointer; padding: 2px 4px; border-radius: 4px; line-height: 1;
}
.inline-reply-close:hover { color: var(--text1); background: var(--border-soft); }
.inline-reply textarea {
  width: 100%;
  min-height: 40px;
  max-height: 100px;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: var(--font);
  font-size: 13px;
  color: var(--text1);
  resize: none;
  outline: none;
  line-height: 1.5;
  background: var(--white);
  transition: border-color .15s;
}
.inline-reply textarea:focus { border-color: var(--teal); }
.inline-reply textarea::placeholder { color: var(--text4); }
.inline-reply-footer {
  display: flex;
  justify-content: flex-end;
  gap: 6px;
  margin-top: 6px;
}
.inline-reply-footer .cancel-btn {
  padding: 4px 12px; border-radius: 4px; font-size: 12px;
  border: 1px solid var(--border); background: var(--white);
  color: var(--text2); cursor: pointer; font-family: var(--font);
}
.inline-reply-footer .cancel-btn:hover { background: var(--bg-warm); }
.inline-reply-footer .reply-send-btn {
  padding: 4px 14px; border-radius: 4px; font-size: 12px;
  border: none; background: var(--teal); color: #fff;
  cursor: pointer; font-family: var(--font); font-weight: 500;
}
.inline-reply-footer .reply-send-btn:hover { background: var(--teal-hover); }

/* ===== Input area ===== */
.msg-input {
  padding: 16px 40px 24px;
  background: var(--white);
  border-top: 1px solid var(--border-soft);
  flex-shrink: 0;
}
.input-wrapper {
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg-warm);
  transition: all 0.2s;
  overflow: hidden;
}
.input-wrapper:focus-within {
  border-color: var(--teal);
  background: var(--white);
  box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.05);
}
.msg-textarea {
  width: 100%;
  min-height: 44px;
  max-height: 120px;
  padding: 12px 16px;
  border: none;
  font-family: var(--font);
  font-size: 14px;
  color: var(--text1);
  resize: none;
  outline: none;
  line-height: 1.6;
  background: transparent;
}
.msg-textarea::placeholder { color: var(--text4); }
.input-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 10px 6px;
}
.input-tools { display: flex; gap: 2px; }
.input-tool {
  padding: 4px 6px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text4);
  transition: all 0.1s;
  border: none;
  background: none;
}
.input-tool:hover { color: var(--text2); }
.send-btn {
  padding: 5px 16px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 500;
  border: none;
  cursor: pointer;
  font-family: var(--font);
  transition: all 0.15s;
}
.send-btn.ready { background: var(--teal); color: #fff; }
.send-btn.ready:hover { background: var(--teal-hover); }
.send-btn.disabled { background: transparent; color: var(--text4); cursor: default; }

/* ===== Right Panel ===== */
.panel {
  background: var(--white);
  border-left: 1px solid var(--border-soft);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border-soft);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.panel-title {
  font-family: var(--font-serif);
  font-size: 15px;
  font-weight: 600;
  color: var(--text1);
}
.panel-close {
  border: none;
  background: none;
  font-size: 18px;
  color: var(--text3);
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
  line-height: 1;
}
.panel-close:hover { color: var(--text1); }

/* Thread panel */
.thread-content {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}
.thread-parent {
  padding: 16px;
  background: var(--bg-warm);
  border-radius: 6px;
  margin-bottom: 16px;
  border-left: 2px solid var(--teal);
}
.thread-parent .msg-name { color: var(--teal); }
.thread-parent .msg-text {
  font-size: 14px;
  line-height: 1.7;
  margin-top: 6px;
}

.thread-replies-label {
  font-size: 11px;
  color: var(--text4);
  padding: 0 4px 10px;
  letter-spacing: 0.3px;
}
.thread-replies {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.thread-reply {
  display: flex;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 4px;
  transition: background 0.1s;
}
.thread-reply:hover { background: var(--bg-warm); }
.thread-reply .msg-monogram {
  width: 28px;
  height: 28px;
  font-size: 11px;
}
.thread-reply .msg-name { font-size: 12px; }
.thread-reply .msg-text {
  font-size: 13px;
  line-height: 1.7;
}
.thread-input-area {
  padding: 12px 16px;
  border-top: 1px solid var(--border-soft);
  flex-shrink: 0;
}
.thread-input-area textarea {
  width: 100%;
  min-height: 48px;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px 12px;
  font-family: var(--font);
  font-size: 13px;
  resize: none;
  outline: none;
  background: var(--bg-warm);
  color: var(--text1);
  line-height: 1.5;
}
.thread-input-area textarea:focus {
  border-color: var(--teal);
  background: var(--white);
}
.thread-input-footer {
  display: flex;
  justify-content: flex-end;
  margin-top: 8px;
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr !important; }
  .sidebar, .panel { display: none; }
  .msg { padding: 10px 20px; }
  .ch-header { padding: 16px 20px 12px; }
  .msg-input { padding: 12px 20px 16px; }
  .date-sep { padding: 24px 20px 10px; }
}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="tb-inner">
    <div class="tb-left">
      <a href="roadmap.html" class="logo">深海圈</a>
      <nav class="nav">
        <a href="roadmap.html">路线图</a>
        <a href="learn.html">学习</a>
        <a href="discuss-variant-B.html" class="active">讨论</a>
        <a href="community.html">社区</a>
        <a href="showcase.html">成果墙</a>
      </nav>
    </div>
    <div class="tb-right">
      <span class="online-dot"></span>
      <span class="online-text">47 人在线</span>
      <a href="profile.html" class="avatar-tb">瓜</a>
    </div>
  </div>
</div>

<!-- Main layout -->
<div class="layout" id="layout">

  <!-- Left: Sidebar -->
  <aside class="sidebar">
    <div class="sb-section">
      <div class="sb-label">官方</div>
      <div class="sb-item" data-channel="announce" onclick="switchChannel(this)">
        <span class="sb-dot"></span>
        <span class="sb-item-name">📢 公告</span>
      </div>
      <div class="sb-item" data-channel="intro" onclick="switchChannel(this)">
        <span class="sb-dot"></span>
        <span class="sb-item-name">👋 新人报到</span>
      </div>
    </div>

    <div class="sb-section">
      <div class="sb-label">交流</div>
      <div class="sb-item active" data-channel="lobby" onclick="switchChannel(this)">
        <span class="sb-dot"></span>
        <span class="sb-item-name">☕ 大厅</span>
        <span class="sb-unread">12</span>
      </div>
      <div class="sb-item" data-channel="goodNews" onclick="switchChannel(this)">
        <span class="sb-dot"></span>
        <span class="sb-item-name">🎉 今日好事</span>
        <span class="sb-unread">3</span>
      </div>
      <div class="sb-item" data-channel="helpDesk" onclick="switchChannel(this)">
        <span class="sb-dot"></span>
        <span class="sb-item-name">🆘 求助问答</span>
        <span class="sb-unread">&bull;</span>
      </div>
    </div>

    <div class="sb-section">
      <div class="sb-label">学习</div>
      <div class="sb-item" data-channel="tools" onclick="switchChannel(this)">
        <span class="sb-dot"></span>
        <span class="sb-item-name"># 工具测评</span>
        <span class="sb-unread">&bull;</span>
      </div>
      <div class="sb-item" data-channel="pitfalls" onclick="switchChannel(this)">
        <span class="sb-dot"></span>
        <span class="sb-item-name"># 踩坑经验</span>
      </div>
      <div class="sb-item" data-channel="prompt" onclick="switchChannel(this)">
        <span class="sb-dot"></span>
        <span class="sb-item-name"># Prompt 技巧</span>
      </div>
      <div class="sb-item" data-channel="payment" onclick="switchChannel(this)">
        <span class="sb-dot"></span>
        <span class="sb-item-name"># 支付变现</span>
        <span class="sb-unread">&bull;</span>
      </div>
      <div class="sb-item" data-channel="news" onclick="switchChannel(this)">
        <span class="sb-dot"></span>
        <span class="sb-item-name"># 行业资讯</span>
      </div>
    </div>

    <div class="sb-section">
      <div class="sb-label">休闲</div>
      <div class="sb-item" data-channel="resources" onclick="switchChannel(this)">
        <span class="sb-dot"></span>
        <span class="sb-item-name"># 资源推荐</span>
      </div>
      <div class="sb-item" data-channel="chill" onclick="switchChannel(this)">
        <span class="sb-dot"></span>
        <span class="sb-item-name"># 摸鱼闲聊</span>
        <span class="sb-unread">8</span>
      </div>
    </div>

    <div class="sb-bottom">
      <div class="sb-user">
        <div class="sb-user-mono">瓜</div>

      { id:'l30', author:'李思思', time:'11:15', text:'Bolt 我试了，确实快。但生成的代码质量一般，后续维护头疼。适合做 demo，不适合做正经产品。', reactions:[{emoji:'💯',count:7}], replyTo:{msgId:'l29',author:'黄小美',preview:'有人用过 Bolt.new 吗？'} },
      { id:'l31', author:'王大锤', role:'助教', time:'11:25', text:'Bolt 适合验证想法，正经做产品还是建议 Cursor + Claude。代码质量差一个量级。', thread:{count:4, authors:['黄','李','周']}, replyTo:{msgId:'l29',author:'黄小美',preview:'有人用过 Bolt.new 吗？'} },
      { id:'l32', author:'孙大伟', time:'20:30', text:'今天的收获：第一次成功把数据库连上了前端！虽然只是显示了一行文字，但这种"通了"的感觉太爽了。', reactions:[{emoji:'🎉',count:10},{emoji:'💪',count:5}] },
      { id:'l33', author:'何丽', time:'21:00', text:'大伟恭喜！这种里程碑的感觉我懂，昨天我的 CSS 第一次对齐的时候也是这种感觉 😂', reactions:[{emoji:'😂',count:7}], replyTo:{msgId:'l32',author:'孙大伟',preview:'第一次成功把数据库连上了前端'} },
      { id:'l34', author:'郑涛', time:'23:15', text:'夜深了但还在写代码... 明天要交作业了，数据表还没建完。SQL 我会，但 Supabase 的 RLS 机制把我搞蒙了。', reactions:[{emoji:'💪',count:4}] },
      { id:'l35', author:'陈小飞', time:'23:30', text:'RLS 那个坑我踩过，去踩坑频道搜一下林小鱼之前发的帖子，讲得很清楚。', replyTo:{msgId:'l34',author:'郑涛',preview:'Supabase 的 RLS 机制把我搞蒙了'} },
    ]
  },
  goodNews: {
    name: '🎉 今日好事',
    desc: '做出来了就大方秀出来！不管多简陋，做出来就是成功。',
    messages: [
      { date: '4月13日 周日' },
      { id:'g1', author:'陈小飞', time:'14:00', text:'**AI 周报生成器上线了！** 🚀\n\n从飞书日历 + Git 提交记录自动抓取内容，用 Claude 总结成周报。已经在公司内部试用一周了，反馈很好。老板夸我效率高（他不知道是 AI 帮我写的 😂）\n\n技术栈：Next.js + Supabase + Claude API', reactions:[{emoji:'🎉',count:30},{emoji:'🔥',count:15},{emoji:'👏',count:11}], thread:{count:5, authors:['张','林','赵']} },
      { id:'g2', author:'张明', time:'14:30', text:'大飞厉害！这个需求太精准了，每个打工人都需要。有考虑商业化吗？', replyTo:{msgId:'g1',author:'陈小飞',preview:'AI 周报生成器上线了'} },
      { id:'g3', author:'林小鱼', time:'15:00', text:'我今天的好事：**终于看懂了 React 组件是什么** 😂\n\n虽然很小的进步，但对零基础的我来说是巨大的突破。感谢大锤哥的耐心解释！', reactions:[{emoji:'🎉',count:19},{emoji:'💪',count:12},{emoji:'❤️',count:7}] },
      { date: '4月14日 周一' },
      { id:'g4', author:'赵薇薇', time:'11:45', text:'**我的第一个 AI 产品上线了！！！**\n\n🎊 AI 英文邮件润色器 — 输入中式英语，输出地道的商务邮件。\n\n技术栈：Next.js + Supabase + Stripe + Claude API\n开发周期：5 天（其中 2 天在搞 Stripe 支付）\n\n虽然还很简陋但已经有 3 个朋友在用了！从零代码到上线产品，不敢相信是自己做的。', reactions:[{emoji:'🎉',count:35},{emoji:'🔥',count:18},{emoji:'👏',count:12},{emoji:'❤️',count:8}] },
      { id:'g5', author:'刘小排', role:'讲师', time:'12:00', text:'薇薇太棒了！这个速度超过 90% 的学员。而且方向选得很好，翻译+AI 是个好赛道。继续优化，下一步可以考虑加付费功能。', reactions:[{emoji:'🔥',count:9}], replyTo:{msgId:'g4',author:'赵薇薇',preview:'我的第一个 AI 产品上线了'} },
      { id:'g6', author:'周杰', time:'16:00', text:'周末项目更新：**GitHub 100 star 了！** ⭐\n\n做的是一个开源的 AI Code Review Bot，自动给 PR 写评论。没想到这么多人需要。', reactions:[{emoji:'🎉',count:27},{emoji:'🔥',count:14},{emoji:'⭐',count:10}] },
      { id:'g7', author:'黄小美', time:'20:00', text:'小小的好事：今天用 AI 帮室友做了一个课程表查询工具。虽然只是个静态页面，但室友们都说好用！第一次感受到"做出东西给人用"的快乐。', reactions:[{emoji:'🎉',count:16},{emoji:'❤️',count:9}] },
      { date: '4月15日 周二' },
      { id:'g8', author:'孙大伟', time:'10:00', text:'好事！好事！**第一个付费用户来了！** 💰\n\n虽然只收了 $5，但这是我人生中第一次通过写代码赚到钱。产品是帮小红书博主生成爆款标题的工具。付款的是一个 10w 粉的博主，她说确实好用。\n\n感动到想哭。', reactions:[{emoji:'🎉',count:42},{emoji:'🔥',count:20},{emoji:'💰',count:15},{emoji:'👏',count:11}], thread:{count:8, authors:['刘','王','陈','赵','林']} },
      { id:'g9', author:'马飞', time:'14:00', text:'今天的好事：班里的学生用了我做的 **AI 出题工具**，做了 20 道题。有个学生说"马老师你什么时候变这么厉害了"。哈哈哈，他不知道这是 AI 帮我做的！', reactions:[{emoji:'😂',count:18},{emoji:'🎉',count:14},{emoji:'❤️',count:7}] },
      { id:'g10', author:'何丽', time:'16:30', text:'分享一个小成就：用 AI 做了一个 **配色方案生成器**，输入关键词就能出一组专业配色。发到设计群里，好几个同行问我怎么做的。', reactions:[{emoji:'🎉',count:13},{emoji:'🔥',count:6}] },
      { date: '今天' },
      { id:'g11', author:'陈小飞', time:'09:00', text:'AI 周报生成器更新：**月收入破 $1000 了！** 🎉🎉🎉\n\n从上线到现在 3 周，20 个付费团队用户。全部是口碑传播，我一分钱推广没花。\n\n感谢深海圈，没有这个社区我可能还在纠结技术选型。', reactions:[{emoji:'🎉',count:45},{emoji:'🔥',count:22},{emoji:'💰',count:18},{emoji:'👏',count:13}] },
      { id:'g12', author:'瓜哥', time:'10:30', text:'我也有好事报告！虽然很小...\n\n**Hello World 终于跑通了！** 🎊\n\n我知道这对大佬们来说不算什么，但对零基础的我来说，看到浏览器里出现自己写的文字那一刻，真的超级开心！', reactions:[{emoji:'🎉',count:28},{emoji:'💪',count:16},{emoji:'❤️',count:10}] },
      { id:'g13', author:'王大锤', role:'助教', time:'10:35', text:'瓜哥这个好事一点都不小！Hello World 是每个程序员的第一步，你已经迈出来了。接下来只会越来越顺。', reactions:[{emoji:'❤️',count:8}], replyTo:{msgId:'g12',author:'瓜哥',preview:'Hello World 终于跑通了'} },
      { id:'g14', author:'郑涛', time:'15:00', text:'好事：用 Supabase + Next.js 做的 **数据分析 Dashboard** 初版完成了！能连接数据源自动生成图表。虽然 UI 还很丑，但功能跑通了。', reactions:[{emoji:'🎉',count:14},{emoji:'🔥',count:7}] },
    ]
  },
  helpDesk: {
    name: '🆘 求助问答',
    desc: '遇到问题就问。带上截图和报错信息，解决得更快。',
    messages: [
      { date: '4月13日 周日' },
      { id:'h1', author:'瓜哥', time:'14:30', text:'**求助！npm install 报错了**\n\n错误信息：`npm ERR! engine Unsupported engine`\n\n我装的 Node 是 16.x，课程要求 18 以上是吗？但我不知道怎么升级...', reactions:[{emoji:'🤔',count:2}] },
      { id:'h2', author:'王大锤', role:'助教', time:'14:35', text:'@瓜哥 对的，需要 Node 18+。最简单的方法：\n\n1. 去 nodejs.org 下载 LTS 版本（目前是 20.x）\n2. 安装后重启终端\n3. 跑 `node -v` 确认版本\n\n如果你用 Mac，也可以用 `brew install node` 一键安装。', reactions:[{emoji:'👍',count:14}], replyTo:{msgId:'h1',author:'瓜哥',preview:'npm install 报错了'} },
      { id:'h3', author:'瓜哥', time:'14:50', text:'搞定了！装了 Node 20，npm install 通过了。谢谢大锤哥！🙏', reactions:[{emoji:'🎉',count:6}], replyTo:{msgId:'h2',author:'王大锤',preview:'去 nodejs.org 下载 LTS 版本'} },
      { id:'h4', author:'马飞', time:'16:00', text:'**问题：VS Code 里 Terminal 打不出命令**\n\n我在 VS Code 底部的终端输入 `npm run dev`，但一直显示 "command not found"。是不是哪里没配置？我是 Mac 电脑。', reactions:[{emoji:'🤔',count:3}] },
      { id:'h5', author:'张明', time:'16:10', text:'@马飞 看起来是 PATH 没配好。你试试在终端输入 `which node`，如果没输出说明 Node 没在系统路径里。\n\n解决方法：关闭 VS Code 重新打开，或者在终端输入 `source ~/.zshrc`', replyTo:{msgId:'h4',author:'马飞',preview:'VS Code 里 Terminal 打不出命令'} },
      { id:'h6', author:'马飞', time:'16:25', text:'重启 VS Code 之后好了！原来安装完 Node 需要重启编辑器。谢谢张明！', reactions:[{emoji:'👍',count:4}], replyTo:{msgId:'h5',author:'张明',preview:'关闭 VS Code 重新打开'} },
      { date: '4月14日 周一' },
      { id:'h7', author:'林小鱼', time:'11:20', text:'**Supabase RLS 导致前端查不到数据**\n\n症状：数据库里明明有数据，但 `supabase.from("table").select()` 返回空数组。\n\n折腾了一个小时了，是不是权限问题？', reactions:[{emoji:'🤔',count:5}], thread:{count:6, authors:['王','张','赵']} },
      { id:'h8', author:'王大锤', role:'助教', time:'11:25', text:'@林小鱼 经典坑！创建表后默认启用 RLS，但没有添加策略 = 所有人都没有读取权限。\n\n解决：Supabase Dashboard → Authentication → Policies → 给表添加 SELECT policy\n\n我发到踩坑频道了，这个问题太常见了。', reactions:[{emoji:'💡',count:20},{emoji:'👍',count:12}], replyTo:{msgId:'h7',author:'林小鱼',preview:'Supabase RLS 导致前端查不到数据'} },
      { id:'h9', author:'林小鱼', time:'11:40', text:'解决了！大锤哥 yyds！加了 policy 之后数据就出来了。建议把这个写进 FAQ，肯定还会有人踩。', reactions:[{emoji:'🎉',count:4}], replyTo:{msgId:'h8',author:'王大锤',preview:'创建表后默认启用 RLS'} },
      { id:'h10', author:'赵薇薇', time:'15:00', text:'**Stripe Webhook 本地调试问题**\n\n按照文档配了 webhook，但 Stripe 发的事件本地一直收不到。用的是 `localhost:3000/api/webhook`，但 Stripe 怎么访问 localhost？', reactions:[{emoji:'🤔',count:4}] },
      { id:'h11', author:'陈小飞', time:'15:10', text:'@赵薇薇 Stripe 访问不了你的 localhost，需要用 ngrok 或者 Stripe CLI 做转发。\n\n最简单的方式：`stripe listen --forward-to localhost:3000/api/webhook`\n\n安装 Stripe CLI：`brew install stripe/stripe-cli/stripe`', reactions:[{emoji:'💡',count:11},{emoji:'👍',count:7}], replyTo:{msgId:'h10',author:'赵薇薇',preview:'Stripe Webhook 本地调试问题'} },
      { id:'h12', author:'赵薇薇', time:'15:30', text:'用 Stripe CLI 搞定了！谢谢大飞哥，这种实战经验课程里不一定会讲到。', reactions:[{emoji:'🎉',count:3}], replyTo:{msgId:'h11',author:'陈小飞',preview:'需要用 ngrok 或者 Stripe CLI'} },
      { date: '4月15日 周二' },
      { id:'h13', author:'何丽', time:'09:30', text:'**CSS 问题求助**\n\n我用 Tailwind 做了一个卡片布局，但在手机上看完全乱了。用了 `flex` 但不会响应式... 截图如下：\n\n大屏正常，小屏卡片重叠在一起了。', reactions:[{emoji:'🤔',count:2}] },
      { id:'h14', author:'李思思', time:'09:40', text:'@何丽 你用的是 `flex` 还是 `grid`？推荐用 grid：\n\n`grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4`\n\n这样手机一列、平板两列、桌面三列，自动响应。', reactions:[{emoji:'💡',count:8},{emoji:'👍',count:5}], replyTo:{msgId:'h13',author:'何丽',preview:'CSS 问题求助'} },
      { id:'h15', author:'何丽', time:'09:55', text:'啊啊啊 太神奇了一行代码就解决了！Tailwind 真是设计师的福音。谢谢思思！', reactions:[{emoji:'🎉',count:4}], replyTo:{msgId:'h14',author:'李思思',preview:'推荐用 grid'} },
      { id:'h16', author:'郑涛', time:'14:00', text:'**Vercel 部署报 500 错误**\n\n本地跑得好好的，deploy 到 Vercel 就报 500。Build 日志没有明显错误。有人遇到过吗？\n\n用的是 Next.js 14 + Server Actions。', reactions:[{emoji:'🤔',count:3}], thread:{count:5, authors:['张','周','陈']} },
      { id:'h17', author:'张明', time:'14:15', text:'@郑涛 大概率是 `next.config.js` 里没加 `serverExternalPackages`。某些 node 模块在 Vercel 的 edge runtime 跑不了。\n\n在 config 里加上：\n`serverExternalPackages: ["你用的包名"]`\n\n我之前也踩了这个坑，浪费了一整个下午。', reactions:[{emoji:'💡',count:10},{emoji:'👍',count:6}], replyTo:{msgId:'h16',author:'郑涛',preview:'Vercel 部署报 500 错误'} },
      { date: '今天' },
      { id:'h18', author:'吴小强', time:'08:30', text:'**Claude API 返回 429 错误**\n\n调用 Claude API 的时候经常报 429 Too Many Requests。我用的是免费 tier，是不是有限制？有什么解决办法？' },
      { id:'h19', author:'王大锤', role:'助教', time:'08:40', text:'@吴小强 429 是限流。免费 tier 确实有限制。解决方案：\n\n1. 加重试逻辑，指数退避\n2. 做缓存，相同请求不重复调用\n3. 升级到付费 tier（推荐，$5/月够用很久）\n\n代码示例我发到踩坑频道了。', reactions:[{emoji:'👍',count:8}], replyTo:{msgId:'h18',author:'吴小强',preview:'Claude API 返回 429 错误'} },
      { id:'h20', author:'黄小美', time:'10:00', text:'**GitHub 推送被拒绝了**\n\n`git push` 报错 `rejected - non-fast-forward`。我就改了一个文件啊，怎么推不上去？', reactions:[{emoji:'🤔',count:2}] },
      { id:'h21', author:'周杰', time:'10:10', text:'@黄小美 这是因为远程有你本地没有的提交。先 `git pull --rebase` 再 push 就行了。\n\n以后养成习惯：push 之前先 pull。', reactions:[{emoji:'👍',count:6}], replyTo:{msgId:'h20',author:'黄小美',preview:'GitHub 推送被拒绝了'} },
    ]
  },
  tools: {
    name: '# 工具测评',
    desc: '分享你用过的 AI 工具、开发工具，聊聊优缺点和使用心得。',
    messages: [
      { date: '4月13日 周日' },
      { id:'t1', author:'刘小排', role:'讲师', time:'10:00', text:'给大家整理了一份 **2025 年 AI 编程工具推荐清单**，从代码编辑器到部署平台到数据库。收藏起来，遇到选择困难的时候翻一翻。\n\n编辑器：Cursor > VS Code + Copilot > Windsurf\n部署：Vercel > Netlify > Railway\n数据库：Supabase > PlanetScale > Firebase\nAI：Claude > GPT > Gemini', reactions:[{emoji:'🔥',count:36},{emoji:'❤️',count:18},{emoji:'📝',count:10}], thread:{count:8, authors:['陈','王','李','周']} },
      { id:'t2', author:'陈小飞', time:'14:23', text:'刚试了 **Cursor** 的新版本，Tab 补全的准确率提升很明显，尤其是写 React 组件的时候。但内存占用也上去了，8G 的机器有点吃力。', reactions:[{emoji:'👍',count:15}], thread:{count:8, authors:['周','赵','陈','林']} },
      { id:'t3', author:'王大锤', role:'助教', time:'15:01', text:'有没有人用过 **v0.dev**？上周用它生成了一个 landing page，效果超预期。配合 shadcn/ui 可以直接导入组件，这个工作流太丝滑了。', reactions:[{emoji:'👍',count:8},{emoji:'💡',count:5}] },
      { date: '4月14日 周一' },
      { id:'t4', author:'李思思', time:'09:38', text:'v0 我也在用，配合 Shadcn 确实丝滑。不过我发现直接用 **Claude** 写组件反而更可控。v0 生成的代码有时候嵌套太深，改起来很痛苦。', reactions:[{emoji:'💯',count:6}] },
      { id:'t5', author:'张明', time:'11:30', text:'分享一个发现：**Bolt.new** 现在支持直接部署到 Netlify。我昨天 2 小时从零到上线了一个小工具。\n\n不过代码质量确实不如 Cursor + Claude 的组合。适合 MVP 验证，不适合长期维护。', reactions:[{emoji:'👍',count:10},{emoji:'🔥',count:5}], thread:{count:4, authors:['周','李','黄']} },
      { id:'t6', author:'周杰', time:'14:00', text:'字节内部现在很多团队在用 **Claude Code CLI**。直接在终端里让 AI 改代码、跑测试、写 PR 描述。效率比 IDE 插件还高。\n\n缺点是学习曲线比较陡，不适合纯新手。', reactions:[{emoji:'🔥',count:13},{emoji:'👍',count:7}] },
      { id:'t7', author:'何丽', time:'15:30', text:'设计师视角推荐一波工具：\n\n1. **v0.dev** — 文字转 UI，出图比我画的还好看（扎心）\n2. **Figma AI** — 自动布局、自动填色\n3. **Midjourney** — 做 hero image 和 banner\n4. **Remove.bg** — 抠图效率提升 10 倍', reactions:[{emoji:'❤️',count:12},{emoji:'💡',count:6}] },
      { date: '4月15日 周二' },
      { id:'t8', author:'赵薇薇', time:'10:15', text:'推荐一个宝藏工具：**Supabase 的 AI SQL 编辑器**。用自然语言描述你想要什么数据，它帮你写 SQL。对不熟悉 SQL 的同学简直是救星。', reactions:[{emoji:'💡',count:14},{emoji:'👍',count:9}], thread:{count:3, authors:['林','瓜']} },
      { id:'t9', author:'孙大伟', time:'11:00', text:'试了一下 **Lovable**（原 GPT Engineer），跟 Bolt 类似但代码质量稍好。适合快速做落地页和简单 CRUD。\n\n但说实话，用惯了 Cursor 之后很难回去用这些"一键生成"的工具。控制力差太多。', reactions:[{emoji:'👍',count:7}] },
      { id:'t10', author:'马飞', time:'14:00', text:'做教育工具的同学看过来！**Excalidraw** 这个白板工具真的好用，可以嵌入到自己的产品里。而且开源的，随便改。我拿来做了一个数学题画图工具。', reactions:[{emoji:'💡',count:8},{emoji:'❤️',count:4}] },
      { id:'t11', author:'郑涛', time:'16:00', text:'数据分析相关工具推荐：\n\n1. **Recharts** — React 图表库，API 简单\n2. **Tremor** — 现成的 dashboard 组件\n3. **Observable** — 数据可视化探索\n\n前两个配合 Tailwind 用起来很舒服。', reactions:[{emoji:'📝',count:6},{emoji:'👍',count:4}] },
      { date: '今天' },
      { id:'t12', author:'周杰', time:'09:00', text:'昨天发现 **Claude Code** 可以直接连 GitHub，一句话帮你 review PR、写测试、生成文档。这个效率提升是指数级的。\n\n我周末用它重构了一个 2000 行的文件，本来以为要花一天，结果 2 小时搞定。', reactions:[{emoji:'🔥',count:16},{emoji:'👀',count:8}] },
      { id:'t13', author:'黄小美', time:'09:30', text:'求推荐适合学生用的免费工具！Cursor 的免费额度我已经用完了 😭', reactions:[{emoji:'🤔',count:3}] },
      { id:'t14', author:'王大锤', role:'助教', time:'09:45', text:'@黄小美 免费方案：\n1. VS Code + Copilot（学生免费）\n2. Claude.ai 免费 tier 够用\n3. Supabase 免费 tier 很够\n4. Vercel hobby 计划免费\n\n基本上 $0 就能搞定全套。', reactions:[{emoji:'❤️',count:12},{emoji:'👍',count:8}], replyTo:{msgId:'t13',author:'黄小美',preview:'求推荐适合学生用的免费工具'} },
      { id:'t15', author:'吴小强', time:'10:30', text:'PM 转码实测报告：作为 10 年 PM 第一次写代码，**Cursor + Claude** 这个组合拳真的是降维打击。我描述需求，AI 写代码，我验收。跟以前带团队写 PRD 差不多。', reactions:[{emoji:'😂',count:14},{emoji:'🔥',count:7}] },
      { id:'t16', author:'刘小排', role:'讲师', time:'11:00', text:'补充一个被低估的工具：**Vercel AI SDK**。如果你要做 AI 产品，强烈建议直接用这个。Streaming、Tool Calling、Provider 切换都封装好了。比自己手搓强 10 倍。', reactions:[{emoji:'💡',count:11},{emoji:'👍',count:7}] },
      { id:'t17', author:'陈小飞', time:'14:00', text:'**Cursor 配置经验分享**：\n\n1. 排除 node_modules 和 .git（省 2G 内存）\n2. 启用 .cursorrules 文件\n3. 设置项目技术栈说明\n4. 关掉不必要的插件\n\n做完这些之后体验提升很大。', reactions:[{emoji:'📝',count:10},{emoji:'👍',count:8}] },
      { id:'t18', author:'林小鱼', time:'15:00', text:'有人用过 **Framer** 吗？我觉得做 landing page 比 Next.js 简单多了... 还是说正经产品就不该用这种工具？', reactions:[{emoji:'🤔',count:4}] },
      { id:'t19', author:'孙大伟', time:'15:20', text:'Framer 做营销页面很好，但做应用不行。建议：landing page 用 Framer，产品用 Next.js，两不耽误。', replyTo:{msgId:'t18',author:'林小鱼',preview:'有人用过 Framer 吗'} },
      { id:'t20', author:'张明', time:'16:00', text:'最新一期 State of JS 2025 调查出来了，Cursor 用户满意度排名第一，超过了 VS Code。时代真的变了。', reactions:[{emoji:'👀',count:9},{emoji:'🔥',count:5}] },
    ]
  },
  pitfalls: {
    name: '# 踩坑经验',
    desc: 'Bug、配置、部署、支付... 把你踩过的坑记录下来，帮后来人少走弯路。',
    messages: [
      { date: '4月13日 周日' },
      { id:'p1', author:'王大锤', role:'助教', time:'14:00', text:'整理了一份 **Stripe 中国开发者常见问题汇总**：\n\n1. 注册地区选香港或新加坡\n2. 测试模式用 `pk_test_` 开头的 key\n3. Webhook 本地调试用 Stripe CLI\n4. 人民币结算需要额外配置\n5. 个人开发者可以用，但提现有门槛\n\n都是群里反复出现的问题。', reactions:[{emoji:'❤️',count:28},{emoji:'🔥',count:14},{emoji:'📝',count:10}], thread:{count:8, authors:['张','林','赵','陈']} },
      { id:'p2', author:'张明', time:'16:00', text:'**坑：环境变量在 Vercel 和本地不同步**\n\n本地 `.env.local` 里的变量不会自动同步到 Vercel。需要在 Vercel Dashboard 里手动添加。\n\n血泪教训：我在 .env.local 里改了 API key，本地正常，线上崩了。排查了两小时才发现。', reactions:[{emoji:'👍',count:11},{emoji:'🙏',count:5}] },
      { date: '4月14日 周一' },
      { id:'p3', author:'赵薇薇', time:'09:00', text:'**坑：Stripe Checkout 的 success_url 必须是绝对路径**\n\n我写了 `/success`，结果支付完一直跳转失败。改成 `https://你的域名/success` 才行。\n\n文档里其实写了，但我没仔细看...', reactions:[{emoji:'👍',count:8},{emoji:'😂',count:3}] },
      { id:'p4', author:'林小鱼', time:'11:20', text:'**坑：Supabase RLS 导致前端查不到数据**\n\n症状：数据库里有数据，`supabase.from("table").select()` 返回空数组。\n\n原因：创建表后默认启用 RLS 但没添加策略 = 所有人都没权限。\n\n解决：Dashboard → Authentication → Policies → 添加 SELECT policy。', reactions:[{emoji:'💡',count:22},{emoji:'👍',count:14},{emoji:'🙏',count:7}], thread:{count:6, authors:['赵','王','张','瓜']} },
      { id:'p5', author:'张明', time:'16:30', text:'**坑：Vercel 部署 Next.js 14 的 Server Actions 报 500**\n\n原因：`next.config.js` 里没加 `serverExternalPackages`，某些 node 模块在 edge runtime 跑不了。\n\n解决：`serverExternalPackages: ["你的包名"]`\n\n浪费了整整一个下午...', reactions:[{emoji:'👍',count:16},{emoji:'🙏',count:8}], thread:{count:5, authors:['李','周','陈']} },
      { date: '4月15日 周二' },
      { id:'p6', author:'周杰', time:'10:00', text:'**坑：Next.js App Router 里用 `use client` 的时机**\n\n不是所有组件都需要加 `"use client"`。只有用了 useState、useEffect、onClick 这些浏览器 API 的组件才需要。\n\n加多了会让你的页面变慢（失去 SSR 优势），加少了会报错。', reactions:[{emoji:'💡',count:13},{emoji:'👍',count:8}] },
      { id:'p7', author:'赵薇薇', time:'14:00', text:'**坑：Tailwind CSS v4 和 v3 的配置完全不同**\n\nv4 不再用 `tailwind.config.js`，改成在 CSS 文件里用 `@import` 和 `@theme`。\n\n如果你按 v3 的教程配置会发现样式全部失效。\n\n检查方法：看 `package.json` 里 tailwindcss 的版本号。', reactions:[{emoji:'👍',count:9},{emoji:'💡',count:5}] },
      { id:'p8', author:'孙大伟', time:'16:00', text:'**坑：Claude API 的 system prompt 有 token 限制**\n\n我把整个项目文档都塞进 system prompt 里，结果报 400 错误。\n\n解决：system prompt 控制在 4000 tokens 以内，长文档用 RAG 或者放到 user message 里。', reactions:[{emoji:'💡',count:7},{emoji:'👍',count:4}] },
      { id:'p9', author:'马飞', time:'20:00', text:'**坑：Git 提交了 `.env` 文件**\n\n第一次用 Git，忘了加 `.gitignore`，把 API key 推到了 GitHub... 吓出一身冷汗。\n\n紧急处理：1. 立刻删除文件并 push 2. 去各平台重置 API key 3. 加上 `.gitignore`\n\n新手千万注意这个！', reactions:[{emoji:'😱',count:12},{emoji:'👍',count:8},{emoji:'🙏',count:5}] },
      { id:'p10', author:'陈小飞', time:'20:30', text:'补充一个：就算你从 Git 历史里删了 .env，别人还是可以从历史记录里看到。所以 key 泄露了就必须重置，别心存侥幸。', replyTo:{msgId:'p9',author:'马飞',preview:'Git 提交了 .env 文件'} },
      { date: '今天' },
      { id:'p11', author:'黄小美', time:'08:30', text:'**坑：npm 全局安装的包找不到**\n\n装了 `npm install -g create-next-app`，但跑 `create-next-app` 报 command not found。\n\n原因：npm 的全局 bin 目录不在 PATH 里。\n\n解决：`npm config get prefix` 找到目录，加到 `~/.zshrc` 的 PATH 里。', reactions:[{emoji:'👍',count:6}] },
      { id:'p12', author:'何丽', time:'09:00', text:'**坑：CSS `position: fixed` 在移动端的坑**\n\n做了一个固定底部导航栏，桌面正常，手机上被键盘顶上去了。\n\n解决：用 `position: sticky` 代替，或者加 `height: 100dvh` 配合 `overflow: auto`。', reactions:[{emoji:'💡',count:5},{emoji:'👍',count:3}] },
      { id:'p13', author:'张明', time:'09:33', text:'**坑：ngrok 免费版域名每次重启会变**\n\n在 Stripe 配了 webhook URL，重启 ngrok 之后 webhook 就收不到了。\n\n建议：用 `ngrok http --url=你的固定域名` 或直接升级。开发阶段推荐 Stripe CLI 替代 ngrok。', reactions:[{emoji:'👍',count:5},{emoji:'😂',count:7}] },
      { id:'p14', author:'郑涛', time:'10:00', text:'**坑：Supabase 的 timestamp 默认是 UTC**\n\n存进去北京时间 14:00，取出来变成 06:00。因为 Supabase 默认用 UTC 存储。\n\n解决：前端显示时做时区转换，或者存的时候统一用 UTC + 前端转换。', reactions:[{emoji:'💡',count:6},{emoji:'👍',count:4}] },
      { id:'p15', author:'吴小强', time:'14:00', text:'**坑：用 AI 写代码后不检查就直接提交**\n\n AI 写的代码看着对，但经常有隐藏 bug。比如 API key 写死在前端代码里、SQL 注入漏洞、无限循环等。\n\n经验：AI 写完后一定要自己 review 一遍。特别是涉及安全的部分。', reactions:[{emoji:'👍',count:15},{emoji:'💯',count:8}] },
      { id:'p16', author:'王大锤', role:'助教', time:'14:30', text:'吴哥这条非常重要！置顶级的经验。AI 是很好的助手，但它不会为你的 bug 负责。', reactions:[{emoji:'❤️',count:6}], replyTo:{msgId:'p15',author:'吴小强',preview:'用 AI 写代码后不检查就直接提交'} },
      { id:'p17', author:'瓜哥', time:'15:00', text:'**坑：终端里复制粘贴的命令前面有空格**\n\n从教程复制命令到终端，一直报错。最后发现是命令前面多了一个不可见的空格字符。\n\n太离谱了但确实是我遇到的问题 😭', reactions:[{emoji:'😂',count:14},{emoji:'🤝',count:5}] },
    ]
  },
  prompt: {
    name: '# Prompt 技巧',
    desc: 'Prompt Engineering 的经验、技巧、最佳实践。',
    messages: [
      { date: '4月13日 周日' },
      { id:'pr1', author:'刘小排', role:'讲师', time:'09:00', text:'分享一个核心 prompt 技巧：**让 AI 先分析再执行**。\n\n不要说"帮我写一个登录页"。\n而是说"先分析项目的技术栈、现有组件和样式，然后写一个风格一致的登录页"。\n\n差别巨大。前者可能给你写一个和项目完全不搭的东西，后者会先理解上下文再动手。', reactions:[{emoji:'🔥',count:28},{emoji:'💡',count:16},{emoji:'📝',count:9}] },
      { id:'pr2', author:'王大锤', role:'助教', time:'14:00', text:'**Claude System Prompt 四要素模板**：\n\n1. 角色定义 — 你是什么\n2. 上下文 — 项目背景\n3. 约束条件 — 不能做什么\n4. 输出格式 — 要怎么回答\n\n按这四步写，prompt 效果提升 50% 以上。', reactions:[{emoji:'📝',count:14},{emoji:'👍',count:10}] },
      { date: '4月14日 周一' },
      { id:'pr3', author:'李思思', time:'08:45', text:'实测有效的技巧：在 prompt 里加"**写测试**"。\n\n让 AI 同时写代码和测试，会迫使它思考边界情况。我之前让它只写功能代码，经常有 bug；加上测试要求后，质量明显提升。', reactions:[{emoji:'💡',count:15},{emoji:'👍',count:8}] },
      { id:'pr4', author:'陈小飞', time:'10:00', text:'分享我的 **.cursorrules 模板**：\n\n```\n你是一个资深全栈工程师\n技术栈：Next.js 14, TypeScript, Tailwind, Supabase\n代码风格：简洁、可读、有注释\n组件规范：每个文件一个组件，props 用 TypeScript 接口\n错误处理：所有 API 调用都要 try-catch\n```\n\n用了之后 Cursor 生成的代码质量好了很多。', reactions:[{emoji:'🔥',count:19},{emoji:'📝',count:11}] },
      { id:'pr5', author:'张明', time:'14:30', text:'进阶技巧：**Chain of Thought（思维链）**\n\n遇到复杂需求，不要一步到位。把任务拆成小步骤让 AI 逐步执行：\n\n"第一步：分析现有数据库结构\n第二步：设计新的表结构\n第三步：写 migration\n第四步：写 API\n第五步：写前端页面"\n\n比"帮我做一个用户管理系统"有效得多。', reactions:[{emoji:'💡',count:13},{emoji:'👍',count:7}] },
      { date: '4月15日 周二' },
      { id:'pr6', author:'周杰', time:'09:30', text:'字节内部的 prompt 最佳实践：**Few-shot 示例**\n\n给 AI 一两个你期望的输入输出示例，它就能举一反三。比纯文字描述准确率高 3 倍。\n\n特别适合格式化输出、数据转换这类任务。', reactions:[{emoji:'🔥',count:10},{emoji:'💡',count:6}] },
      { id:'pr7', author:'赵薇薇', time:'11:00', text:'翻译领域的 prompt 心得：\n\n"请用**商务英语**重写以下邮件，保持**专业但友好**的语气，注意以下要点：1) 避免中式英语 2) 用短句 3) 主动语态"\n\n关键词加粗 + 具体要求列表，效果远好于"帮我翻译这封邮件"。', reactions:[{emoji:'💡',count:9},{emoji:'📝',count:5}] },
      { id:'pr8', author:'孙大伟', time:'15:00', text:'**负面 prompt 很有用**：告诉 AI 不要做什么。\n\n"不要用 class 组件，只用函数组件"\n"不要用 any 类型"\n"不要生成注释过多的代码"\n\n有时候说"不要"比说"要"更精准。', reactions:[{emoji:'👍',count:8},{emoji:'💡',count:4}] },
      { date: '今天' },
      { id:'pr9', author:'马飞', time:'08:00', text:'教育领域的 prompt 分享：让 AI 出题的时候加上 **"请按布鲁姆认知层次出题"**，它就会自动出记忆、理解、应用、分析等不同层次的题目。专业的教学设计 prompt 加持效果很惊人。', reactions:[{emoji:'🔥',count:11},{emoji:'💡',count:7}] },
      { id:'pr10', author:'何丽', time:'09:30', text:'设计师的 prompt 秘诀：让 AI 生成 UI 的时候，给它一个 **设计系统描述**：\n\n"使用 8px 间距系统，圆角 8px，主色 teal-600，灰度用 slate 系列，字体 14/16/20/24 四档"\n\n比说"做一个好看的页面"有用 100 倍。', reactions:[{emoji:'💡',count:10},{emoji:'❤️',count:5}] },
      { id:'pr11', author:'刘小排', role:'讲师', time:'10:00', text:'今天分享一个高级技巧：**让 AI 扮演你的用户**。\n\n"假设你是一个不懂技术的小白用户，尝试使用这个产品。指出所有你觉得困惑、不直觉、需要额外解释的地方。"\n\n这个 prompt 帮我发现了很多 UX 问题。', reactions:[{emoji:'🔥',count:14},{emoji:'💡',count:8}] },
      { id:'pr12', author:'林小鱼', time:'14:00', text:'PM 视角的 prompt：让 AI 写 PRD 的时候加上 **"请包含用户故事、验收标准和边界情况"**。AI 会自动帮你想到很多你没考虑到的场景。', reactions:[{emoji:'👍',count:6},{emoji:'📝',count:4}] },
      { id:'pr13', author:'郑涛', time:'16:00', text:'数据分析的 prompt：\n\n"分析这组数据时，请先说明你的分析思路，然后给出 3 个关键发现，每个发现附上支持数据。最后给出 1-2 个可操作的建议。"\n\n结构化输出 = 高质量结果。', reactions:[{emoji:'💡',count:7},{emoji:'👍',count:4}] },
    ]
  },
  payment: {
    name: '# 支付变现',
    desc: 'Stripe、微信支付、定价策略、收款经验，和钱相关的都在这里。',
    messages: [
      { date: '4月13日 周日' },
      { id:'pay1', author:'刘小排', role:'讲师', time:'10:00', text:'**支付变现入门指南**：\n\n个人开发者最推荐的支付方案：\n- 海外用户 → Stripe（首选）或 LemonSqueezy\n- 国内用户 → 虎皮椒 / 面包多 / 爱发电\n- 两边都有 → LemonSqueezy（支持多币种）\n\n不要在支付上花太多时间，选一个先用起来。', reactions:[{emoji:'🔥',count:24},{emoji:'📝',count:12},{emoji:'👍',count:9}] },
      { id:'pay2', author:'王大锤', role:'助教', time:'14:00', text:'Stripe 注册指南（避坑版）：\n\n1. 地区选香港或新加坡（大陆用不了）\n2. 需要对应地区的银行账户或 Wise 账户\n3. 先用测试模式，不要急着上线真实支付\n4. Webhook 一定要配，不然订单状态会不同步', reactions:[{emoji:'👍',count:18},{emoji:'💡',count:7}] },
      { date: '4月14日 周一' },
      { id:'pay3', author:'赵薇薇', time:'15:00', text:'请问大家的 SaaS 产品一般怎么定价？我做了个小工具，不知道收 $5/月还是 $10/月。怕定高了没人用，定低了不赚钱...', reactions:[{emoji:'🤔',count:8}], thread:{count:6, authors:['刘','王','陈','孙']} },
      { id:'pay4', author:'陈小飞', time:'16:00', text:'**我的定价策略**：\n\n免费版（有限次数）→ $9/月（个人）→ $29/月（团队）\n\n关键心得：\n1. 一定要有免费版，降低使用门槛\n2. 个人版价格不超过一杯星巴克\n3. 团队版才是利润大头\n4. 年付打 8 折，提高 LTV', reactions:[{emoji:'🔥',count:14},{emoji:'📝',count:8}] },
      { id:'pay5', author:'孙大伟', time:'20:00', text:'分享我的第一笔收入经历：\n\n上线第一天：0 用户\n第三天：发了一条小红书，来了 50 个注册\n第五天：第一个付费用户！$5\n第七天：3 个付费用户\n\n虽然不多，但从 0 到 1 的突破太重要了。关键是敢定价、敢收费。', reactions:[{emoji:'🎉',count:20},{emoji:'💪',count:11},{emoji:'💰',count:7}] },
      { date: '4月15日 周二' },
      { id:'pay6', author:'林小鱼', time:'10:30', text:'有人用过 **LemonSqueezy** 吗？看起来比 Stripe 对个人开发者更友好，不需要海外银行账户？', reactions:[{emoji:'👀',count:6}] },
      { id:'pay7', author:'周杰', time:'10:45', text:'LemonSqueezy 我在用，确实更友好。支持 Paypal、信用卡，提现可以到 Paypal。\n\n但手续费比 Stripe 高一点（5% vs 2.9%）。量大了还是 Stripe 划算。', reactions:[{emoji:'💡',count:8},{emoji:'👍',count:4}], replyTo:{msgId:'pay6',author:'林小鱼',preview:'有人用过 LemonSqueezy 吗'} },
      { id:'pay8', author:'何丽', time:'14:00', text:'做设计工具的朋友们，你们收费模式是按次还是按月？\n\n我的配色工具不知道该按生成次数收费还是包月。', reactions:[{emoji:'🤔',count:3}] },
      { id:'pay9', author:'刘小排', role:'讲师', time:'14:30', text:'@何丽 建议包月 + 用量限制。比如 $5/月 50 次，超出额外收费。\n\n纯按次收费用户心理压力大（每次都在想值不值），包月给人安全感。', reactions:[{emoji:'💡',count:10},{emoji:'👍',count:6}], replyTo:{msgId:'pay8',author:'何丽',preview:'收费模式是按次还是按月'} },
      { date: '今天' },

// Resolve parent references
Object.keys(threadData).forEach(key => {
  for (const chKey of Object.keys(channelData)) {
    const msg = channelData[chKey].messages.find(m => m.id === key);
    if (msg) { threadData[key].parent = msg; break; }
  }
});

// ===== State =====
let currentChannel = 'lobby';
let panelOpen = false;
let currentThread = null;

// ===== Render =====
function renderMessages(channelId) {
  const ch = channelData[channelId];
  const feed = document.getElementById('msgFeed');
  let html = '';

  ch.messages.forEach(msg => {
    if (msg.date) {
      html += `<div class="date-sep"><span>${msg.date}</span></div>`;
      return;
    }

    const roleHtml = msg.role ? `<span class="msg-role">${msg.role}</span>` : '';
    const reactionsHtml = msg.reactions ? msg.reactions.map(r =>
      `<span class="reaction" onclick="toggleReaction(this)">${r.emoji} ${r.count}</span>`
    ).join('') : '';
    let threadHtml = '';
    if (msg.thread) {
      threadHtml = `<span class="thread-link" onclick="openThread('${msg.id}')">${msg.thread.count} 条回复</span>`;
    }
    const textHtml = msg.text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/@(\S+)/g, '<strong style="color:var(--teal)">@$1</strong>')
      .replace(/\n/g, '<br>');

    const isReply = !!msg.replyTo;
    const isRoot = !isReply;
    const msgClass = isReply ? 'is-reply' : 'is-root';

    // Prepend @mention for replies if not already in text
    let displayText = textHtml;
    if (isReply && msg.replyTo.author && !msg.text.startsWith('@')) {
      displayText = `<strong style="color:var(--teal);font-size:12px;">@${msg.replyTo.author}</strong> ${textHtml}`;
    }

    html += `<div class="msg ${msgClass}" data-id="${msg.id}">
      <div class="msg-monogram">${msg.author[0]}</div>
      <div class="msg-body">
        <div class="msg-header">
          <span class="msg-name">${msg.author}</span>
          ${roleHtml}
          <span class="msg-time">${msg.time}</span>
          <span class="msg-hover-actions">
            <span class="msg-hover-action" title="回复" onclick="startInlineReply('${msg.id}','${msg.author}')">💬</span>
            <span class="msg-hover-action" title="表情">😊</span>
            ${msg.thread ? `<span class="msg-hover-action" title="查看线程" onclick="openThread('${msg.id}')">🧵</span>` : ''}
          </span>
        </div>
        <div class="msg-text">${displayText}</div>
        ${reactionsHtml ? `<div class="msg-reactions">${reactionsHtml}</div>` : ''}
        ${threadHtml}
      </div>
    </div>
    <div id="inline-reply-${msg.id}"></div>`;
  });

  feed.innerHTML = html;
  feed.scrollTop = feed.scrollHeight;
}

function renderPanel() {
  const panel = document.getElementById('panelContent');
  if (!currentThread || !threadData[currentThread]) {
    closePanel();
    return;
  }

  const td = threadData[currentThread];
  const parentMsg = td.parent;
  if (!parentMsg) { closePanel(); return; }

  const parentText = parentMsg.text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');

  let repliesHtml = td.replies.map(r => {
    const roleTag = r.role ? `<span class="msg-role">${r.role}</span>` : '';
    const rText = r.text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/@(\S+)/g, '<strong style="color:var(--teal)">@$1</strong>')
      .replace(/\n/g, '<br>');
    return `<div class="thread-reply">
      <div class="msg-monogram">${r.author[0]}</div>
      <div class="msg-body">
        <div class="msg-header">
          <span class="msg-name">${r.author}</span>
          ${roleTag}
          <span class="msg-time">${r.time}</span>
        </div>
        <div class="msg-text">${rText}</div>
      </div>
    </div>`;
  }).join('');

  panel.innerHTML = `
    <div class="panel-header">
      <div class="panel-title">线程</div>
      <button class="panel-close" onclick="closePanel()">&times;</button>
    </div>
    <div class="thread-content">
      <div class="thread-parent">
        <div class="msg-header">
          <span class="msg-name">${parentMsg.author}</span>
          <span class="msg-time">${parentMsg.time}</span>
        </div>
        <div class="msg-text">${parentText}</div>
      </div>
      <div class="thread-replies-label">${td.replies.length} 条回复</div>
      <div class="thread-replies">${repliesHtml}</div>
    </div>
    <div class="thread-input-area">
      <textarea placeholder="回复..." rows="2"></textarea>
      <div class="thread-input-footer">
        <button class="send-btn ready" style="font-size:12px;">回复</button>
      </div>
    </div>`;
}

// ===== Actions =====
function switchChannel(el) {
  document.querySelectorAll('.sb-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  currentChannel = el.dataset.channel;
  currentThread = null;

  const ch = channelData[currentChannel];
  document.getElementById('chTitle').textContent = ch.name;
  document.getElementById('chDesc').textContent = ch.desc;

  // Remove unread count
  const unread = el.querySelector('.sb-unread');
  if (unread) unread.remove();

  closePanel();
  renderMessages(currentChannel);
}

function openThread(msgId) {
  if (!threadData[msgId]) return;
  currentThread = msgId;
  panelOpen = true;
  document.getElementById('layout').classList.add('panel-open');
  renderPanel();
}

function closePanel() {
  panelOpen = false;
  document.getElementById('layout').classList.remove('panel-open');
  currentThread = null;
}

function toggleReaction(el) {
  el.classList.toggle('active');
  const parts = el.textContent.trim().split(' ');
  let count = parseInt(parts[1]);
  if (el.classList.contains('active')) count++; else count--;
  el.textContent = parts[0] + ' ' + count;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function updateSendBtn() {
  const btn = document.getElementById('sendBtn');
  const input = document.getElementById('msgInput');
  if (input.value.trim()) {
    btn.classList.remove('disabled');
    btn.classList.add('ready');
  } else {
    btn.classList.add('disabled');
    btn.classList.remove('ready');
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;

  const ch = channelData[currentChannel];
  ch.messages.push({
    id: 'u' + Date.now(),
    author: '瓜哥',
    time: new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'}),
    text: text,
    reactions: []
  });

  input.value = '';
  input.style.height = 'auto';
  updateSendBtn();
  renderMessages(currentChannel);
}

function toggleSearch() {
  // Minimal search toggle - could expand
  const input = document.getElementById('msgInput');
  input.focus();
  input.placeholder = '搜索...';
  input.addEventListener('blur', function restore() {
    input.placeholder = '写点什么...';
    input.removeEventListener('blur', restore);
  });
}

// ===== Scroll to message =====
function scrollToMsg(msgId) {
  const el = document.querySelector('[data-id="' + msgId + '"]');
  if (el) {
    el.scrollIntoView({ behavior:'smooth', block:'center' });
    el.style.background = '#f0eeea';
    setTimeout(() => { el.style.background = ''; }, 1500);
  }
}

// ===== Inline Reply =====
let activeReplyId = null;

function startInlineReply(msgId, author) {
  // 关闭之前打开的
  if (activeReplyId) closeInlineReply(activeReplyId);
  activeReplyId = msgId;

  const container = document.getElementById('inline-reply-' + msgId);
  if (!container) return;

  container.innerHTML = `<div class="inline-reply">
    <div class="inline-reply-header">
      <span>回复 <span class="reply-to">${author}</span></span>
      <button class="inline-reply-close" onclick="closeInlineReply('${msgId}')">&times;</button>
    </div>
    <textarea id="reply-input-${msgId}" placeholder="回复 ${author}..." rows="2" onkeydown="handleInlineReplyKey(event,'${msgId}','${author}')"></textarea>
    <div class="inline-reply-footer">
      <button class="cancel-btn" onclick="closeInlineReply('${msgId}')">取消</button>
      <button class="reply-send-btn" onclick="sendInlineReply('${msgId}','${author}')">回复</button>
    </div>
  </div>`;

  // Focus and scroll into view
  const textarea = document.getElementById('reply-input-' + msgId);
  setTimeout(() => {
    textarea.focus();
    container.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }, 50);
}

function closeInlineReply(msgId) {
  const container = document.getElementById('inline-reply-' + msgId);
  if (container) container.innerHTML = '';
  if (activeReplyId === msgId) activeReplyId = null;
}

function handleInlineReplyKey(e, msgId, author) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendInlineReply(msgId, author);
  }
  if (e.key === 'Escape') {
    closeInlineReply(msgId);
  }
}

function sendInlineReply(msgId, author) {
  const textarea = document.getElementById('reply-input-' + msgId);
  if (!textarea) return;
  const text = textarea.value.trim();
  if (!text) return;

  const ch = channelData[currentChannel];
  const parentMsg = ch.messages.find(m => m.id === msgId);
  const parentPreview = parentMsg ? parentMsg.text.replace(/\*\*/g,'').replace(/\n/g,' ').slice(0,40) : '';

  // Insert reply right after the original message
  const msgIndex = ch.messages.findIndex(m => m.id === msgId);
  const newMsg = {
    id:'u'+Date.now(), author:'瓜哥',
    time: new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}),
    text: text, reactions: [],
    replyTo: { msgId: msgId, author: author, preview: parentPreview }
  };

  if (msgIndex >= 0) {
    ch.messages.splice(msgIndex + 1, 0, newMsg);
  } else {
    ch.messages.push(newMsg);
  }

  activeReplyId = null;
  renderMessages(currentChannel);

  // Scroll to the new message
  setTimeout(() => {
    const el = document.querySelector('[data-id="' + newMsg.id + '"]');
    if (el) el.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }, 50);
}

// ===== Init =====
renderMessages('lobby');
