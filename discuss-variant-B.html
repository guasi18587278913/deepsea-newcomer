<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深海圈 | 编辑室</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --font-serif: 'Noto Serif SC', 'Songti SC', serif;
  --font: -apple-system, 'PingFang SC', BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
  --mono: 'SF Mono', 'Menlo', 'Monaco', monospace;

  --bg: #ffffff;
  --bg-warm: #faf9f7;
  --bg-hover: #f8f8f6;
  --white: #ffffff;

  --teal: #0d9488;
  --teal-hover: #0b7c71;

  --text1: #1e293b;
  --text2: #64748b;
  --text3: #94a3b8;
  --text4: #cbd5e1;

  --border: #e8e6e1;
  --border-soft: #f1f0ed;

  --monogram-bg: #f1f5f9;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font);
  background: var(--bg-warm);
  color: var(--text1);
  -webkit-font-smoothing: antialiased;
  height: 100vh;
  overflow: hidden;
}
a { color: inherit; text-decoration: none; }

/* ===== Topbar ===== */
.topbar {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(255, 255, 255, 0.82);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  border-bottom: 1px solid rgba(0, 0, 0, 0.06);
  height: 52px;
  display: flex;
  align-items: center;
  padding: 0 32px;
}
.tb-inner {
  max-width: 100%;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.tb-left {
  display: flex;
  align-items: center;
  gap: 28px;
}
.logo {
  font-family: var(--font-serif);
  font-size: 17px;
  font-weight: 700;
  color: var(--teal);
  letter-spacing: 0.02em;
}
.nav {
  display: flex;
  gap: 4px;
}
.nav a {
  font-size: 13px;
  color: var(--text3);
  padding: 6px 12px;
  border-radius: 6px;
  transition: all 0.15s;
}
.nav a:hover { color: var(--text1); }
.nav a.active {
  color: var(--text1);
  font-weight: 500;
}
.tb-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
.online-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #22c55e;
  display: inline-block;
}
.online-text { font-size: 12px; color: var(--text3); }
.avatar-tb {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: var(--text1);
  color: #fff;
  display: grid;
  place-items: center;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
}

/* ===== Layout ===== */
.layout {
  display: grid;
  grid-template-columns: 180px 1fr;
  height: calc(100vh - 52px);
  transition: grid-template-columns 0.3s ease;
}
.layout.panel-open {
  grid-template-columns: 180px 1fr 320px;
}

/* ===== Sidebar ===== */
.sidebar {
  background: var(--bg-warm);
  padding: 28px 0;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border-soft);
}
.sb-section { margin-bottom: 24px; }
.sb-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text4);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  padding: 0 24px 10px;
}
.sb-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 24px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text3);
  transition: color 0.15s;
  user-select: none;
  line-height: 1.4;
  position: relative;
}
.sb-item:hover { color: var(--text1); }
.sb-item.active { color: var(--text1); font-weight: 500; }
.sb-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: transparent;
  flex-shrink: 0;
  transition: background 0.15s;
}
.sb-item.active .sb-dot { background: var(--teal); }
.sb-item-name { flex: 1; }
.sb-unread {
  font-size: 11px;
  color: var(--text3);
  font-variant-numeric: tabular-nums;
}

/* Sidebar bottom */
.sb-bottom {
  margin-top: auto;
  padding: 16px 24px;
  border-top: 1px solid var(--border-soft);
}
.sb-user {
  display: flex;
  align-items: center;
  gap: 10px;
}
.sb-user-mono {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--monogram-bg);
  color: var(--text1);
  display: grid;
  place-items: center;
  font-size: 11px;
  font-weight: 600;
}
.sb-user-name { font-size: 13px; font-weight: 500; color: var(--text1); }
.sb-user-status { font-size: 11px; color: #22c55e; }

/* ===== Message Area ===== */
.msg-area {
  display: flex;
  flex-direction: column;
  min-width: 0;
  background: var(--white);
}

/* Channel header */
.ch-header {
  padding: 20px 40px 16px;
  background: var(--white);
  border-bottom: 1px solid var(--border-soft);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  flex-shrink: 0;
}
.ch-header-left { min-width: 0; }
.ch-title {
  font-family: var(--font-serif);
  font-size: 20px;
  font-weight: 600;
  color: var(--text1);
  letter-spacing: 0.01em;
  line-height: 1.3;
}
.ch-desc {
  font-size: 13px;
  color: var(--text3);
  margin-top: 4px;
  line-height: 1.5;
}
.ch-header-actions {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
  margin-top: 2px;
}
.ch-action-btn {
  width: 30px;
  height: 30px;
  border: none;
  background: transparent;
  border-radius: 6px;
  display: grid;
  place-items: center;
  cursor: pointer;
  font-size: 14px;
  color: var(--text4);
  transition: all 0.15s;
}
.ch-action-btn:hover { color: var(--text2); background: var(--bg-warm); }

/* Message feed */
.msg-feed {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0 20px;
  scroll-behavior: smooth;
}

/* Date separator */
.date-sep {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 28px 40px 12px;
}
.date-sep::before,
.date-sep::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border-soft);
}
.date-sep span {
  font-size: 11px;
  color: var(--text4);
  font-weight: 500;
  white-space: nowrap;
  letter-spacing: 0.4px;
}

/* Messages */
.msg {
  display: flex;
  gap: 14px;
  padding: 10px 40px;
  transition: background 0.12s;
  margin-bottom: 6px;
  border-radius: 6px;
}
.msg:hover { background: #f7f7f5; }
.msg:hover .msg-hover-actions { opacity: 1; }

.msg-monogram {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--monogram-bg);
  color: var(--text2);
  display: grid;
  place-items: center;
  font-size: 13px;
  font-weight: 600;
  flex-shrink: 0;
  letter-spacing: -0.02em;
}

.msg-body {
  flex: 1;
  min-width: 0;
  padding-top: 1px;
}
.msg-header {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 4px;
}
.msg-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text1);
}
.msg-role {
  font-size: 10px;
  font-weight: 500;
  color: var(--teal);
  letter-spacing: 0.3px;
}
.msg-time {
  font-size: 11px;
  color: var(--text4);
  margin-left: auto;
  font-variant-numeric: tabular-nums;
}
.msg-text {
  font-size: 15px;
  color: #475569;
  line-height: 1.8;
  word-break: break-word;
}
.msg-text code {
  font-family: var(--mono);
  font-size: 13px;
  background: var(--monogram-bg);
  color: #334155;
  padding: 2px 6px;
  border-radius: 4px;
}
.msg-text strong { color: var(--text1); font-weight: 600; }

/* Hover actions — inline with message header */
.msg-hover-actions {
  display: flex;
  gap: 2px;
  margin-left: 8px;
  opacity: 0;
  transition: opacity .12s;
}
.msg-hover-action {
  padding: 3px 6px;
  cursor: pointer;
  font-size: 12px;
  border-radius: 4px;
  transition: background .1s;
  line-height: 1;
}
.msg-hover-action:hover { background: var(--border-soft); }

/* Reactions */
.msg-reactions {
  display: flex;
  gap: 4px;
  margin-top: 6px;
}
.reaction {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 7px;
  border-radius: 4px;
  border: 1px solid transparent;
  background: transparent;
  font-size: 12px;
  color: var(--text4);
  cursor: pointer;
  transition: all 0.15s;
}
.reaction:hover {
  color: var(--text2);
  background: var(--bg-warm);
  border-color: var(--border);
}
.reaction.active {
  color: var(--teal);
  background: rgba(13, 148, 136, 0.04);
  border-color: rgba(13, 148, 136, 0.15);
}

/* Thread indicator */
.thread-link {
  display: inline-block;
  margin-top: 6px;
  font-size: 13px;
  color: var(--teal);
  cursor: pointer;
  transition: opacity 0.15s;
  font-weight: 500;
}
.thread-link:hover { opacity: 0.75; }

/* ===== Reply Quote (inline, inside message body) ===== */
.reply-quote {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  margin-bottom: 6px;
  background: var(--bg-warm);
  border-radius: 4px;
  border-left: 2px solid var(--teal);
  font-size: 12px;
  color: var(--text3);
  cursor: pointer;
  transition: background .12s;
  overflow: hidden;
}
.reply-quote:hover { background: var(--border-soft); }
.reply-quote-author { font-weight: 600; color: var(--teal); flex-shrink: 0; }
.reply-quote-text {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ===== Inline Reply ===== */
.inline-reply {
  margin: 4px 0 8px 50px;
  padding: 12px 14px;
  background: var(--bg-warm);
  border: 1px solid var(--border);
  border-radius: 6px;
  animation: fadeSlideIn .15s ease;
}
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}
.inline-reply-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
  font-size: 12px;
  color: var(--text3);
}
.inline-reply-header .reply-to {
  color: var(--teal);
  font-weight: 500;
}
.inline-reply-close {
  border: none; background: none; font-size: 14px; color: var(--text4);
  cursor: pointer; padding: 2px 4px; border-radius: 4px; line-height: 1;
}
.inline-reply-close:hover { color: var(--text1); background: var(--border-soft); }
.inline-reply textarea {
  width: 100%;
  min-height: 40px;
  max-height: 100px;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: var(--font);
  font-size: 13px;
  color: var(--text1);
  resize: none;
  outline: none;
  line-height: 1.5;
  background: var(--white);
  transition: border-color .15s;
}
.inline-reply textarea:focus { border-color: var(--teal); }
.inline-reply textarea::placeholder { color: var(--text4); }
.inline-reply-footer {
  display: flex;
  justify-content: flex-end;
  gap: 6px;
  margin-top: 6px;
}
.inline-reply-footer .cancel-btn {
  padding: 4px 12px; border-radius: 4px; font-size: 12px;
  border: 1px solid var(--border); background: var(--white);
  color: var(--text2); cursor: pointer; font-family: var(--font);
}
.inline-reply-footer .cancel-btn:hover { background: var(--bg-warm); }
.inline-reply-footer .reply-send-btn {
  padding: 4px 14px; border-radius: 4px; font-size: 12px;
  border: none; background: var(--teal); color: #fff;
  cursor: pointer; font-family: var(--font); font-weight: 500;
}
.inline-reply-footer .reply-send-btn:hover { background: var(--teal-hover); }

/* ===== Input area ===== */
.msg-input {
  padding: 16px 40px 24px;
  background: var(--white);
  border-top: 1px solid var(--border-soft);
  flex-shrink: 0;
}
.input-wrapper {
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg-warm);
  transition: all 0.2s;
  overflow: hidden;
}
.input-wrapper:focus-within {
  border-color: var(--teal);
  background: var(--white);
  box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.05);
}
.msg-textarea {
  width: 100%;
  min-height: 44px;
  max-height: 120px;
  padding: 12px 16px;
  border: none;
  font-family: var(--font);
  font-size: 14px;
  color: var(--text1);
  resize: none;
  outline: none;
  line-height: 1.6;
  background: transparent;
}
.msg-textarea::placeholder { color: var(--text4); }
.input-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 10px 6px;
}
.input-tools { display: flex; gap: 2px; }
.input-tool {
  padding: 4px 6px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text4);
  transition: all 0.1s;
  border: none;
  background: none;
}
.input-tool:hover { color: var(--text2); }
.send-btn {
  padding: 5px 16px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 500;
  border: none;
  cursor: pointer;
  font-family: var(--font);
  transition: all 0.15s;
}
.send-btn.ready { background: var(--teal); color: #fff; }
.send-btn.ready:hover { background: var(--teal-hover); }
.send-btn.disabled { background: transparent; color: var(--text4); cursor: default; }

/* ===== Right Panel ===== */
.panel {
  background: var(--white);
  border-left: 1px solid var(--border-soft);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border-soft);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.panel-title {
  font-family: var(--font-serif);
  font-size: 15px;
  font-weight: 600;
  color: var(--text1);
}
.panel-close {
  border: none;
  background: none;
  font-size: 18px;
  color: var(--text3);
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
  line-height: 1;
}
.panel-close:hover { color: var(--text1); }

/* Thread panel */
.thread-content {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}
.thread-parent {
  padding: 16px;
  background: var(--bg-warm);
  border-radius: 6px;
  margin-bottom: 16px;
  border-left: 2px solid var(--teal);
}
.thread-parent .msg-name { color: var(--teal); }
.thread-parent .msg-text {
  font-size: 14px;
  line-height: 1.7;
  margin-top: 6px;
}

.thread-replies-label {
  font-size: 11px;
  color: var(--text4);
  padding: 0 4px 10px;
  letter-spacing: 0.3px;
}
.thread-replies {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.thread-reply {
  display: flex;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 4px;
  transition: background 0.1s;
}
.thread-reply:hover { background: var(--bg-warm); }
.thread-reply .msg-monogram {
  width: 28px;
  height: 28px;
  font-size: 11px;
}
.thread-reply .msg-name { font-size: 12px; }
.thread-reply .msg-text {
  font-size: 13px;
  line-height: 1.7;
}
.thread-input-area {
  padding: 12px 16px;
  border-top: 1px solid var(--border-soft);
  flex-shrink: 0;
}
.thread-input-area textarea {
  width: 100%;
  min-height: 48px;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px 12px;
  font-family: var(--font);
  font-size: 13px;
  resize: none;
  outline: none;
  background: var(--bg-warm);
  color: var(--text1);
  line-height: 1.5;
}
.thread-input-area textarea:focus {
  border-color: var(--teal);
  background: var(--white);
}
.thread-input-footer {
  display: flex;
  justify-content: flex-end;
  margin-top: 8px;
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr !important; }
  .sidebar, .panel { display: none; }
  .msg { padding: 10px 20px; }
  .ch-header { padding: 16px 20px 12px; }
  .msg-input { padding: 12px 20px 16px; }
  .date-sep { padding: 24px 20px 10px; }
}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="tb-inner">
    <div class="tb-left">
      <a href="roadmap.html" class="logo">深海圈</a>
      <nav class="nav">
        <a href="roadmap.html">路线图</a>
        <a href="learn.html">学习</a>
        <a href="discuss-variant-B.html" class="active">讨论</a>
        <a href="community.html">社区</a>
        <a href="showcase.html">成果墙</a>
      </nav>
    </div>
    <div class="tb-right">
      <span class="online-dot"></span>
      <span class="online-text">34 人在线</span>
      <a href="profile.html" class="avatar-tb">瓜</a>
    </div>
  </div>
</div>

<!-- Main layout -->
<div class="layout" id="layout">

  <!-- Left: Sidebar -->
  <aside class="sidebar">
    <div class="sb-section">
      <div class="sb-label">交流</div>
      <div class="sb-item active" data-channel="lobby" onclick="switchChannel(this)">
        <span class="sb-dot"></span>
        <span class="sb-item-name">大厅</span>
        <span class="sb-unread">5</span>
      </div>
      <div class="sb-item" data-channel="tools" onclick="switchChannel(this)">
        <span class="sb-dot"></span>
        <span class="sb-item-name">工具测评</span>
      </div>
      <div class="sb-item" data-channel="pitfalls" onclick="switchChannel(this)">
        <span class="sb-dot"></span>
        <span class="sb-item-name">踩坑经验</span>
      </div>
    </div>

    <div class="sb-section">
      <div class="sb-label">话题</div>
      <div class="sb-item" data-channel="showcase" onclick="switchChannel(this)">
        <span class="sb-dot"></span>
        <span class="sb-item-name">作品分享</span>
      </div>
      <div class="sb-item" data-channel="payment" onclick="switchChannel(this)">
        <span class="sb-dot"></span>
        <span class="sb-item-name">支付变现</span>
      </div>
      <div class="sb-item" data-channel="prompt" onclick="switchChannel(this)">
        <span class="sb-dot"></span>
        <span class="sb-item-name">Prompt 技巧</span>
      </div>
      <div class="sb-item" data-channel="news" onclick="switchChannel(this)">
        <span class="sb-dot"></span>
        <span class="sb-item-name">行业资讯</span>
      </div>
      <div class="sb-item" data-channel="resources" onclick="switchChannel(this)">
        <span class="sb-dot"></span>
        <span class="sb-item-name">资源推荐</span>
      </div>
      <div class="sb-item" data-channel="intro" onclick="switchChannel(this)">
        <span class="sb-dot"></span>
        <span class="sb-item-name">自我介绍</span>
      </div>
    </div>

    <div class="sb-bottom">
      <div class="sb-user">
        <div class="sb-user-mono">瓜</div>
        <div>
          <div class="sb-user-name">瓜哥</div>
          <div class="sb-user-status">在线</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Center: Messages -->
  <main class="msg-area" id="msgArea">
    <div class="ch-header">
      <div class="ch-header-left">
        <div class="ch-title" id="chTitle">大厅</div>
        <div class="ch-desc" id="chDesc">随便聊，什么都可以。这里就是深海圈的客厅。</div>
      </div>
      <div class="ch-header-actions">
        <button class="ch-action-btn" onclick="toggleSearch()" title="搜索">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
      </div>
    </div>

    <!-- Message feed -->
    <div class="msg-feed" id="msgFeed"></div>

    <!-- Input -->
    <div class="msg-input">
      <div class="input-wrapper">
        <textarea class="msg-textarea" id="msgInput" placeholder="写点什么..." rows="1" oninput="autoResize(this); updateSendBtn();" onkeydown="handleKey(event)"></textarea>
        <div class="input-toolbar">
          <div class="input-tools">
            <button class="input-tool" title="Markdown">Md</button>

    const roleHtml = msg.role ? `<span class="msg-role">${msg.role}</span>` : '';
    const reactionsHtml = msg.reactions ? msg.reactions.map(r =>
      `<span class="reaction" onclick="toggleReaction(this)">${r.emoji} ${r.count}</span>`
    ).join('') : '';
    let threadHtml = '';
    if (msg.thread) {
      threadHtml = `<span class="thread-link" onclick="openThread('${msg.id}')">${msg.thread.count} 条回复</span>`;
    }
    const textHtml = msg.text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/@(\S+)/g, '<strong style="color:var(--teal)">@$1</strong>')
      .replace(/\n/g, '<br>');

    // Reply quote (inside message body)
    let quoteHtml = '';
    if (msg.replyTo) {
      const preview = msg.replyTo.preview || '';
      quoteHtml = `<div class="reply-quote" onclick="scrollToMsg('${msg.replyTo.msgId}')">
        <span class="reply-quote-author">${msg.replyTo.author}</span>
        <span class="reply-quote-text">${preview}</span>
      </div>`;
    }

    html += `<div class="msg" data-id="${msg.id}">
      <div class="msg-monogram">${msg.author[0]}</div>
      <div class="msg-body">
        <div class="msg-header">
          <span class="msg-name">${msg.author}</span>
          ${roleHtml}
          <span class="msg-time">${msg.time}</span>
          <span class="msg-hover-actions">
            <span class="msg-hover-action" title="回复" onclick="startInlineReply('${msg.id}','${msg.author}')">💬</span>
            <span class="msg-hover-action" title="表情">😊</span>
            ${msg.thread ? `<span class="msg-hover-action" title="查看线程" onclick="openThread('${msg.id}')">🧵</span>` : ''}
          </span>
        </div>
        ${quoteHtml}
        <div class="msg-text">${textHtml}</div>
        ${reactionsHtml ? `<div class="msg-reactions">${reactionsHtml}</div>` : ''}
        ${threadHtml}
      </div>
    </div>
    <div id="inline-reply-${msg.id}"></div>`;
  });

  feed.innerHTML = html;
  feed.scrollTop = feed.scrollHeight;
}

function renderPanel() {
  const panel = document.getElementById('panelContent');
  if (!currentThread || !threadData[currentThread]) {
    closePanel();
    return;
  }

  const td = threadData[currentThread];
  const parentMsg = td.parent;
  if (!parentMsg) { closePanel(); return; }

  const parentText = parentMsg.text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');

  let repliesHtml = td.replies.map(r => {
    const roleTag = r.role ? `<span class="msg-role">${r.role}</span>` : '';
    const rText = r.text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/@(\S+)/g, '<strong style="color:var(--teal)">@$1</strong>')
      .replace(/\n/g, '<br>');
    return `<div class="thread-reply">
      <div class="msg-monogram">${r.author[0]}</div>
      <div class="msg-body">
        <div class="msg-header">
          <span class="msg-name">${r.author}</span>
          ${roleTag}
          <span class="msg-time">${r.time}</span>
        </div>
        <div class="msg-text">${rText}</div>
      </div>
    </div>`;
  }).join('');

  panel.innerHTML = `
    <div class="panel-header">
      <div class="panel-title">线程</div>
      <button class="panel-close" onclick="closePanel()">&times;</button>
    </div>
    <div class="thread-content">
      <div class="thread-parent">
        <div class="msg-header">
          <span class="msg-name">${parentMsg.author}</span>
          <span class="msg-time">${parentMsg.time}</span>
        </div>
        <div class="msg-text">${parentText}</div>
      </div>
      <div class="thread-replies-label">${td.replies.length} 条回复</div>
      <div class="thread-replies">${repliesHtml}</div>
    </div>
    <div class="thread-input-area">
      <textarea placeholder="回复..." rows="2"></textarea>
      <div class="thread-input-footer">
        <button class="send-btn ready" style="font-size:12px;">回复</button>
      </div>
    </div>`;
}

// ===== Actions =====
function switchChannel(el) {
  document.querySelectorAll('.sb-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  currentChannel = el.dataset.channel;
  currentThread = null;

  const ch = channelData[currentChannel];
  document.getElementById('chTitle').textContent = ch.name;
  document.getElementById('chDesc').textContent = ch.desc;

  // Remove unread count
  const unread = el.querySelector('.sb-unread');
  if (unread) unread.remove();

  closePanel();
  renderMessages(currentChannel);
}

function openThread(msgId) {
  if (!threadData[msgId]) return;
  currentThread = msgId;
  panelOpen = true;
  document.getElementById('layout').classList.add('panel-open');
  renderPanel();
}

function closePanel() {
  panelOpen = false;
  document.getElementById('layout').classList.remove('panel-open');
  currentThread = null;
}

function toggleReaction(el) {
  el.classList.toggle('active');
  const parts = el.textContent.trim().split(' ');
  let count = parseInt(parts[1]);
  if (el.classList.contains('active')) count++; else count--;
  el.textContent = parts[0] + ' ' + count;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function updateSendBtn() {
  const btn = document.getElementById('sendBtn');
  const input = document.getElementById('msgInput');
  if (input.value.trim()) {
    btn.classList.remove('disabled');
    btn.classList.add('ready');
  } else {
    btn.classList.add('disabled');
    btn.classList.remove('ready');
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;

  const ch = channelData[currentChannel];
  ch.messages.push({
    id: 'u' + Date.now(),
    author: '瓜哥',
    time: new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'}),
    text: text,
    reactions: []
  });

  input.value = '';
  input.style.height = 'auto';
  updateSendBtn();
  renderMessages(currentChannel);
}

function toggleSearch() {
  // Minimal search toggle - could expand
  const input = document.getElementById('msgInput');
  input.focus();
  input.placeholder = '搜索...';
  input.addEventListener('blur', function restore() {
    input.placeholder = '写点什么...';
    input.removeEventListener('blur', restore);
  });
}

// ===== Scroll to message =====
function scrollToMsg(msgId) {
  const el = document.querySelector('[data-id="' + msgId + '"]');
  if (el) {
    el.scrollIntoView({ behavior:'smooth', block:'center' });
    el.style.background = '#f0eeea';
    setTimeout(() => { el.style.background = ''; }, 1500);
  }
}

// ===== Inline Reply =====
let activeReplyId = null;

function startInlineReply(msgId, author) {
  // 关闭之前打开的
  if (activeReplyId) closeInlineReply(activeReplyId);
  activeReplyId = msgId;

  const container = document.getElementById('inline-reply-' + msgId);
  if (!container) return;

  container.innerHTML = `<div class="inline-reply">
    <div class="inline-reply-header">
      <span>回复 <span class="reply-to">${author}</span></span>
      <button class="inline-reply-close" onclick="closeInlineReply('${msgId}')">&times;</button>
    </div>
    <textarea id="reply-input-${msgId}" placeholder="回复 ${author}..." rows="2" onkeydown="handleInlineReplyKey(event,'${msgId}','${author}')"></textarea>
    <div class="inline-reply-footer">
      <button class="cancel-btn" onclick="closeInlineReply('${msgId}')">取消</button>
      <button class="reply-send-btn" onclick="sendInlineReply('${msgId}','${author}')">回复</button>
    </div>
  </div>`;

  // Focus and scroll into view
  const textarea = document.getElementById('reply-input-' + msgId);
  setTimeout(() => {
    textarea.focus();
    container.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }, 50);
}

function closeInlineReply(msgId) {
  const container = document.getElementById('inline-reply-' + msgId);
  if (container) container.innerHTML = '';
  if (activeReplyId === msgId) activeReplyId = null;
}

function handleInlineReplyKey(e, msgId, author) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendInlineReply(msgId, author);
  }
  if (e.key === 'Escape') {
    closeInlineReply(msgId);
  }
}

function sendInlineReply(msgId, author) {
  const textarea = document.getElementById('reply-input-' + msgId);
  if (!textarea) return;
  const text = textarea.value.trim();
  if (!text) return;

  const ch = channelData[currentChannel];
  const parentMsg = ch.messages.find(m => m.id === msgId);
  const parentPreview = parentMsg ? parentMsg.text.replace(/\*\*/g,'').replace(/\n/g,' ').slice(0,40) : '';

  // Insert reply right after the original message
  const msgIndex = ch.messages.findIndex(m => m.id === msgId);
  const newMsg = {
    id:'u'+Date.now(), author:'瓜哥',
    time: new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}),
    text: text, reactions: [],
    replyTo: { msgId: msgId, author: author, preview: parentPreview }
  };

  if (msgIndex >= 0) {
    ch.messages.splice(msgIndex + 1, 0, newMsg);
  } else {
    ch.messages.push(newMsg);
  }

  activeReplyId = null;
  renderMessages(currentChannel);

  // Scroll to the new message
  setTimeout(() => {
    const el = document.querySelector('[data-id="' + newMsg.id + '"]');
    if (el) el.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }, 50);
}

// ===== Init =====
renderMessages('lobby');
</script>
