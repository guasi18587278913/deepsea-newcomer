<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深海圈 | AI 刘小排 · 项目问诊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700&family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --font: 'Sora', 'PingFang SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --serif: 'Noto Serif SC', 'Songti SC', Georgia, serif;
  --mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
  --bg: #f5fafa;
  --bg-gradient: linear-gradient(180deg, #e8f4f5 0%, #f5fafa 40%, #ffffff 100%);
  --surface: #ffffff;
  --surface-soft: #f0f8f8;
  --deep-blue: #1e3a52;
  --teal: #0d9488;
  --teal-hover: #0b7c71;
  --teal-bg: #e8f6f5;
  --teal-tint: rgba(13, 148, 136, 0.08);
  --gold: #c89854;
  --gold-soft: rgba(200, 152, 84, 0.14);
  --text-1: #1a2942;
  --text-2: #5c7a8a;
  --text-3: #94a3b8;
  --border: #dde7ea;
  --border-soft: #eaf1f2;
  --radius: 14px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--font); background:var(--bg-gradient); color:var(--text-1); -webkit-font-smoothing:antialiased; min-height:100vh; display:flex; flex-direction:column; }
a { color:inherit; text-decoration:none; }
button { font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }

/* ===== 顶栏 ===== */
.bar { height:56px; display:flex; align-items:center; justify-content:space-between; padding:0 28px; flex-shrink:0; }
.bar .logo { font-size:16px; font-weight:700; color:var(--teal); letter-spacing:.5px; }
.bar .skip { font-size:13px; color:var(--text-3); padding:6px 12px; border-radius:8px; transition:all .15s; }
.bar .skip:hover { color:var(--text-2); background:var(--surface); }

/* ===== 主容器 ===== */
.wrap { flex:1; width:100%; max-width:720px; margin:0 auto; padding:8px 20px 28px; display:flex; flex-direction:column; }

.intro { text-align:center; padding:18px 0 22px; }
.intro .eyebrow { font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--teal); margin-bottom:10px; }
.intro h1 { font-family:var(--serif); font-size:27px; font-weight:700; letter-spacing:-.5px; margin-bottom:8px; }
.intro h1 .hl { color:var(--teal); }
.intro p { font-size:14px; color:var(--text-2); line-height:1.7; max-width:520px; margin:0 auto; }

/* ===== 对话区 ===== */
.chat { flex:1; display:flex; flex-direction:column; gap:14px; padding:8px 2px 16px; }
.msg { display:flex; gap:10px; max-width:90%; animation:rise .3s ease; }
@keyframes rise { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
.msg .av { width:30px; height:30px; border-radius:50%; background:#fff url('assets/liuxiaopai-avatar.png') center/cover no-repeat; box-shadow:0 0 0 1.5px rgba(13,148,136,.4); flex-shrink:0; }
.msg .bubble { padding:11px 15px; border-radius:13px; font-size:14.5px; line-height:1.72; white-space:pre-wrap; word-break:break-word; }
.msg.ai .bubble { background:var(--surface); border:1px solid var(--border); border-top-left-radius:4px; box-shadow:0 1px 2px rgba(30,58,82,.04); }
.msg.user { align-self:flex-end; flex-direction:row-reverse; }
.msg.user .bubble { background:var(--teal); color:#fff; border-top-right-radius:4px; }

/* typing */
.typing { display:flex; gap:4px; padding:13px 15px; }
.typing span { width:6px; height:6px; border-radius:50%; background:var(--text-3); animation:tp 1.2s infinite; }
.typing span:nth-child(2){ animation-delay:.2s; } .typing span:nth-child(3){ animation-delay:.4s; }
@keyframes tp { 0%,60%,100%{opacity:.3;transform:translateY(0);} 30%{opacity:1;transform:translateY(-3px);} }

/* ===== 诊断卡 ===== */
.diag-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:22px; box-shadow:0 8px 28px -14px rgba(30,58,82,.18); animation:rise .35s ease; }
.diag-card .dc-tag { font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--teal); margin-bottom:8px; }
.diag-card .dc-understand { font-size:16px; font-weight:600; line-height:1.6; margin-bottom:16px; }
.diag-card .dc-understand .q { color:var(--teal); }

.boundary { display:flex; gap:10px; padding:12px 14px; background:var(--gold-soft); border-left:3px solid var(--gold); border-radius:8px; font-size:13px; line-height:1.65; color:#7a5a28; margin-bottom:20px; }
.boundary b { color:#5e451f; }

.dc-sec-title { font-size:13px; font-weight:600; color:var(--text-2); margin-bottom:12px; display:flex; align-items:center; gap:8px; }
.dc-sec-title .n { background:var(--teal); color:#fff; font-size:11px; width:18px; height:18px; border-radius:50%; display:grid; place-items:center; font-family:var(--mono); }

.lesson { display:flex; gap:12px; padding:12px 14px; border:1px solid var(--border-soft); border-radius:10px; margin-bottom:8px; transition:all .15s; cursor:pointer; }
.lesson:hover { border-color:var(--teal-light, #7dd3cc); background:var(--surface-soft); transform:translateX(2px); }
.lesson .code { font-family:var(--mono); font-size:12px; font-weight:600; color:var(--teal); background:var(--teal-bg); padding:3px 8px; border-radius:6px; height:fit-content; flex-shrink:0; }
.lesson .body .t { font-size:14px; font-weight:600; margin-bottom:3px; }
.lesson .body .why { font-size:12.5px; color:var(--text-2); line-height:1.6; }
.lesson .go { margin-left:auto; align-self:center; color:var(--text-3); font-size:18px; flex-shrink:0; }

.dc-actions { display:flex; gap:10px; margin-top:20px; padding-top:18px; border-top:1px solid var(--border-soft); }
.btn { padding:11px 18px; border-radius:9px; font-size:14px; font-weight:600; transition:all .15s; display:inline-flex; align-items:center; gap:7px; }
.btn-primary { background:var(--deep-blue); color:#fff; flex:1; justify-content:center; }
.btn-primary:hover { background:#162c3f; }
.btn-ghost { background:var(--surface); color:var(--text-2); border:1px solid var(--border); }
.btn-ghost:hover { border-color:var(--teal); color:var(--teal); }

/* ===== 输入区 ===== */
.composer { position:sticky; bottom:0; background:linear-gradient(180deg, rgba(245,250,250,0) 0%, var(--bg) 30%); padding:10px 0 4px; }
.suggest { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:10px; }
.chip { font-size:13px; padding:7px 13px; border:1px solid var(--border); border-radius:999px; background:var(--surface); color:var(--text-2); transition:all .15s; }
.chip:hover { border-color:var(--teal); color:var(--teal); background:var(--teal-bg); }
.chip.seed { border-style:dashed; border-color:var(--teal); color:var(--teal); }
.input-row { display:flex; gap:10px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:8px 8px 8px 14px; box-shadow:0 2px 10px -4px rgba(30,58,82,.1); }
.input-row textarea { flex:1; border:none; outline:none; resize:none; font-family:inherit; font-size:14.5px; line-height:1.5; color:var(--text-1); background:transparent; max-height:96px; padding:6px 0; }
.input-row .send { background:var(--teal); color:#fff; border-radius:9px; padding:0 18px; font-size:14px; font-weight:600; transition:opacity .15s; }
.input-row .send:hover { opacity:.9; }
.input-row .send:disabled { opacity:.35; cursor:not-allowed; }

@media (max-width:560px){
  .wrap { padding:4px 14px 24px; }
  .intro h1 { font-size:23px; }
  .msg { max-width:96%; }
}
</style>
</head>
<body>

<div class="bar">
  <div class="logo">深海圈</div>
  <a class="skip" id="skipLink" href="roadmap.html">暂时跳过 →</a>
</div>

<div class="wrap">
  <div class="intro">
    <div class="eyebrow">AI 刘小排 · 项目问诊</div>
    <h1>把你的想法<span class="hl">聊清楚</span>，我帮你<span class="hl">挑该补的课</span></h1>
    <p>11 条标准路线兜不住的需求，我陪你问诊。先用一句话说说你想做什么 —— 越具体越好。</p>
  </div>

  <div class="chat" id="chat"></div>

  <div class="composer" id="composer">
    <div class="suggest" id="suggest"></div>
    <div class="input-row">
      <textarea id="input" rows="1" placeholder="一句话描述你想做的产品…"></textarea>
      <button class="send" id="send">发送</button>
    </div>
  </div>
</div>

<script src="course-data.js"></script>
<script>
/* =========================================================
   AI 刘小排 · 项目问诊（多轮 · demo 脚本化）
   ---------------------------------------------------------
   纯前端、零依赖。这是「个性化问诊陪练」的示意 demo：
   多轮聊清楚意图 → 从 77 节课里挑相关章节（只推荐，不生成新路线）。
   真接入 AI 时，把 INTENT_PROFILES 的匹配换成一次模型调用即可，
   但输出空间仍约束为「已存在的章节 code 排序」——这就是可控性。
   ========================================================= */

const params = new URLSearchParams(location.search);
const fromWelcome = params.get('from') === 'welcome';
const returnUrl = fromWelcome ? 'welcome.html?step=5' : 'roadmap.html';
document.getElementById('skipLink').href = returnUrl;

/* 课程标题查找（来自 course-data.js 单一数据源） */
function lessonTitle(code) {
  const c = (typeof COURSES !== 'undefined') && COURSES.find(x => x.code === code);
  return c ? c.t : code;
}

/* ---- 意图画像：关键词 → 复述 + 澄清问题 + 推荐章节 ---- */
const INTENT_PROFILES = {
  video: {
    match: /视频|拍|剪辑|数字人|主播|口播|短视频|直播/,
    understand: '让主播 / 创作者自动产出 AI 视频',
    clarify: {
      q: '明白，这是个「内容自动化 + AI 生成」的活儿。两个问题帮我把方向收窄：\n\n① 你要的是数字人形象口播，还是把已有素材自动剪成视频？\n② 主要面向国内还是海外用户？',
      chips: ['数字人口播', '已有素材自动剪', '两个都要 · 海外', '两个都要 · 国内']
    },
    base: [
      ['M4.3', '视频生成是「现成超能力」，去 API 超市直接进货，不用自己训模型'],
      ['M10.1', '「自动拍」的本质是把 AI 当员工跑流程，先建立这个思维'],
      ['M10.2', '自动抓素材、自动上传发布，靠的是浏览器自动化这一专项'],
      ['M5.9', '定时任务 —— 你睡了，它还能按点自动出片'],
      ['M11.2', '需求复杂，用 SPEC 驱动把「自动拍视频」拆成 AI 能执行的步骤']
    ],
    overseas: ['M8.5', '面向海外要收订阅费，这节讲清海外支付怎么接'],
    domestic: ['M9.2', '面向国内、想轻量分发，先用小程序把形态跑通']
  },
  overseas: {
    match: /出海|海外|老外|英文|订阅|saas|micro|美金|美元/i,
    understand: '做一个面向海外、能收订阅费的 MicroSaaS',
    clarify: {
      q: '出海订阅是条成熟的路。两个问题：\n\n① 核心功能是 AI 生成类，还是工具 / 效率类？\n② 你打算一个人做，还是有小团队？',
      chips: ['AI 生成类', '工具效率类', '一个人做', '有小团队']
    },
    base: [
      ['M8.1', 'MicroSaaS：一个人也能做的订阅制生意，先建立整体认知'],
      ['M8.2', '产品四件套：落地页 + 用户中心 + 核心功能 + 支付，缺一不可'],
      ['M8.3', 'Landing Page：你只有 8 秒，决定老外留不留'],
      ['M8.5', '海外订阅支付到底怎么回事，避开收款的坑'],
      ['M12.1', '上线后没人用？冷启动是去找人，而不是等人']
    ],
    overseas: null, domestic: null
  },
  miniapp: {
    match: /小程序|微信|群|裂变|小游戏/,
    understand: '做一个微信生态里的小程序 / 小游戏',
    clarify: {
      q: '微信生态适合做轻量、易传播的东西。两个问题：\n\n① 你想做工具型小程序，还是能在群里传的小游戏？\n② 要不要收费？',
      chips: ['工具型小程序', '群里传的小游戏', '要收费', '先免费跑量']
    },
    base: [
      ['M9.2', '5 分钟做出你的第一个小程序，先把形态跑通'],
      ['M9.3', '用 AI 做微信小程序进阶篇，处理真实场景'],
      ['M9.4', '做个能在群里疯传的 AI 小游戏，传播是设计出来的'],
      ['M9.6', '用户付了钱怎么收？变现的三条路'],
      ['M2.3', '动手前先跟 AI 把需求讨论清楚，从模糊想法到清晰指令']
    ],
    overseas: null, domestic: null
  }
};

const DEFAULT_PROFILE = {
  understand: '一个还在成形、需要先聊清楚的产品想法',
  clarify: {
    q: '我先帮你把方向收窄一下。两个问题：\n\n① 它更接近哪种形态？\n② 你现在最缺的是「不知道做什么」还是「不知道怎么做」？',
    chips: ['网站 / SaaS', '小程序 / App', '自动化工具', '不知道做什么']
  },
  base: [
    ['M7.2', '先看「能赚钱的 AI 产品长什么样、去哪儿找」，对齐方向'],
    ['M2.3', '跟 AI 讨论需求：从模糊想法到清晰指令'],
    ['M2.5', '开发 AI 产品的核心秘密：预制菜思维 + 积木思维'],
    ['M5.4', '产品怎么从你电脑跑到全世界 —— 部署上线'],
    ['M12.1', '冷启动：上线后怎么找到第一批用户']
  ],
  overseas: null, domestic: null
};

/* ---- 对话状态机 ---- */
const chat = document.getElementById('chat');
const suggest = document.getElementById('suggest');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const composer = document.getElementById('composer');

let stage = 'await-intent';   // await-intent → await-clarify → done
let profile = null;
let userIntentText = '';
let lastRec = null;   // 最近一次问诊挑出的章节（含标题/why），用于生成「刘小排定制」清单

function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function addMsg(role, text){
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.innerHTML = (role==='ai' ? '<div class="av"></div>' : '') +
    '<div class="bubble">' + esc(text).replace(/\n/g,'<br>') + '</div>';
  chat.appendChild(d);
  d.scrollIntoView({behavior:'smooth', block:'end'});
}

function setChips(arr){
  suggest.innerHTML = arr.map(t => '<div class="chip" data-t="'+esc(t)+'">'+esc(t)+'</div>').join('');
  suggest.querySelectorAll('.chip').forEach(el => el.addEventListener('click', () => { input.value = el.dataset.t; send(); }));
}

function showTyping(){
  const d = document.createElement('div');
  d.className = 'msg ai'; d.id = 'typing';
  d.innerHTML = '<div class="av"></div><div class="bubble" style="padding:0;background:transparent;border:none;box-shadow:none;"><div class="typing"><span></span><span></span><span></span></div></div>';
  chat.appendChild(d); d.scrollIntoView({behavior:'smooth', block:'end'});
}
function hideTyping(){ const t = document.getElementById('typing'); if (t) t.remove(); }

function aiSay(text, after){
  showTyping();
  setTimeout(() => { hideTyping(); addMsg('ai', text); if (after) after(); }, 600 + Math.random()*400);
}

function pickProfile(text){
  for (const key in INTENT_PROFILES){
    if (INTENT_PROFILES[key].match.test(text)) return INTENT_PROFILES[key];
  }
  return DEFAULT_PROFILE;
}

/* ---- 发送 ---- */
function send(){
  const text = input.value.trim();
  if (!text) return;
  addMsg('user', text);
  input.value = ''; input.style.height = 'auto';
  suggest.innerHTML = '';

  if (stage === 'await-intent'){
    userIntentText = text;
    profile = pickProfile(text);
    stage = 'await-clarify';
    aiSay('我对你的理解是 —— 你想做的是「' + profile.understand + '」。\n\n' + profile.clarify.q, () => {
      setChips(profile.clarify.chips);
    });
  } else if (stage === 'await-clarify'){
    stage = 'done';
    const overseas = /海外|出海|老外|英文/.test(text);
    const domestic = /国内|微信|小程序/.test(text);
    aiSay('够了，我心里有数了。给你挑好了该重点补的几章 👇', () => {
      renderDiagnosis(overseas, domestic);
    });
  }
}

sendBtn.addEventListener('click', send);
input.addEventListener('keydown', e => { if (e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } });
input.addEventListener('input', () => { input.style.height='auto'; input.style.height = Math.min(input.scrollHeight,96)+'px'; });

/* ---- 渲染诊断卡 ---- */
function renderDiagnosis(overseas, domestic){
  /* 组装推荐章节：基础 5 章，按澄清答案替换 1 章做个性化 */
  let lessons = profile.base.slice();
  if (overseas && profile.overseas) lessons[4] = profile.overseas;
  else if (domestic && profile.domestic) lessons[4] = profile.domestic;

  const codes = lessons.map(l => l[0]);
  lastRec = lessons.map(l => ({ code: l[0], t: lessonTitle(l[0]), why: l[1] }));   /* 给「刘小排定制」清单用：章节号 + 标题 + 为什么 */

  const lessonsHtml = lessons.map(([code, why]) =>
    '<div class="lesson" onclick="goLesson(\''+code+'\')">' +
      '<span class="code">'+code+'</span>' +
      '<div class="body"><div class="t">'+esc(lessonTitle(code))+'</div><div class="why">'+esc(why)+'</div></div>' +
      '<span class="go">↗</span>' +
    '</div>'
  ).join('');

  const card = document.createElement('div');
  card.className = 'diag-card';
  card.innerHTML =
    '<div class="dc-tag">问诊结果</div>' +
    '<div class="dc-understand">你想做的是 <span class="q">「'+esc(profile.understand)+'」</span>，这超出了 11 条标准路线能直接覆盖的范围。</div>' +
    '<div class="boundary">🧭&nbsp;<div><b>关于这份清单：</b>我从课程 77 节里，挑出跟你这个需求真正相关的几章，<b>给你连成一条专属清单</b>。它会进你的学习地图，随时能<b>切回全量航海图</b>。</div></div>' +
    '<div class="dc-sec-title"><span class="n">★</span>为你挑的重点章节（按学习顺序）</div>' +
    lessonsHtml +
    '<div class="dc-actions">' +
      '<a class="btn btn-primary" onclick="saveProject(\''+esc(codes.join(','))+'\')" href="learn.html?code='+codes[0]+'">先看第一章：'+codes[0]+' →</a>' +
      '<button class="btn btn-ghost" onclick="finishDiagnosis(\''+esc(codes.join(','))+'\')">'+(fromWelcome?'完成，继续设置 →':'完成 · 进我的学习地图 →')+'</button>' +
    '</div>';
  chat.appendChild(card);
  card.scrollIntoView({behavior:'smooth', block:'end'});

  /* 收起输入区，给个重开入口 */
  composer.innerHTML = '<div class="suggest"><div class="chip" onclick="location.reload()">↺ 换个想法重新问诊</div></div>';
}

/* ---- 落地：写入 ds_project（与 roadmap / assistant.js 共享） ---- */
function buildProject(codesStr){
  return {
    name: userIntentText.length > 20 ? userIntentText.slice(0,20)+'…' : userIntentText,
    stage: '需求定义',
    has_idea: true,
    source: 'diagnosis',
    intent: userIntentText,
    diagnosis: profile.understand,
    recommendedCodes: codesStr.split(','),
    createdAt: new Date().toISOString().slice(0,10)
  };
}
function persist(codesStr){
  try {
    localStorage.setItem('ds_project', JSON.stringify(buildProject(codesStr)));
    /* 把推荐清单存成「刘小排定制」航线 + 设为当前航线（学习地图据此画清单卡，可在切换菜单切回全量图）*/
    if (lastRec && lastRec.length) {
      localStorage.setItem('ds_route_custom', JSON.stringify({
        name: '刘小排定制 · ' + (userIntentText.length > 12 ? userIntentText.slice(0,12) + '…' : (userIntentText || '你的想法')),
        promise: (profile && profile.understand) || '',
        items: lastRec
      }));
      localStorage.setItem('ds_route', 'diagnosis');
      localStorage.removeItem('ds_route_completed');   /* 重开问诊 = 新清单从头来过，别串上一版的"已学"标记 */
    }
  } catch(e) {}
}
function goLesson(code){ persist(code); location.href = 'learn.html?code=' + code; }
function saveProject(codesStr){ persist(codesStr); /* href 继续跳第一章 */ }
function finishDiagnosis(codesStr){ persist(codesStr); location.href = fromWelcome ? returnUrl : 'calendar.html'; }
