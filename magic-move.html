<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深海圈 · 神奇移动 动效小样（落地版）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   神奇移动 · 落地版 —— 进场是 Magic Move，落地是"内容优先"
   · 岛 = 同一批元素 FLIP 插值；聚焦后缩成「顶部头牌」（不霸屏）
   · 主区 = 本岛内容（图文 / 直播 / 作业 节点，蛇形路）
   · 航线弧：连 身后(左)→当前岛→前方(右)
   · 小船：跟着你点的岛一起航行（点哪开哪），CSS transition 让它"驶"过去
   · 可调参数都在 <script> 顶部
   ============================================================ */
:root{
  --font-display:'Noto Serif SC','Songti SC',serif;
  --font-sans:'Sora','PingFang SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --font-mono:'JetBrains Mono','SF Mono',monospace;
  --deep-blue:#1e3a52; --teal:#0d9488; --teal-deep:#1f6f6a; --gold:#c89854;
  --c-live:#c2603f; --c-task:#b8852f;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:var(--font-sans);color:var(--deep-blue);overflow:hidden;
  background:linear-gradient(180deg,#eaf5f3 0%,#dbede8 38%,#c6e5de 68%,#b6dcd4 100%)}
body::before{content:"";position:fixed;inset:0;z-index:-2;background:#cfe9ef url("assets/sea-i.webp") center/cover no-repeat;filter:saturate(.86) brightness(1.09) contrast(.84)}
body::after{content:"";position:fixed;inset:0;z-index:-1;background:radial-gradient(135% 115% at 50% 36%,rgba(249,245,235,0) 70%,rgba(241,234,216,.42) 100%)}

.bar{position:fixed;top:0;left:0;right:0;height:52px;display:flex;align-items:center;gap:14px;padding:0 22px;z-index:20;
  background:rgba(248,251,250,.7);backdrop-filter:blur(12px);border-bottom:1px solid rgba(200,152,84,.28)}
.bar .brand{font-family:var(--font-display);font-weight:700;font-size:16px;color:var(--teal-deep)}
.bar .hint{font-size:12.5px;color:#5c7a8a}
.bar .tag{margin-left:auto;font-family:var(--font-mono);font-size:11px;color:var(--gold);border:1px solid rgba(200,152,84,.5);border-radius:999px;padding:3px 10px}

.stage{position:absolute;inset:52px 0 0 0;overflow:hidden}

/* 航线弧（连各岛）*/
.route{position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none;overflow:visible}
.route path{fill:none;stroke:#bf842a;stroke-width:.32;stroke-dasharray:1.1 1.1;stroke-linecap:round;opacity:.85;transition:opacity .4s}

/* 岛 = 持久元素（FLIP 插值 left/top/width）*/
.isle{position:absolute;cursor:pointer;will-change:transform;z-index:3}
.isle>img{width:100%;display:block;pointer-events:none;filter:saturate(1.06) brightness(1.02) drop-shadow(0 14px 16px rgba(30,80,90,.26))}
.isle .nm{position:absolute;left:50%;bottom:100%;transform:translateX(-50%);margin-bottom:6px;white-space:nowrap;
  font-family:var(--font-display);font-weight:700;color:var(--deep-blue);font-size:14px;text-shadow:0 1px 5px rgba(248,251,250,.95);transition:font-size .4s,opacity .4s}
.isle .zone{display:block;font-family:var(--font-mono);font-size:10px;font-weight:600;color:var(--gold);letter-spacing:.06em;text-align:center}
.isle::after{content:"";position:absolute;left:50%;top:64%;transform:translate(-50%,-50%);width:120%;height:104%;z-index:-1;pointer-events:none;background:radial-gradient(ellipse at center,rgba(158,214,207,.5) 0%,rgba(158,214,207,0) 68%);filter:blur(5px)}

/* 三态 */
.isle.is-hero{z-index:6}
.isle.is-hero .nm{font-size:15px;opacity:0}      /* 头牌态：岛名交给下方 title 卡，岛自身名隐藏 */
.isle.is-hero>img{filter:saturate(1.1) brightness(1.04) drop-shadow(0 0 22px rgba(200,152,84,.36)) drop-shadow(0 14px 16px rgba(30,80,90,.28))}
.isle.is-mini{opacity:.6}
.isle.is-mini .nm{font-size:10px;opacity:.85}
.isle.is-mini>img{filter:saturate(.9) brightness(1.01) drop-shadow(0 6px 8px rgba(30,80,90,.2))}
.isle.is-mini:hover{opacity:1}
.isle.is-past::before{content:"✓";position:absolute;top:-3px;right:-3px;z-index:2;width:18px;height:18px;border-radius:50%;background:var(--teal);color:#fff;font-size:11px;font-weight:700;display:grid;place-items:center;border:2px solid #eef6f4;box-shadow:0 2px 6px rgba(13,90,80,.45)}

/* 小船：跟着你点的岛航行；形态随等级长大（竹筏→木帆船→战舰→航母）*/
.ship{position:absolute;width:6%;z-index:5;pointer-events:none;transform:translate(-50%,-50%);
  transition:left .62s cubic-bezier(.45,.05,.25,1),top .62s cubic-bezier(.45,.05,.25,1),width .5s cubic-bezier(.34,1.4,.64,1);
  filter:drop-shadow(0 6px 8px rgba(30,80,90,.3))}
/* 升级庆祝 */
.celebrate{position:absolute;left:50%;top:40%;transform:translate(-50%,-50%) scale(.8);z-index:30;text-align:center;pointer-events:none;opacity:0;
  background:linear-gradient(160deg,#fffdf7,#f5ecd7);border:1px solid rgba(200,152,84,.6);border-radius:18px;padding:20px 32px;
  box-shadow:0 24px 60px -18px rgba(120,90,30,.5);transition:opacity .3s,transform .4s cubic-bezier(.34,1.56,.64,1)}
.celebrate.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.celebrate .cb-emoji{font-size:44px;line-height:1}
.celebrate .cb-title{font-family:var(--font-display);font-size:21px;font-weight:700;color:var(--deep-blue);margin-top:8px}
.celebrate .cb-sub{font-size:12.5px;color:#7a6643;margin-top:5px}

/* 头牌 title 卡（聚焦浮现）*/
.titlecard{position:absolute;left:50%;top:33%;transform:translate(-50%,8px);z-index:4;text-align:center;opacity:0;pointer-events:none;transition:opacity .5s,transform .5s}
.stage[data-mode="focus"] .titlecard{opacity:1;transform:translate(-50%,0);transition:opacity .55s .18s cubic-bezier(.22,1,.36,1),transform .55s .18s cubic-bezier(.22,1,.36,1)}
.titlecard .tc-no{font-family:var(--font-mono);font-size:11.5px;font-weight:600;letter-spacing:.08em;color:var(--gold)}
.titlecard .tc-name{font-family:var(--font-display);font-size:26px;font-weight:700;color:var(--deep-blue);margin-top:2px;text-shadow:0 1px 6px rgba(248,251,250,.9)}
.titlecard .tc-meta{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:9px}
.tc-prog{display:flex;align-items:center;gap:7px;font-size:12px;color:#5c7a8a}
.tc-prog b{font-family:var(--font-mono);color:var(--teal-deep)}
.tc-bar{width:90px;height:6px;border-radius:999px;background:rgba(31,111,106,.16);overflow:hidden}
.tc-bar i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--teal),#1bb3a3)}
.tc-badge{font-size:11.5px;font-weight:600;padding:3px 11px;border-radius:999px;background:var(--gold);color:#fff}
.tc-ship{margin-top:9px;font-size:12px;color:#5c7a8a}
.tc-ship b{color:var(--teal-deep);font-weight:600}

/* 主区内容：本岛蛇形路（图文/直播/作业）*/
.content{position:absolute;left:5%;right:5%;top:45%;bottom:4%;z-index:2;opacity:0;transform:translateY(22px);transition:opacity .5s,transform .5s;pointer-events:none}
.stage[data-mode="focus"] .content{opacity:1;transform:none;transition:opacity .55s .22s cubic-bezier(.22,1,.36,1),transform .55s .22s cubic-bezier(.22,1,.36,1);pointer-events:auto}
.content svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
.cnode{position:absolute;transform:translate(-50%,-50%);width:46px;height:46px;border-radius:50%;display:grid;place-items:center;cursor:pointer;
  background:rgba(255,253,246,.96);border:1.5px solid rgba(196,168,110,.6);color:#b1a079;box-shadow:0 3px 9px -3px rgba(90,75,40,.28);transition:transform .14s}
.cnode:hover{transform:translate(-50%,-50%) scale(1.1)}
.cnode svg{width:20px;height:20px}
.cnode.done{background:var(--teal);border-color:#fff;color:#fff}
.cnode.cur{background:var(--gold);border-color:#fff;color:#fff;width:60px;height:60px;box-shadow:0 0 0 4px rgba(255,255,255,.85),0 0 0 8px rgba(200,152,84,.3),0 5px 14px -4px rgba(120,80,20,.4)}
.cnode.cur svg{width:26px;height:26px}
.cnode.k-live{background:var(--c-live);border-color:#fff;color:#fff}
.cnode.k-task{background:var(--c-task);border-color:#fff;color:#fff}
.cnode .lbl{position:absolute;top:calc(100% + 7px);left:50%;transform:translateX(-50%);white-space:nowrap;font-family:var(--font-display);font-size:11px;font-weight:600;color:#4a3a1e;background:linear-gradient(180deg,rgba(253,250,242,.96),rgba(244,235,217,.96));border:1px solid rgba(196,168,110,.7);border-radius:6px;padding:2px 8px;box-shadow:0 3px 8px -3px rgba(70,52,18,.4)}
.cnode.k-live .lbl{color:var(--c-live)} .cnode.k-task .lbl{color:var(--c-task)}
.cnode .here{position:absolute;left:50%;bottom:calc(100% + 8px);transform:translateX(-50%);white-space:nowrap;background:var(--teal-deep);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;box-shadow:0 6px 14px -3px rgba(31,111,106,.6)}

/* 收起按钮 */
.back{position:absolute;left:22px;top:14px;z-index:8;display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--teal-deep);cursor:pointer;padding:7px 14px 7px 11px;border-radius:999px;border:1px solid rgba(31,111,106,.3);background:rgba(255,255,255,.8);opacity:0;transform:translateX(-6px);pointer-events:none;transition:opacity .35s,transform .35s,background .15s}
.stage[data-mode="focus"] .back{opacity:1;transform:none;pointer-events:auto}
.back:hover{background:#e8f6f5}.back svg{width:14px;height:14px}

@media (prefers-reduced-motion:reduce){.isle,.content,.titlecard,.back,.ship,.route path{transition:none!important}}
</style>
</head>
<body>
<div class="bar">
  <span class="brand">深海圈</span>
  <span class="hint">点岛 → 神奇移动聚焦；小船跟着你点的岛航行、越往后越大（升级有庆祝）；点空白 / 收起返回</span>
  <span class="tag">落地版小样</span>
</div>

<div class="stage" id="stage" data-mode="overview">
  <svg class="route" id="route" viewBox="0 0 100 100" preserveAspectRatio="none"><path d=""/></svg>
  <button class="back" id="back"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3 5 8l5 5"/></svg>收起 · 看全图</button>

  <div class="isle" data-id="1"><img src="assets/isle-1.webp" alt=""><span class="nm"><span class="zone">第一岛</span>跑通第一个 AI 产品</span></div>
  <div class="isle" data-id="2"><img src="assets/isle-2.webp" alt=""><span class="nm"><span class="zone">第二岛</span>做出能上线的产品</span></div>
  <div class="isle" data-id="3"><img src="assets/isle-3.webp" alt=""><span class="nm"><span class="zone">第三岛</span>做一个能收钱的产品</span></div>
  <div class="isle" data-id="4"><img src="assets/isle-4.webp?v=2" alt=""><span class="nm"><span class="zone">第四岛</span>让 AI 干活、把产品做大</span></div>

  <img class="ship" id="ship" src="assets/ship-1.png" alt="">

  <div class="titlecard" id="titlecard" aria-hidden="true"></div>
  <div class="content" id="content" aria-hidden="true"></div>
  <div class="celebrate" id="celebrate" aria-hidden="true"></div>
</div>

<script>
/* ===== 可调参数 ===== */
const DUR = 620, EASE = 'cubic-bezier(.45,.05,.25,1)';
let shipAt = 1;                    // 小船当前所在岛 —— 跟着你点的岛走（点哪开哪）
let maxTier = 1;                   // 船的等级（=已打通到第几岛），只升不降
const SHIPS = [                    // 4 级形态（名字 / 升级语跟现有航海图一致）
  { img:'assets/ship-1.png', name:'竹筏',     emoji:'🛶', w:6,   up:'' },
  { img:'assets/ship-2.png', name:'木帆船',   emoji:'⛵', w:7.6, up:'能远航了，第一个产品下水' },
  { img:'assets/ship-3.png', name:'战舰',     emoji:'🚢', w:9.4, up:'有火力了，能打仗赚钱' },
  { img:'assets/ship-4.png', name:'航空母舰', emoji:'🛳️', w:11,  up:'成舰队，能带团队远征' },
];
const OV = { 1:{l:6,t:56,w:15}, 2:{l:29,t:47,w:16}, 3:{l:53,t:44,w:17.5}, 4:{l:75,t:55,w:18.5} };
const HERO   = {l:41, t:5,  w:18};                                   // 聚焦：当前岛缩成顶部头牌
const AHEAD  = [ {l:64,t:9,w:10}, {l:78,t:6,w:8.5}, {l:90,t:4,w:7} ]; // 前方·右上
const BEHIND = [ {l:26,t:9,w:10}, {l:13.5,t:6,w:8.5}, {l:3,t:4,w:7} ];// 身后·左上

const META = {
  1:{no:'第一岛', name:'跑通第一个 AI 产品', badge:'▸ 能跑通'},
  2:{no:'第二岛', name:'做出能上线的产品', badge:'⊡ 能上线'},
  3:{no:'第三岛', name:'做一个能收钱的产品', badge:'¥ 能收钱'},
  4:{no:'第四岛', name:'让 AI 干活、把产品做大', badge:'↗ 能扩张'},
};
/* 本岛内容示意（真接入时换成 isle-view 那块积木读真课程）*/
const LESSONS = [
  {k:'course', lbl:'图文'}, {k:'course', lbl:'图文'}, {k:'course', lbl:'图文'},
  {k:'live', lbl:'直播'}, {k:'course', lbl:'图文'}, {k:'course', lbl:'图文'},
  {k:'task', lbl:'作业'}, {k:'course', lbl:'图文'},
];
const CUR_LESSON = 2;              // 当前岛里学到第几个（聚焦的岛=你当前所在，这一关显示"你在这里"）

const IC = {
  course:'<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 4h8a2 2 0 0 1 2 2v10H6a2 2 0 0 1-2-2V4z"/><path d="M4 4v12a2 2 0 0 0 2 2h8"/><path d="M7 8h4M7 11h3"/></svg>',
  live:'<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="10" r="7.6"/><path d="M8.2 6.7l5.3 3.3-5.3 3.3z" fill="currentColor" stroke="none"/></svg>',
  task:'<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="4" y="3" width="12" height="14" rx="1.5"/><path d="M7 8l2 2 4-4M7 13h6"/></svg>',
  check:'<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 10.5l3.4 3.4L15 6.4"/></svg>',
};

const ISLE_IDS = [1,2,3,4];
const stage = document.getElementById('stage'), back = document.getElementById('back');
const routePath = document.querySelector('#route path'), ship = document.getElementById('ship');
const els = {}; ISLE_IDS.forEach(id => els[id] = stage.querySelector('.isle[data-id="'+id+'"]'));
let mode='overview', curFocus=null, animating=false, curLayout={};

function applyStyle(el,p){ el.style.left=p.l+'%'; el.style.top=p.t+'%'; el.style.width=p.w+'%'; }

function targetFor(modeName, focusId){
  const out={};
  if (modeName==='overview'){ ISLE_IDS.forEach(id=>out[id]=OV[id]); return out; }
  out[focusId]=HERO;
  const past   = ISLE_IDS.filter(id=>id<focusId).sort((a,b)=>b-a);
  const future = ISLE_IDS.filter(id=>id>focusId).sort((a,b)=>a-b);
  past.forEach((id,i)=>out[id]=BEHIND[i]);
  future.forEach((id,i)=>out[id]=AHEAD[i]);
  return out;
}
/* 岛中心点（viewBox 0-100 近似：y 用 top + 半高估算）*/
function isleCenter(p){ return { x: p.l + p.w/2, y: p.t + p.w*0.40 }; }

function drawRoute(layout){
  const pts = ISLE_IDS.map(id=>({id, ...isleCenter(layout[id])})).sort((a,b)=>a.x-b.x);
  let d = `M ${pts[0].x.toFixed(1)} ${pts[0].y.toFixed(1)}`;
  for (let i=1;i<pts.length;i++){ const a=pts[i-1], b=pts[i], mx=(a.x+b.x)/2; d += ` C ${mx.toFixed(1)} ${a.y.toFixed(1)}, ${mx.toFixed(1)} ${b.y.toFixed(1)}, ${b.x.toFixed(1)} ${b.y.toFixed(1)}`; }
  routePath.setAttribute('d', d);
}
function placeShip(layout){
  const p = layout[shipAt], c = isleCenter(p);
  ship.style.left = (c.x - p.w*0.42) + '%';     // 泊在当前所在岛的左下水面（CSS transition 让它"航行"过去）
  ship.style.top  = (c.y + p.w*0.34) + '%';
}
function applyShipForm(){ const s = SHIPS[Math.min(4, Math.max(1, maxTier)) - 1]; ship.src = s.img; ship.style.width = s.w + '%'; }
function celebrate(tier){
  const s = SHIPS[tier-1], box = document.getElementById('celebrate');
  box.innerHTML = `<div class="cb-emoji">🎉 ${s.emoji}</div><div class="cb-title">升级！你的船成了「${s.name}」</div>` + (s.up ? `<div class="cb-sub">${s.up}</div>` : '');
  box.classList.add('show'); clearTimeout(box._t); box._t = setTimeout(()=>box.classList.remove('show'), 2100);
}

/* FLIP：岛位置+大小一起平滑插值 */
function flipTo(target){
  const first = ISLE_IDS.map(id=>els[id].getBoundingClientRect());
  ISLE_IDS.forEach(id=>{ const el=els[id]; el.style.transition='none'; el.style.transform='none'; applyStyle(el,target[id]); });
  const last = ISLE_IDS.map(id=>els[id].getBoundingClientRect());
  ISLE_IDS.forEach((id,i)=>{ const f=first[i],l=last[i]; const dx=f.left-l.left,dy=f.top-l.top,sx=l.width?f.width/l.width:1,sy=l.height?f.height/l.height:1;
    els[id].style.transformOrigin='top left'; els[id].style.transform=`translate(${dx.toFixed(1)}px,${dy.toFixed(1)}px) scale(${sx.toFixed(3)},${sy.toFixed(3)})`; });
  animating=true;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    ISLE_IDS.forEach(id=>{ els[id].style.transition=`transform ${DUR}ms ${EASE}`; els[id].style.transform='none'; });
    setTimeout(()=>{ animating=false; }, DUR+30);
  }));
}

function setStateClasses(focusId){
  ISLE_IDS.forEach(id=>{
    els[id].classList.toggle('is-hero', mode==='focus' && id===focusId);
    els[id].classList.toggle('is-mini', mode==='focus' && id!==focusId);
    els[id].classList.toggle('is-past', mode==='focus' && id<focusId);
    els[id].classList.toggle('is-future', mode==='focus' && id>focusId);
  });
}

function renderTitle(focusId){
  const m = META[focusId];
  const total = LESSONS.length, done = CUR_LESSON, sub = '学习中';   // 船跟着走：聚焦的岛 = 你当前所在
  const s = SHIPS[maxTier-1];
  const shipLine = maxTier >= 4
    ? `${s.emoji} 你的船：<b>航空母舰</b>（Lv4）· 已满级 🏆`
    : `${s.emoji} 你的船：<b>${s.name}</b>（Lv${maxTier}）· 再打通 1 岛升${SHIPS[maxTier].name}`;
  document.getElementById('titlecard').innerHTML =
    `<div class="tc-no">${m.no} · ${sub}</div><div class="tc-name">${m.name}</div>`+
    `<div class="tc-meta"><span class="tc-prog"><b>${done}/${total}</b><span class="tc-bar"><i style="width:${Math.round(done/total*100)}%"></i></span></span><span class="tc-badge">${m.badge}</span></div>`+
    `<div class="tc-ship">${shipLine}</div>`;
}

function renderContent(focusId){
  const box = document.getElementById('content'), N = LESSONS.length;
  const pts = [];
  for (let i=0;i<N;i++){ const x = 7 + i*(86/(N-1)); const y = 50 + Math.sin(i*0.92+0.4)*30; pts.push([x,y]); }
  let d = `M ${pts[0][0]} ${pts[0][1]}`;
  for (let i=1;i<N;i++){ const a=pts[i-1], b=pts[i], mx=(a[0]+b[0])/2; d += ` C ${mx} ${a[1]}, ${mx} ${b[1]}, ${b[0]} ${b[1]}`; }
  let nodes='';
  LESSONS.forEach((L,i)=>{
    let st='', inner=IC[L.k]||IC.course, here='';     // 聚焦的岛=你当前所在：学过的打✓、当前关"你在这里"、后面待学
    if (i<CUR_LESSON){ st='done'; inner=IC.check; }
    else if (i===CUR_LESSON){ st='cur'; here='<span class="here">你在这里</span>'; }
    else { st = (L.k==='live'?'k-live':L.k==='task'?'k-task':''); }
    nodes += `<div class="cnode ${st}" style="left:${pts[i][0]}%;top:${pts[i][1]}%">${here}${inner}<span class="lbl">${L.lbl}</span></div>`;
  });
  box.innerHTML = `<svg viewBox="0 0 100 100" preserveAspectRatio="none"><path d="${d}" fill="none" stroke="#dcb152" stroke-width="0.55" stroke-dasharray="1.3 1.1" stroke-linecap="round" opacity=".9"/></svg>` + nodes;
}

function relayout(target){ curLayout = target; drawRoute(target); placeShip(target); }

function focusIsle(id){
  if (animating || (mode==='focus' && curFocus===id)) return;
  mode='focus'; curFocus=id; shipAt=id; stage.dataset.mode='focus';   // 船跟着走：开到你点的岛
  const leveledUp = id > maxTier;            // 去到更靠后的岛 = 新进度 → 升级（只升不降）
  if (leveledUp) maxTier = id;
  setStateClasses(id);
  const t = targetFor('focus', id);
  flipTo(t); relayout(t); applyShipForm();
  if (leveledUp) setTimeout(() => celebrate(maxTier), 300);
  renderTitle(id); renderContent(id);
}
function toOverview(){
  if (animating || mode==='overview') return;
  mode='overview'; curFocus=null; stage.dataset.mode='overview';
  setStateClasses(null);
  const t = targetFor('overview'); flipTo(t); relayout(t);
}

ISLE_IDS.forEach(id=>els[id].addEventListener('click', e=>{ e.stopPropagation(); if (mode==='overview' || id!==curFocus) focusIsle(id); }));
back.addEventListener('click', e=>{ e.stopPropagation(); toOverview(); });
stage.addEventListener('click', ()=>{ if (mode==='focus') toOverview(); });

/* 初始：总览（无动画）*/
ISLE_IDS.forEach(id=>applyStyle(els[id], OV[id]));
relayout(targetFor('overview')); applyShipForm();
window.addEventListener('resize', ()=>{
  const t = targetFor(mode, curFocus);
  ISLE_IDS.forEach(id=>{ els[id].style.transition='none'; els[id].style.transform='none'; applyStyle(els[id], t[id]); });
  relayout(t);
});
</script>
</body>
